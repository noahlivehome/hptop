<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不動産用語集（即戦力版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            line-height: 1.7;
            color: #333;
            background-color: #f4f6f8;
        }
        header {
            background-color: #1e3d59;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        header h1 { font-size: 2rem; margin-bottom: 10px; }
        
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #1e3d59; }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }
        .filter-btn {
            background: #eee;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #ff6e40;
            color: #fff;
        }

        .glossary-group {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .group-title {
            font-size: 1.6rem;
            color: #1e3d59;
            border-bottom: 3px solid #1e3d59;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }
        .term-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #eee;
        }
        .term-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .term-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: #ff6e40;
            margin-bottom: 5px;
        }
        .term-kana {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 5px;
        }
        .term-desc { color: #444; }

        .result-count {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #666;
            text-align: right;
        }
    </style>
</head>
<body>

<header>
    <h1>不動産用語集</h1>
    <p>キーワード検索・50音フィルター機能付き</p>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="キーワードや読み仮名で検索（例：仲介、ばいかい、RC）...">
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-kana="all">すべて</button>
            <button class="filter-btn" data-kana="あ">あ</button>
            <button class="filter-btn" data-kana="か">か</button>
            <button class="filter-btn" data-kana="さ">さ</button>
            <button class="filter-btn" data-kana="た">た</button>
            <button class="filter-btn" data-kana="な">な</button>
            <button class="filter-btn" data-kana="は">は</button>
            <button class="filter-btn" data-kana="ま">ま</button>
            <button class="filter-btn" data-kana="や">や</button>
            <button class="filter-btn" data-kana="ら">ら</button>
            <button class="filter-btn" data-kana="わ">わ</button>
            <button class="filter-btn" data-kana="英数">英数</button>
        </div>
    </div>

    <div class="result-count" id="resultCount"></div>
    <div id="glossaryContainer"></div>
</div>

<script>
    // 組み込み済みの不動産用語データ
    const glossaryData = [
        { "term": "RC造", "kana": "あーるしーぞう", "group": "あ", "desc": "鉄筋コンクリート造の略。引張力に強い鉄筋と圧縮力に強いコンクリートを組み合わせた耐久性・耐火性・遮音性の高い建築構造。" },
        { "term": "ALC造", "kana": "えーえるしーぞう", "group": "あ", "desc": "軽量気泡コンクリートパネルを使用した構造。断熱性、耐火性、軽量性に優れ、中高層住宅の外壁や床によく使われる。" },
        { "term": "青田売り", "kana": "あおたうり", "group": "あ", "desc": "工事完了前の未完成の宅地や建物の売買契約を締結すること。新築分譲マンションや分譲一戸建ての販売で一般的な手法。" },
        { "term": "空き家", "kana": "あきや", "group": "あ", "desc": "人が居住していない、または使用されていない住宅のこと。「空家等対策特別措置法」による管理義務や是正勧告の対象となる。" },
        { "term": "アパート", "kana": "あぱーと", "group": "あ", "desc": "一般的に木造や軽量鉄骨造で作られた2〜3階建ての共同住宅。マンションに比べて建築コストが低く、賃料も比較的安価。" },
        { "term": "頭金", "kana": "あたまきん", "group": "あ", "desc": "不動産を購入する際、住宅ローンの融資額以外に、自己資金から現金で支払う物件代金の一部のこと。" },
        { "term": "上がり框", "kana": "あがりがまち", "group": "あ", "desc": "玄関の靴を脱ぐ土間と、室内の床の段差部分に取り付けられる横木や化粧材のこと。家の第一印象を決める意匠要素。" },
        { "term": "アスベスト", "kana": "あすべすと", "group": "あ", "desc": "石綿。耐火性や断熱性に優れ過去に広く使われたが、健康被害が判明したため現在は製造・使用が全面的に禁止されている。" },
        { "term": "アトリエ", "kana": "あとりえ", "group": "あ", "desc": "芸術家やデザイナーが作業を行うための工房。賃貸物件では、広い土間や高天井、防音対策が施された部屋を指す。" },
        { "term": "安心R住宅", "kana": "あんしんあーるじゅうたく", "group": "あ", "desc": "耐震性があり、インスペクション（建物検査）実施済で、リフォーム情報が開示された国の基準を満たす中古住宅の標章。" },
        { "term": "一般媒介契約", "kana": "いっぱんばいかいけいやく", "group": "あ", "desc": "不動産の売却や賃貸を業者に依頼する際、複数の不動産会社に重ねて仲介を依頼できる形式。自己発見取引も可能。" },
        { "term": "印紙税", "kana": "いんしぜい", "group": "あ", "desc": "売買契約書や建築請負契約書などの課税文書を作成する際に、法律で定められた額の収入印紙を貼り納税する国税。" },
        { "term": "居抜き", "kana": "いぬき", "group": "あ", "desc": "店舗や事務所の取引において、前のテナントが使用していた内装、設備、什器などを残したまま引き渡すこと。" },
        { "term": "位置指定道路", "kana": "いちしていどうろ", "group": "あ", "desc": "特定行政庁から位置の指定を受けた私道。建築基準法上の道路とみなされ、接道義務を満たすことができる。" },
        { "term": "一時金", "kana": "いちじきん", "group": "あ", "desc": "不動産の賃貸借契約時に、毎月の賃料とは別に支払われる敷金、礼金、保証金、更新料などの総称。" },
        { "term": "違約金", "kana": "いやくきん", "group": "あ", "desc": "契約当事者の一方が契約内容に違反した場合に、相手方に支払うことをあらかじめ約束した金銭。損害賠償額の予定とされる。" },
        { "term": "入会権", "kana": "いりあいけん", "group": "あ", "desc": "特定の地域の住民が、一定の山林や原野などの共同地において、薪炭の採取や草刈りなどを共同で行う慣習的な権利。" },
        { "term": "インフラ", "kana": "いんふら", "group": "あ", "desc": "生活の基盤となる電気、ガス、水道、下水道、通信回線などの供給処理施設。不動産価値に直結する要素。" },
        { "term": "インスペクション", "kana": "いんすぺくしょん", "group": "あ", "desc": "住宅インスペクション（建物状況調査）。建築士等の専門家が建物の劣化状況や欠陥の有無を検査・診断する手続き。" },
        { "term": "いい部屋ネット", "kana": "いいへやねっと", "group": "あ", "desc": "大東建託グループが運営する、全国の賃貸物件情報を網羅した日本最大級の不動産検索ポータルサイト。" },
        { "term": "請負契約", "kana": "うけおいけいやく", "group": "あ", "desc": "当事者の一方が工事を完成させることを約束し、相手方がその仕事の結果に対して報酬を支払う契約。注文住宅などで結ぶ。" },
        { "term": "売主", "kana": "うりぬし", "group": "あ", "desc": "不動産取引において、対象となる土地や建物を売却する側の当事者。業者が売主の場合は消費者保護の規制が強まる。" },
        { "term": "浮き床工法", "kana": "うきゆかこうほう", "group": "あ", "desc": "床スラブの上に防音材（グラスウール等）を敷き、その上に床を構成することで下階への音や振動を大幅に軽減する防音工法。" },
        { "term": "内水氾濫", "kana": "うちみずはんらん", "group": "あ", "desc": "集中豪雨の際、下水道や排水路の処理能力を超えて雨水が溢れ、市街地や建物が浸水する現象。河川決壊とは異なる。" },
        { "term": "雨水桝", "kana": "うすいます", "group": "あ", "desc": "敷地内に降った雨水を集め、泥やゴミを沈殿させてから下水道や側溝へ流すために設置される地中の桝。" },
        { "term": "ウッドデッキ", "kana": "うっどてっき", "group": "あ", "desc": "庭やバルコニーに設けられた、木材や木粉入り樹脂でつくられたテラス・床。リビングと一体感を持たせた設計が多い。" },
        { "term": "埋戻し", "kana": "うめもどし", "group": "あ", "desc": "建物の基礎工事などのために一度掘削した部分の周囲に、基礎完成後に土を入れ、元の地盤高まで埋めて締め固める作業。" },
        { "term": "上物", "kana": "うわもの", "group": "あ", "desc": "土地の上に建築されている建物のこと。「上物あり土地」として売り出される場合、建物は解体前提であることが多い。" },
        { "term": "売渡承諾書", "kana": "うりわたししょうだくしょ", "group": "あ", "desc": "不動産の売主が「提示された条件で物件を売却することに同意します」という意思を買い手側に示すための書面。" },
        { "term": "運転資金", "kana": "うんてんしきん", "group": "あ", "desc": "不動産投資などの事業を継続的に運営するために必要となる、税金、管理費、修繕費、水道光熱費などの諸経費。" },
        { "term": "延床面積", "kana": "のべゆかめんせき", "group": "あ", "desc": "建物の各階の床面積をすべて合計した面積。容積率（敷地に対する延床面積の割合）の計算基準となる。" },
        { "term": "エコキュート", "kana": "えこきゅーと", "group": "あ", "desc": "大気中の熱を利用して電気で効率よくお湯を沸かす、ヒートポンプ式の高効率電気給湯器。オール電化住宅の定番設備。" },
        { "term": "駅徒歩分", "kana": "えきとほふん", "group": "あ", "desc": "不動産広告における歩行時間。「徒歩1分＝道路距離80m」として計算され、1分未満の端数は切り上げられる。" },
        { "term": "越境", "kana": "えっきょう", "group": "あ", "desc": "隣の土地の樹木や建物のひさし、ブロック塀などが、境界線を越えて自分の敷地内に入り込んでいる（またはその逆の）状態。" },
        { "term": "エレベーター", "kana": "えれべーたー", "group": "あ", "desc": "垂直方向に人や荷物を搬送する昇降機。一般的に5階建て以上のマンション等で設置が基本となる共用設備。" },
        { "term": "営業権", "kana": "えいぎょうけん", "group": "あ", "desc": "店舗が持つノウハウ、顧客、ブランド力など目に見えない経済的価値（のれん）。居抜き取引で造作代とは別に請求されることがある。" },
        { "term": "役員面接", "kana": "やくいんめんせつ", "group": "あ", "desc": "高級分譲マンションの購入や一部の厳しい賃貸物件において、管理組合やオーナー、保証会社が契約前に行う直接面談。" },
        { "term": "閲覧", "kana": "えつらん", "group": "あ", "desc": "法務局で登記簿や公図を直接確認すること、または市役所で都市計画図や課税台帳などの公的書類を確認する行為。" },
        { "term": "役付道路", "kana": "えきつきどうろ", "group": "あ", "desc": "建築基準法第42条第2項に定められた幅員4m未満の道路（2項道路）。新築時に道路中心線から2mの後退が必要。" },
        { "term": "エリアマーケティング", "kana": "えりあまーけてぃんぐ", "group": "あ", "desc": "特定の地域の人口動態、競合状況、住環境などを調査・分析し、不動産開発や賃貸需要の予測に役立てる手法。" },
        { "term": "オーナー", "kana": "おーなー", "group": "あ", "desc": "不動産の所有者のこと。特に賃貸マンションやアパート、商業ビルなどの貸主（家主）を指すことが多い。" },
        { "term": "追い焚き機能", "kana": "おいだききのう", "group": "あ", "desc": "浴槽内の冷めたお湯を、再度給湯器に通して温め直すシステム。ファミリー向け物件において非常に人気の高い設備。" },
        { "term": "オール電化", "kana": "おーるでんか", "group": "あ", "desc": "調理、給湯、冷暖房など、住宅内のすべてのエネルギーをガスを使わずに電気だけで賄うシステム。IHやエコキュートを利用。" },
        { "term": "固定資産税評価額", "kana": "こていしさんぜいひょうかがく", "group": "あ", "desc": "固定資産税や不動産取得税を計算する基準として自治体が定めた土地・建物の評価額。3年に1度評価替えが行われる。" },
        { "term": "オーナーチェンジ", "kana": "おーなーちぇんじ", "group": "あ", "desc": "賃借人が入居したままの状態で、その不動産の所有権（オーナー）だけを別の買主に売却すること。投資用不動産で一般的。" },
        { "term": "オープンハウス", "kana": "おーぷんはうす", "group": "あ", "desc": "売り出し中の一戸建てやマンションの室内を、現地にスタッフが常駐して、事前予約なしで一般に公開・見学させるイベント。" },
        { "term": "踊り場", "kana": "おどりば", "group": "あ", "desc": "階段の途中に設けられた、一段広くなっている平らなスペース。転倒時の落下防止や、方向転換、休憩のために設置される。" },
        { "term": "押入れ", "kana": "おしいれ", "group": "あ", "desc": "和室に多く見られる、布団や衣類を収納するための日本伝統の収納スペース。通常、上下を分ける中段が設置されている。" },
        { "term": "折戸", "kana": "おりど", "group": "あ", "desc": "扉を折りたたむようにして開閉するタイプのドア。開き戸に比べて開閉に必要なデッドスペースが少なく、クローゼットに多い。" },
        { "term": "親睦会", "kana": "しんぼくかい", "group": "あ", "desc": "大規模分譲マンションの入居直後などに、新住民同士のコミュニティ形成を目的に管理会社などが主導して開催する交流イベント。" },
        { "term": "アイランドキッチン", "kana": "あいらんどきっちん", "group": "あ", "desc": "壁から完全に独立し、部屋の中央に島（アイランド）のように配置された、開放感のある人気のキッチンスタイル。" },
        { "term": "合鍵", "kana": "あいかぎ", "group": "あ", "desc": "オリジナルキー（マスターキー）を元に複製された、予備の鍵のこと。賃貸では退去時に複製分も含めてすべて返却する。" },
        { "term": "相見積もり", "kana": "あいみつもり", "group": "あ", "desc": "建築、リフォーム、建物管理などの注文を出す際、複数の業者から同時に見積もりを取って価格や条件を比較すること。" },
        { "term": "アウトセット引戸", "kana": "あうとせっとひきど", "group": "あ", "desc": "壁の外側にレールを取り付けて扉をスライドさせる引戸。壁の内部を壊さずに設置できるためリフォームに最適。" },
        { "term": "青色申告", "kana": "あおいろしんこく", "group": "あ", "desc": "一定の帳簿記録を義務付ける代わりに、不動産所得などの税金面で大きな特別控除や専従者給与の算入が受けられる確定申告制度。" },
        { "term": "アクセントクロス", "kana": "あくせんとくろす", "group": "あ", "desc": "部屋の壁紙の一部分（一面だけなど）に、他とは異なる色や柄のクロスを貼り、空間にお洒落なアクセントをつける手法。" },
        { "term": "アコーディオンドア", "kana": "あこーでぃおんどあ", "group": "あ", "desc": "蛇腹状に伸縮して開閉する簡易的な間仕切り扉。広い部屋の分割や、簡易的な目隠し、省スペース化に手軽に使われる。" },
        { "term": "朝市", "kana": "あさいち", "group": "あ", "desc": "地域活性化や大規模マンション住民の交流、地域の農産物販売のために、敷地内の広場などで定期的に開催される臨時の市場。" },
        { "term": "足場", "kana": "あしば", "group": "あ", "desc": "外壁塗装や大規模修繕工事の際、職人が安全に高い場所で作業できるように建物の周囲に一時的に組み立てる仮設の構造物。" },
        { "term": "アスファルト", "kana": "あすふぁると", "group": "あ", "desc": "道路や一戸建て・マンションの駐車場などの舗装に広く使われる、原油から精製される粘着性の高い炭化水素化合物。" },
        { "term": "RC壁式構造", "kana": "あーるしーかべしきこうぞう", "group": "あ", "desc": "柱や梁を設けず、厚い鉄筋コンクリートの「壁」と「床」だけで建物を支える構造。室内に柱の出っ張りがなくすっきりする。" },
        { "term": "暗渠", "kana": "あんきょ", "group": "あ", "desc": "地下に埋設された、地表からは見えない構造の水路や川。上に遊歩道や緑道、道路が作られていることが多い。" },
        { "term": "アンカーボルト", "kana": "あんかーボルト", "group": "あ", "desc": "建物のコンクリート基礎と、その上の木造の土台や鉄骨骨組みをしっかりと固定するために基礎に埋め込む特殊なボルト。" },
        { "term": "アンペア", "kana": "あんぺあ", "group": "あ", "desc": "電流の強さの単位。賃貸物件では契約アンペア数（30Aや40Aなど）によって、一度に使える家電製品の量が決まる。" },
        { "term": "アーチ", "kana": "あーち", "group": "あ", "desc": "洋風の住宅において、垂れ壁や部屋の出入り口、門扉などの上部を弓なりの曲線（半円状）に仕上げた建築意匠。" },
        { "term": "イニシャルコスト", "kana": "いにしゃるこすと", "group": "あ", "desc": "不動産の購入時、または賃貸の契約時にかかる「初期費用」のこと。仲介手数料、礼金、登記費用などが含まれる。" },
        { "term": "一戸建て", "kana": "いっこだて", "group": "あ", "desc": "一つの建物が一つの独立した住宅となっている建築形態。注文住宅やハウスメーカーによる建売分譲住宅がある。" },
        { "term": "一般定期借地権", "kana": "いっぱんていきしゃくちけん", "group": "あ", "desc": "借地期間を50年以上とし、期間満了時に更新をせず、土地を必ず更地にして所有者に返還する形式の定期借地権。" },
        { "term": "違約手付", "kana": "いやくてつけ", "group": "あ", "desc": "契約違反（債務不履行）があった場合、買い手なら手付金を没収され、売り手なら倍返しをするという没収を前提とした手付金。" },
        { "term": "委任状", "kana": "いにんじょう", "group": "あ", "desc": "不動産の売買契約、賃貸契約、あるいは登記手続きなどを、本人に代わって第三者（代理人）に委ねることを証明する書面。" },
        { "term": "遺産分割協議", "kana": "いさんぶんかつきょうぎ", "group": "あ", "desc": "相続が発生した際、不動産や預貯金などの遺産を誰にどのように分けるかを、相続人全員で話し合って決定する法的手続き。" },
        { "term": "板の間", "kana": "いたのま", "group": "あ", "desc": "和室の一部分（主に手前や奥）に設けられた、畳ではなくフローリングや板張りに仕上げてある床スペースのこと。" },
        { "term": "一級建築士", "kana": "いっきゅうけんちくし", "group": "あ", "desc": "国土交通大臣の免許を受け、超高層マンションから大規模商業施設まで、あらゆる規模・構造の建築設計や監理を行う国家資格者。" },
        { "term": "犬走り", "kana": "いぬばしり", "group": "あ", "desc": "建物の外壁の周りを取り囲むように、幅数十センチメートルほどコンクリートや砂利を敷き詰めた平らな部分。雨だれによる汚れを防ぐ。" },
        { "term": "囲繞地", "kana": "いにょうち", "group": "あ", "desc": "公道に出られない土地（袋地）をぐるりと取り囲んでいる、他人の所有する土地のこと。民法上の通行権が発生する。" },
        { "term": "インテリアコーディネーター", "kana": "いんてりあこーでぃねーたー", "group": "あ", "desc": "住まい手のライフスタイルに合わせて、家具、照明、壁紙、カーテンなどのインテリアを総合的に提案・企画する専門家。" },
        { "term": "IHクッキングヒーター", "kana": "あいえっちくっきんぐひーたー", "group": "あ", "desc": "磁力線の働きにより、鍋自体を直接発熱させる電磁調理器。火を使わないため安全性が非常に高く、トッププレートの掃除が容易。" },
        { "term": "入居審査", "kana": "にゅうきょしんさ", "group": "あ", "desc": "賃貸物件の契約前に、家賃の支払い能力（年収・勤務先）や人柄、過去のトラブルの有無を大家や保証会社が確認する手続き。" },
        { "term": "ウッドロングエコ", "kana": "うっどろんぐえこ", "group": "あ", "desc": "木造建築やウッドデッキの耐久性を高めるために広く用いられる、環境や人体に優しい、北欧生まれの天然成分木材防腐剤。" },
        { "term": "請負代金", "kana": "うけおいだきん", "group": "あ", "desc": "注文住宅の建築や大規模リフォームにおいて、工事の完成に対して発注者（施主）から施工会社へ支払われる工事費用総額。" },
        { "term": "売り急ぎ", "kana": "うりいそぎ", "group": "あ", "desc": "転勤、買い替え、または資金調達などの理由により、相場よりも安い価格であっても不動産を早期に売却しようとする状態。" },
        { "term": "雨水貯留タンク", "kana": "うすいちょりゅうたんく", "group": "あ", "desc": "屋根から雨どいを伝って流れてくる雨水を溜めておき、庭の植物への散水や災害時の非常用水として活用するためのタンク。" },
        { "term": "受水槽", "kana": "じゅすいそう", "group": "あ", "desc": "中高層のマンションやビルにおいて、水道局から供給される水を一時的に溜めておくための、敷地内や地下にある大型給水タンク。" },
        { "term": "内断熱工法", "kana": "うちだんねつこうほう", "group": "あ", "desc": "建物の柱と柱の間や、外壁の内側の空間にグラスウールやロックウールなどの断熱材を詰め込む、日本の木造住宅で一般的な工法。" },
        { "term": "売主の担保責任", "kana": "うりぬしのたんぽせきにん", "group": "あ", "desc": "売買物件に隠れた欠陥があった際、売主が買主に対して負う法的責任（民法改正により現在は「契約不適合責任」と呼ばれる）。" },
        { "term": "ウッドタイルの床", "kana": "うっどたいるのゆか", "group": "あ", "desc": "木目をリアルに再現した塩化ビニル製のタイルを敷き詰めた床。傷や水に強くメンテナンスが楽なため、賃貸物件で多用される。" },
        { "term": "ウレタン塗装", "kana": "うれたんとそう", "group": "あ", "desc": "フローリングや木製家具の表面にウレタン樹脂の透明な膜を作る塗装。傷や汚れ、水に強く、ワックス掛けが原則不要。" },
        { "term": "エアコン", "kana": "えあこん", "group": "あ", "desc": "室内の温度や湿度を調節する空気調和機。賃貸物件の契約書において、大家側の「設備」か前入居者の「残置物」かで修理負担が変わる。" },
        { "term": "エクステリア", "kana": "えくすてりあ", "group": "あ", "desc": "建物の「外観」や「外構」の総称。門扉、フェンス、カーポート、アプローチ、庭園など、敷地内の建物以外の空間全般。" },
        { "term": "エコジョーズ", "kana": "えこじょーず", "group": "あ", "desc": "従来は捨てていた排気熱を再利用して効率よくお湯を沸かす、ガス代を節約できる省エネ型の潜熱回収式ガス給湯器。" },
        { "term": "越境物の覚書", "kana": "えっきょうぶつのおぼえがき", "group": "あ", "desc": "塀や建物のひさし等の越境物がある際、隣人と「将来の建て替え時に境界内に是正する」等の条件を合意し、取り交わす公式書面。" },
        { "term": "ALCパネル", "kana": "えーえるしーぱねる", "group": "あ", "desc": "工場で製造された軽量気泡コンクリートの板。耐火性・断熱性・遮音性が高く、鉄骨造アパートやビルの外壁に広く使われる。" },
        { "term": "エントランス", "kana": "えんとらんす", "group": "あ", "desc": "マンションやビルの建物の正面出入り口、およびそこを入ったところにある広場やロビーなどの共用空間。" },
        { "term": "営業保証金", "kana": "えいぎょうほしょうきん", "group": "あ", "desc": "宅地建物取引業を開始する際、消費者保護のために法務局へ供託することが法律で義務付けられている保証金（主たる事務所は1,000万円）。" },
        { "term": "オーナーズクラブ", "kana": "おーなーずくらぶ", "group": "あ", "desc": "特定のデベロッパーのマンション購入者や、賃貸管理会社のオーナーを対象とした、会員制の優待・定期メンテナンスサポート組織。" },
        { "term": "追い焚き配管", "kana": "おいだきはいかん", "group": "あ", "desc": "浴槽とお風呂の給湯器を結び、ぬるくなったお湯を循環させて温め直すための、壁や床の裏を通る専用の往復配管のこと。" },
        { "term": "大壁造り", "kana": "おおかべづくり", "group": "あ", "desc": "木造建築において、柱を壁の内部にすっぽりと隠してしまう壁の作り方。洋室のほとんどに採用され、すっきりとした現代的な内装になる。" },
        { "term": "折上天井", "kana": "おりあげてんじょう", "group": "あ", "desc": "天井の中央部分を周囲よりも一段高く凹ませた設計。リビングなどを開放的でスタイリッシュに見せる建築意匠効果がある。" },
        { "term": "親の同意書", "kana": "おやのどういしょ", "group": "あ", "desc": "未成年者（または学生など）が不動産を借りたり購入したりする際、契約後のトラブルを防ぐために必要となる親権者の正式な承諾書。" },
        { "term": "温水洗浄便座", "kana": "おんすいせんじょうべんざ", "group": "あ", "desc": "お尻を温水で洗浄する機能や便座の暖房機能、乾燥機能を備えた便座。いわゆる「ウォシュレット」や「シャワートイレ」の総称。" },
        { "term": "アース線", "kana": "あーすせん", "group": "あ", "desc": "洗濯機や電子レンジ、冷蔵庫などの電化製品から漏電した際、電流を地面に逃がして感電を防ぐための緑色の安全配線。" },
        { "term": "空き店舗", "kana": "あきてんぽ", "group": "あ", "desc": "商業ビルや商店街において、テナントが退去した後に次の入居者が決まっていない未利用の状態の店舗物件。" },
        { "term": "アスファルトルーフィング", "kana": "あすふぁるとるーふぃんぐ", "group": "あ", "desc": "板紙にアスファルトを染み込ませたシート状の防水材。一戸建ての屋根の仕上げ材（瓦など）の下に敷き詰める雨漏り防止の要。" },
        { "term": "遊びを持たせる", "kana": "あsoびをもたせる", "group": "あ", "desc": "建築や建具において、温度変化による木材の伸縮や地震の揺れを吸収するため、接合部や隙間にわずかな余裕（隙間）を作ること。" },
        { "term": "頭つなぎ", "kana": "あたまつなぎ", "group": "あ", "desc": "ツーバイフォー（2×4）工法などの枠組壁工法において、壁パネルの最上部を水平に連結し、上階の荷重を分散させるための重要な木部材。" },
        { "term": "網入りガラス", "kana": "あみいりがらす", "group": "あ", "desc": "内部に金属製のワイヤー（網）を封入したガラス。火災時にガラスが割れても飛散・脱落しにくいため、防火地域などの開口部に義務付けられる。" },
        { "term": "雨どい", "kana": "あまどい", "group": "あ", "desc": "屋根に降った雨水を集め、建物の外壁や基礎を濡らさないように地面の下水桝までスムーズに導くための塩ビ製などの管・溝。" },
        { "term": "アメニティ", "kana": "あめにてぃ", "group": "あ", "desc": "居住環境における「快適性」や「心地よさ」のこと。日当たり、通風、静粛性、周辺の緑の多さなどが総合的に優れている状態。" },
        { "term": "洗出し仕上げ", "kana": "あらいだししあげ", "group": "あ", "desc": "セメントに砂利や色石を混ぜて塗り、完全に固まる前に表面を水で洗い流して中の美しい石の頭を露出させる、和風玄関やアプローチの左官工法。" },
        { "term": "アンダーピニング工法", "kana": "あんだーぴにんぐこうほう", "group": "あ", "desc": "地盤沈下などによって傾いてしまった建物の基礎の下を掘削し、鋼管杭などをジャッキで打ち込んで建物の傾きを正常に修正する難工事。" },
        { "term": "RC造の寿命", "kana": "あーるしーぞうのじゅみょう", "group": "あ", "desc": "鉄筋コンクリート造の耐用年数。税法上の法定耐用年数は47年だが、適切なメンテナンスを行えば100年以上保つとされる。" },
        { "term": "暗証番号錠", "kana": "あんしょうばんごうじょう", "group": "あ", "desc": "鍵を使わず、テンキーなどであらかじめ設定した数字（暗証番号）を入力することで開錠する電子錠。鍵の紛失リスクがない。" },
        { "term": "安全持参金", "kana": "あんぜんじさんきん", "group": "あ", "desc": "不動産投資において、物件購入費とは別に、突発的な空室や修繕の発生に備えて手元に残しておくべき数ヶ月分のキャッシュ（運営手元金）。" },
        { "term": "案内図", "kana": "あんないず", "group": "あ", "desc": "不動産広告やパンフレットに掲載される、最寄り駅から対象物件までの経路や周辺の主要施設（スーパーや学校）を示した地図。" },
        { "term": "アーケード", "kana": "あーけーど", "group": "あ", "desc": "商店街などの通路の全体を覆うように架けられた、雨天でも濡れずに買い物がきできる開閉式または固定式の大型の屋根構造物。" },
        { "term": "居座り", "kana": "いすわり", "group": "あ", "desc": "賃貸借契約が解除された、または期間が満了したにもかかわらず、正当な理由なく物件の明け渡しを拒み、居住を続ける問題行動。" },
        { "term": "一括借上げ", "kana": "いっかつかりあげ", "group": "あ", "desc": "サブリースのこと。管理会社が一棟アパートなどを丸ごと借り上げ、入居状況に関わらずオーナーに一定の家賃を保証するシステム。" },
        { "term": "一般消費税", "kana": "いっぱんしょうひぜい", "group": "あ", "desc": "不動産取引においては、「建物の価格」や「仲介手数料」「礼金」には課税されるが、「土地の価格」や「敷金・家賃（居住用）」は非課税となる。" },
        { "term": "移動壁", "kana": "いどうかべ", "group": "あ", "desc": "天井や床のレールに沿って移動させることができる可動式の壁（パーティション）。用途に合わせて部屋の広さや間取りを自由に変更できる。" },
        { "term": "入居申込書", "kana": "にゅうきょもうしこみしょ", "group": "あ", "desc": "賃貸物件を借りたい人が、大家や管理会社に対して「借ります」という意思表示とともに、自身の年収や同居人を記載して提出する書面。" },
        { "term": "違法建築", "kana": "いほうけんちく", "group": "あ", "desc": "建築基準法や都市計画法などの法令、あるいは容積率・建ぺい率の制限を無視して、必要な許可を取らずに建てられた建築物。" },
        { "term": "遺言信託", "kana": "いごんしんたく", "group": "あ", "desc": "信託銀行などが遺言書の作成支援から保管、相続発生時の不動産名義変更などの執行手続きまでを一貫して代行するサービス。" },
        { "term": "入母屋造り", "kana": "いりもやづくり", "group": "あ", "desc": "上部が切妻（本を伏せた形）、下部が寄棟（4方向に傾斜）になっている、日本の伝統的な格調高い高級和風住宅の屋根形式。" },
        { "term": "イルミネーション", "kana": "いるみねーしょん", "group": "あ", "desc": "大規模分譲マンションの公開空地やエントランス周りにおいて、クリスマス時期などに資産価値向上や住民交流のために施される電飾。" },
        { "term": "インカムゲイン", "kana": "いんかむげいん", "group": "あ", "desc": "不動産投資において、物件を保有している期間中に毎月継続的に得られる、家賃（賃料）収入による利益のこと（売却益はキャピタルゲイン）。" },
        { "term": "インターホン", "kana": "いんたーほん", "group": "あ", "desc": "玄関と室内で通話するための通信機器。現代のマンションでは、防犯性の高い「TVモニター付きオートロック連動型」が標準。" },
        { "term": "引渡し", "kana": "ひきわたし", "group": "あ", "desc": "売買や賃貸において、物件の占有（使用権）を相手に移すこと。実務上は、残代金の決済と同時に「鍵の引渡し」を行うことで完了する。" },
        { "term": "植栽", "kana": "しょくさい", "group": "あ", "desc": "マンションの敷地内や一戸建ての庭・周囲に植えられた樹木や芝生などの植物。景観を良くするだけでなく、目隠しの役割も果たす。" },
        { "term": "請負人", "kana": "うけおいにん", "group": "あ", "desc": "請負契約において、注文された工事や仕事を期日までに完成させる義務を負う側の当事者（ハウスメーカーや建設会社など）。" },
        { "term": "薄畳", "kana": "うすだたみ", "group": "あ", "desc": "伝統的な畳（厚さ約5.5cm）よりも薄く作られた、厚さ1.5cm〜3cmほどの畳。フローリングの部屋の一角に置くだけの畳スペース等に使われる。" },
        { "term": "打放しコンクリート", "kana": "うちはなしこんくりーと", "group": "あ", "desc": "型枠を外した後のコンクリートの表面にタイルや塗装を施さず、そのまま仕上げとする建築手法。デザイナーズ物件に多い。" },
        { "term": "売却益", "kana": "ばいきゃくえき", "group": "あ", "desc": "所有していた土地や建物を売却した際に、購入費用や売却経費を差し引いても手元に残る利益（キャピタルゲイン）。譲渡所得税の対象となる。" },
        { "term": "雨水利用システム", "kana": "うすいりようしすてむ", "group": "あ", "desc": "建物に降った雨水を大規模な地下タンク等に貯留・ろ過し、マンションの共用部のトイレの洗浄水や植栽への散水に再利用するエコシステム。" },
        { "term": "内窓", "kana": "うちまど", "group": "あ", "desc": "既存の窓の室内側に、もう一つ追加で取り付ける窓（二重サッシ）。防音性や断熱性が劇的に向上するため、リフォームで大人気。" },
        { "term": "移転登記", "kana": "いてんとうき", "group": "あ", "desc": "売買、相続、贈与などによって不動産の所有者が変わった際に、法務局の登記簿上の所有者名義を新所有者に書き換える手続き。" },
        { "term": "ウッドカーペット", "kana": "うっどかーぺっと", "group": "あ", "desc": "和室の畳の上に敷き詰めるだけで、大がかりな改装工事をすることなく簡単にフローリング風の洋室に変えられる、木製のカーペット材。" },
        { "term": "ウレタン吹付断熱", "kana": "うれたんふきつけだんねつ", "group": "あ", "desc": "建物の壁や屋根の裏側に、液状のポリウレタン樹脂を吹き付けて発泡させる断熱工法。隙間なく密着するため気密性が非常に高い。" },
        { "term": "エアシャワー", "kana": "えあしゃわー", "group": "あ", "desc": "高級マンションや花粉症対策マンションなどのエントランスに設置され、衣服に付着した花粉やチリを強い風で吹き飛ばす装置。" },
        { "term": "液状化現象", "kana": "えきじょうかげんしょう", "group": "あ", "desc": "地震の強い揺れにより、水分を多く含んだ砂質の地盤が一時的に液体のようになってしまい、建物が沈下したり傾いたりする現象。" },
        { "term": "エコウィル", "kana": "えこうぃる", "group": "あ", "desc": "クリーンなガスを使って自宅で発電し、その際に出る熱を無駄なく回収してお風呂などの給湯に利用する家庭用コージェネレーションシステム。" },
        { "term": "越境の是正", "kana": "えっきょうのぜせい", "group": "あ", "desc": "境界線を越えてしまっている隣の塀や樹木について、切除したり、建て替え時に位置を直したりして、法的に正しい状態に戻すこと。" },
        { "term": "エスクロー取引", "kana": "えすくろーとりひき", "group": "あ", "desc": "不動産売買において、安全性を高めるために、買い手の代金支払いと売り手の書類引き渡しを、信頼できる中立な第三者機関が仲介するシステム。" },
        { "term": "エプロン", "kana": "えぷろん", "group": "あ", "desc": "浴室のユニットバスにおいて、浴槽の側面を覆っている取り外し可能なカバー（化粧板）のこと。裏側にカビが溜まりやすいため掃除が必要。" },
        { "term": "延滞金", "kana": "えんたいきん", "group": "あ", "desc": "賃賃物件において家賃の支払いが期日より遅れた場合、または分譲マンションで管理費の支払いが遅れた場合に、ペナルティとして加算される利息。" },
        { "term": "沿道確認", "kana": "えんどうかくにん", "group": "あ", "desc": "道路に面した土地を開発・建築する際、敷地と道路の正確な境界線や高さを確定させるために、道路管理者（国や自治体）と行う現地立ち会い手続き。" },
        { "term": "オーナーズルーム", "kana": "おーなーずるーむ", "group": "あ", "desc": "賃貸併用住宅（一部が大家の自宅、一部が賃貸）において、オーナー（大家）自身が居住するために設計された、広めでハイグレードな部屋。" },
        { "term": "大型乗入れ", "kana": "おおがたのりいれ", "group": "あ", "desc": "商業地や配送センター、大型駐車場の敷地において、大型トラックや観光バスがスムーズに道路から出入りできるように広く補強された歩道切下げ部分。" },
        { "term": "大きめのクローゼット", "kana": "おおきめのくろーぜっと", "group": "あ", "desc": "賃貸広告でよく使われる表現。通常のクローゼットよりも奥行きや幅が広く、スーツケースや布団などの大型荷物も収納できるスペース。" },
        { "term": "折戸式間仕切り", "kana": "おりどしきまじきり", "group": "あ", "desc": "リビングと隣の洋室の間に設置される、折りたたんで完全に開放できる引き戸。閉めれば2部屋、開ければ広大な1部屋として柔軟に使える設備。" },
        { "term": "親族間売買", "kana": "しんぞくかんばいばい", "group": "あ", "desc": "親から子、あるいは兄弟などの親族間で不動産の売買を行うこと。税務署から「みなし贈与（相場より安すぎる売買）」と疑われやすいため注意が必要。" },
        { "term": "温水床暖房", "kana": "おんすいゆかだんぼう", "group": "あ", "desc": "給湯器やヒートポンプで作った温水を床下のパイプに循環させ、足元からじわじわと部屋全体を優しく暖める、乾燥しにくい快適な暖房システム。" }
    ];

    function renderGlossary(data) {
        const container = document.getElementById('glossaryContainer');
        const countContainer = document.getElementById('resultCount');
        container.innerHTML = '';
        
        countContainer.textContent = `該当件数: ${data.length}件`;

        if (data.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:30px; color:#999;">該当する用語が見つかりません。</p>';
            return;
        }

        // 50音グループおよび英数の定義
        const groups = [
            { label: 'あ行', key: 'あ' },
            { label: 'か行', key: 'か' },
            { label: 'さ行', key: 'さ' },
            { label: 'た行', key: 'た' },
            { label: 'な行', key: 'な' },
            { label: 'は行', key: 'は' },
            { label: 'ま行', key: 'ま' },
            { label: 'や行', key: 'や' },
            { label: 'ら行', key: 'ら' },
            { label: 'わ行', key: 'わ' },
            { label: '英数字・他', key: '英数' }
        ];

        groups.forEach(group => {
            const groupItems = data.filter(item => item.group === group.key);
            
            if (groupItems.length > 0) {
                const groupSection = document.createElement('div');
                groupSection.className = 'glossary-group';
                
                let html = `<h2 class="group-title">${group.label}</h2>`;
                groupItems.forEach(item => {
                    html += `
                        <div class="term-item">
                            <div class="term-title">${item.term}</div>
                            <div class="term-kana">${item.kana}</div>
                            <div class="term-desc">${item.desc}</div>
                        </div>
                    `;
                });
                groupSection.innerHTML = html;
                container.appendChild(groupSection);
            }
        });
    }

    const searchInput = document.getElementById('searchInput');
    const filterButtons = document.getElementById('filterButtons');
    let currentFilter = 'all';

    function filterData() {
        const searchText = searchInput.value.toLowerCase().trim();
        
        const filtered = glossaryData.filter(item => {
            const matchesFilter = (currentFilter === 'all' || item.group === currentFilter);
            const matchesSearch = !searchText || 
                item.term.toLowerCase().includes(searchText) ||
                item.kana.includes(searchText) ||
                item.desc.toLowerCase().includes(searchText);

            return matchesFilter && matchesSearch;
        });

        renderGlossary(filtered);
    }

    searchInput.addEventListener('input', filterData);
    
    filterButtons.addEventListener('click', (e) => {
        if (!e.target.classList.contains('filter-btn')) return;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.getAttribute('data-kana');
        filterData();
    });

    // 初回実行
    renderGlossary(glossaryData);
</script>

</body>
</html>
