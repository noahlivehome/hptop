<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不動産用語集（即戦力版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            line-height: 1.7;
            color: #333;
            background-color: #f4f6f8;
        }
        header {
            background-color: #1e3d59;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        header h1 { font-size: 2rem; margin-bottom: 10px; }
        
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #1e3d59; }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }
        .filter-btn {
            background: #eee;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #ff6e40;
            color: #fff;
        }

        .glossary-group {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .group-title {
            font-size: 1.6rem;
            color: #1e3d59;
            border-bottom: 3px solid #1e3d59;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }
        .term-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #eee;
        }
        .term-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .term-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: #ff6e40;
            margin-bottom: 5px;
        }
        .term-kana {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 5px;
        }
        .term-desc { color: #444; }

        .result-count {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #666;
            text-align: right;
        }
    </style>
</head>
<body>

<header>
    <h1>不動産用語集</h1>
    <p>キーワード検索・50音フィルター機能付き</p>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="キーワードや読み仮名で検索（例：仲介、ばいかい、RC）...">
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-kana="all">すべて</button>
            <button class="filter-btn" data-kana="あ">あ</button>
            <button class="filter-btn" data-kana="か">か</button>
            <button class="filter-btn" data-kana="さ">さ</button>
            <button class="filter-btn" data-kana="た">た</button>
            <button class="filter-btn" data-kana="な">な</button>
            <button class="filter-btn" data-kana="は">は</button>
            <button class="filter-btn" data-kana="ま">ま</button>
            <button class="filter-btn" data-kana="や">や</button>
            <button class="filter-btn" data-kana="ら">ら</button>
            <button class="filter-btn" data-kana="わ">わ</button>
            <button class="filter-btn" data-kana="英数">英数</button>
        </div>
    </div>

    <div class="result-count" id="resultCount"></div>
    <div id="glossaryContainer"></div>
</div>

<script>
    // 組み込み済みの不動産用語データ
    const glossaryData = [
              // --- あ行（あ） ---
        { "term": "RC造", "kana": "あーるしーぞう", "group": "あ", "desc": "鉄筋コンクリート造の略。引張力に強い鉄筋と圧縮力に強いコンクリートを組み合わせた、高耐久・高遮音性の建築構造。" },
        { "term": "ALC造", "kana": "えーえるしーぞう", "group": "あ", "desc": "軽量気泡コンクリートパネルを使用した構造。断熱性、耐火性、軽量性に優れ、中高層住宅の外壁や床によく使われる。" },
        { "term": "青田売り", "kana": "あおたうり", "group": "あ", "desc": "工事完了前の未完成の宅地や建物の売買契約を締結すること。新築分譲一戸建てやマンションの販売で一般的な手法。" },
        { "term": "空き家", "kana": "あきや", "group": "あ", "desc": "人が居住していない、または使用されていない住宅のこと。管理義務や特定空家への指定など、税制上のペナルティリスクがある。" },
        { "term": "アパート", "kana": "あぱーと", "group": "あ", "desc": "一般的に木造や軽量鉄骨造で作られた2〜3階建ての共同住宅。マンションに比べて建築コストが低く、賃料も比較的安価。" },
        { "term": "頭金", "kana": "あたまきん", "group": "あ", "desc": "不動産を購入する際、住宅ローンの融資額以外に、自己資金から現金で支払う物件代金の一部のこと。" },
        { "term": "上がり框", "kana": "あがりがまち", "group": "あ", "desc": "玄関の靴を脱ぐ土間と、室内の床の段差部分に取り付けられる横木や化粧材のこと。家の第一印象を決める意匠要素。" },
        { "term": "アスベスト", "kana": "あすべすと", "group": "あ", "desc": "石綿。耐火性や断熱性に優れ過去に広く使われたが、健康被害が判明したため現在は製造・使用が全面的に禁止されている。" },
        { "term": "アトリエ", "kana": "あとりえ", "group": "あ", "desc": "芸術家やデザイナーが作業を行うための工房。賃貸物件では、広い土間や高天井、防音対策が施された部屋を指す。" },
        { "term": "安心R住宅", "kana": "あんしんあーるじゅうたく", "group": "あ", "desc": "耐震性があり、インスペクション（建物検査）実施済で、リフォーム情報が開示された国の基準を満たす中古住宅の標章。" },
        { "term": "一般媒介契約", "kana": "いっぱんばいかいけいやく", "group": "あ", "desc": "不動産の売却や賃貸を業者に依頼する際、複数の不動産会社に重ねて仲介を依頼できる形式。自己発見取引も可能。" },
        { "term": "印紙税", "kana": "いんしぜい", "group": "あ", "desc": "売買契約書や建築請負契約書などの課税文書を作成する際に、法律で定められた額の収入印紙を貼り納税する国税。" },
        { "term": "居抜き", "kana": "いぬき", "group": "あ", "desc": "店舗や事務所の取引において、前のテナントが使用していた内装、設備、什器などを残したまま引き渡すこと。" },
        { "term": "位置指定道路", "kana": "いちしていどうろ", "group": "あ", "desc": "特定行政庁から位置の指定を受けた私道。建築基準法上の道路とみなされ、接道義務を満たすことができる。" },
        { "term": "一時金", "kana": "いちじきん", "group": "あ", "desc": "不動産の賃貸借契約時に、毎月の賃料とは別に支払われる敷金、礼金、保証金、更新料などの総称。" },
        { "term": "違約金", "kana": "いやくきん", "group": "あ", "desc": "契約当事者の一方が契約内容に違反した場合に、相手方に支払うことをあらかじめ約束した金銭。損害賠償額の予定とされる。" },
        { "term": "入会権", "kana": "いりあいけん", "group": "あ", "desc": "特定の地域の住民が、一定の山林や原野などの共同地において、薪炭の採取や草刈りなどを共同で行う慣習的な権利。" },
        { "term": "インフラ", "kana": "いんふら", "group": "あ", "desc": "生活の基盤となる電気、ガス、水道、下水道、通信回線などの供給処理施設。不動産価値に直結する要素。" },
        { "term": "インスペクション", "kana": "いんすぺくしょん", "group": "あ", "desc": "住宅インスペクション（建物状況調査）。建築士等の専門家が建物の劣化状況や欠陥の有無を検査・診断する手続き。" },
        { "term": "いい部屋ネット", "kana": "いいへやねっと", "group": "あ", "desc": "大東建託グループが運営する、全国の賃貸物件情報を網羅した日本最大級の不動産検索ポータルサイト。" },
        { "term": "請負契約", "kana": "うけおいけいやく", "group": "あ", "desc": "当事者の一方が工事を完成させることを約束し、相手方がその仕事の結果に対して報酬を支払う契約。注文住宅などで結ぶ。" },
        { "term": "売主", "kana": "うりぬし", "group": "あ", "desc": "不動産取引において、対象となる土地や建物を売却する側の当事者。業者が売主の場合は消費者保護の規制が強まる。" },
        { "term": "浮き床工法", "kana": "うきゆかこうほう", "group": "あ", "desc": "床スラブの上に防音材を敷き、その上に床を構成することで下階への音や振動を大幅に軽減する防音工法。" },
        { "term": "内水氾濫", "kana": "うちみずはんらん", "group": "あ", "desc": "集中豪雨の際、下水道や排水路の処理能力を超えて雨水が溢れ、市街地や建物が浸水する現象。河川決壊とは異なる。" },
        { "term": "雨水桝", "kana": "うすいます", "group": "あ", "desc": "敷地内に降った雨水を集め、泥やゴミを沈殿させてから下水道や側溝へ流すために設置される地中の桝。" },
        { "term": "ウッドデッキ", "kana": "うっどてっき", "group": "あ", "desc": "庭やバルコニーに設けられた、木材や木粉入り樹脂でつくられたテラス・床。リビングと一体感を持たせた設計が多い。" },
        { "term": "埋戻し", "kana": "うめもどし", "group": "あ", "desc": "建物の基礎工事などのために一度掘削した部分の周囲に、基礎完成後に土を入れ、元の地盤高まで埋めて締め固める作業。" },
        { "term": "上物", "kana": "うわもの", "group": "あ", "desc": "土地の上に建築されている建物のこと。「上物あり土地」として売り出される場合、建物は解体前提であることが多い。" },
        { "term": "売渡承諾書", "kana": "うりわたししょうだくしょ", "group": "あ", "desc": "不動産の売主が「提示された条件で物件を売却することに同意します」という意思を買い手側に示すための書面。" },
        { "term": "運転資金", "kana": "うんてんしきん", "group": "あ", "desc": "不動産投資などの事業を継続的に運営するために必要となる、税金、管理費、修繕費、水道光熱費などの諸経費。" },
        { "term": "エコキュート", "kana": "えこきゅーと", "group": "あ", "desc": "大気中の熱を利用して電気で効率よくお湯を沸かす、ヒートポンプ式の高効率電気給湯器。オール電化住宅の定番設備。" },
        { "term": "駅徒歩分", "kana": "えきとほふん", "group": "あ", "desc": "不動産広告における歩行時間。「徒歩1分＝道路距離80m」として計算され、1分未満の端数は切り上げられる。" },
        { "term": "越境", "kana": "えっきょう", "group": "あ", "desc": "隣の土地の樹木や建物のひさし、ブロック塀などが、境界線を越えて自分の敷地内に入り込んでいる（またはその逆の）状態。" },
        { "term": "エレベーター", "kana": "えれべーたー", "group": "あ", "desc": "垂直方向に人や荷物を搬送する昇降機。一般的に5階建て以上のマンション等で設置が基本となる共用設備。" },
        { "term": "営業権", "kana": "えいぎょうけん", "group": "あ", "desc": "店舗が持つノウハウ、顧客、ブランド力など目に見えない経済的価値（のれん）。居抜き取引で請求されることがある。" },
        { "term": "役員面接", "kana": "やくいんめんせつ", "group": "あ", "desc": "高級分譲マンションの購入や一部の厳しい賃貸物件において、管理組合やオーナー、保証会社が契約前に行う直接面談。" },
        { "term": "閲覧", "kana": "えつらん", "group": "あ", "desc": "法務局で登記簿や公図を直接確認すること、または市役所で都市計画図や課税台帳などの公的書類を確認する行為。" },
        { "term": "役付道路", "kana": "えきつきどうろ", "group": "あ", "desc": "建築基準法第42条第2項に定められた幅員4m未満の道路（2項道路）。新築時に道路中心線から2mの後退が必要。" },
        { "term": "エリアマーケティング", "kana": "えりあまーけてぃんぐ", "group": "あ", "desc": "特定の地域の人口動態、競合状況、住環境などを調査・分析し、不動産開発や賃貸需要の予測に役立てる手法。" },
        { "term": "オーナー", "kana": "おーなー", "group": "あ", "desc": "不動産の所有者のこと。特に賃貸マンションやアパート、商業ビルなどの貸主（家主）を指すことが多い。" },
        { "term": "追い焚き機能", "kana": "おいだききのう", "group": "あ", "desc": "浴槽内の冷めたお湯を、再度給湯器に通して温め直すシステム。ファミリー向け物件において非常に人気の高い設備。" },
        { "term": "オール電化", "kana": "おーるでんか", "group": "あ", "desc": "調理、給湯、冷暖房など、住宅内のすべてのエネルギーをガスを使わずに電気だけで賄うシステム。IHやエコキュートを利用。" },
        { "term": "固定資産税評価額", "kana": "こていしさんぜいひょうかがく", "group": "あ", "desc": "固定資産税や不動産取得税を計算する基準として自治体が定めた土地・建物の評価額。3年に1度評価替えが行われる。" },
        { "term": "オーナーチェンジ", "kana": "おーなーちぇんじ", "group": "あ", "desc": "賃借人が入居したままの状態で、その不動産の所有権（オーナー）だけを別の買主に売却すること。投資用不動産で一般的。" },
        { "term": "オープンハウス", "kana": "おーぷんはうす", "group": "あ", "desc": "売り出し中の一戸建てやマンションの室内を、現地にスタッフが常駐して、事前予約なしで一般に公開・見学させるイベント。" },
        { "term": "踊り場", "kana": "おどりば", "group": "あ", "desc": "階段の途中に設けられた、一段広くなっている平らなスペース。転倒時の落下防止や、方向転換、休憩のために設置される。" },
        { "term": "押入れ", "kana": "おしいれ", "group": "あ", "desc": "和室に多く見られる、布団や衣類を収納するための日本伝統の収納スペース。通常、上下を分ける中段が設置されている。" },
        { "term": "折戸", "kana": "おりど", "group": "あ", "desc": "扉を折りたたむようにして開閉するタイプのドア。開き戸に比べて開閉に必要なデッドスペースが少なく、クローゼットに多い。" },
        { "term": "親睦会", "kana": "しんぼくかい", "group": "あ", "desc": "大規模分譲マンションの入居直後などに、新住民同士のコミュニティ形成を目的に管理会社などが主導して開催する交流イベント。" },
        { "term": "アイランドキッチン", "kana": "あいらんどきっちん", "group": "あ", "desc": "壁から完全に独立し、部屋の中央に島（アイランド）のように配置された、開放感のある人気のキッチンスタイル。" },
        { "term": "合鍵", "kana": "あいかぎ", "group": "あ", "desc": "オリジナルキーを元に複製された予備の鍵。賃貸では退去時に複製分も含めてすべて管理会社等に返却する義務がある。" },
        { "term": "相見積もり", "kana": "あいみつもり", "group": "あ", "desc": "建築、リフォーム、建物管理などの注文を出す際、複数の業者から同時に見積もりを取って価格や条件を比較すること。" },
        { "term": "アウトセット引戸", "kana": "あうとせっとひきど", "group": "あ", "desc": "壁の外側にレールを取り付けて扉をスライドさせる引戸。壁の内部を壊さずに設置できるためリフォームに最適。" },
        { "term": "青色申告", "kana": "あおいろしんこく", "group": "あ", "desc": "一定の帳簿記録を義務付ける代わりに、不動産所得などの税金面で大きな特別控除や専従者給与の算入が受けられる確定申告制度。" },
        { "term": "アクセントクロス", "kana": "あくせんとくろす", "group": "あ", "desc": "部屋の壁紙の一部分（一面だけなど）に、他とは異なる色や柄のクロスを貼り、空間にお洒落なアクセントをつける手法。" },
        { "term": "アコーディオンドア", "kana": "あこーでぃおんどあ", "group": "あ", "desc": "蛇腹状に伸縮して開閉する簡易的な間仕切り扉。広い部屋の分割や、簡易的な目隠し、省スペース化に手軽に使われる。" },
        { "term": "朝市", "kana": "あさいち", "group": "あ", "desc": "地域活性化や大規模マンション住民の交流、地域の農産物販売のために、敷地内の広場などで定期的に開催される臨時の市場。" },
        { "term": "足場", "kana": "あしば", "group": "あ", "desc": "外壁塗装や大規模修繕工事の際、職人が安全に高い場所で作業できるように建物の周囲に一時的に組み立てる仮設の構造物。" },
        { "term": "アスファルト", "kana": "あすふぁると", "group": "あ", "desc": "道路や一戸建て・マンションの駐車場などの舗装に広く使われる、原油から精製される粘着性の高い炭化水素化合物。" },
        { "term": "RC壁式構造", "kana": "あーるしーかべしきこうぞう", "group": "あ", "desc": "柱や梁を設けず、厚い鉄筋コンクリートの「壁」と「床」だけで建物を支える構造。室内に柱の出っ張りがなくすっきりする。" },
        { "term": "暗渠", "kana": "あんきょ", "group": "あ", "desc": "地下に埋設された、地表からは見えない構造の水路や川。上に遊歩道や緑道、道路が作られていることが多い。" },
        { "term": "アンカーボルト", "kana": "あんかーボルト", "group": "あ", "desc": "建物のコンクリート基礎と、その上の木造の土台や鉄骨骨組みをしっかりと固定するために基礎に埋め込む特殊なボルト。" },
        { "term": "アンペア", "kana": "あんぺあ", "group": "あ", "desc": "電流の強さの単位。賃貸物件では契約アンペア数によって、一度に使える家電製品の量が決まる。" },
        { "term": "アーチ", "kana": "あーち", "group": "あ", "desc": "洋風の住宅において、垂れ壁や部屋の出入り口、門扉などの上部を弓なりの曲線（半円状）に仕上げた建築意匠。" },
        { "term": "アイレベル", "kana": "あいれべる", "group": "あ", "desc": "建築設計やインテリア計画における「人の目線の高さ」。キッチンの吊戸棚の使いやすさなどを検討する基準。" },
        { "term": "空き物件", "kana": "あきぶっけん", "group": "あ", "desc": "現在入居者がおらず、すぐに賃貸契約や引き渡し、入居が可能な状態になっている不動産物件。" },
        { "term": "アクセントライト", "kana": "あくせんとらいと", "group": "あ", "desc": "部屋全体を照らす主照明とは別に、壁の絵画や観葉植物、特定の空間を際立たせるために局所的に使う照明器具。" },
        { "term": "上げ下げ窓", "kana": "あげさげまど", "group": "あ", "desc": "2枚の戸を上下にスライドさせて開閉する窓。洋風のデザイン住宅によく使われ、気密性が高く防犯性にも優れる。" },
        { "term": "朝型住宅", "kana": "あさがたじゅうたく", "group": "あ", "desc": "東側に大きな窓やダイニングを配置し、朝の太陽光を効率的に取り込めるよう設計された健康的な間取りの住まい。" },
        { "term": "遊び", "kana": "あそび", "group": "あ", "desc": "建具や建築部材の接合部において、温度変化による伸縮や地震の揺れを吸収するためにあえて設けるわずかな隙間・余裕。" },
        { "term": "値下がりリスク", "kana": "ねさがりりすく", "group": "あ", "desc": "購入した不動産の市場価値や周辺相場が、将来の人口減少や建物の老朽化によって下落してしまうリスク。" },
        { "term": "網入りガラス", "kana": "あみいりがらす", "group": "あ", "desc": "内部に金属製のワイヤーを封入したガラス。火災時に割れても飛散しにくいため、防火地域などの開口部に義務付けられる。" },
        { "term": "雨どい", "kana": "あまどい", "group": "あ", "desc": "屋根に降った雨水を集め、建物の外壁や基礎を濡らさないように地面の下水桝までスムーズに導くための塩ビ製などの管。" },
        { "term": "アメニティ", "kana": "あめにてぃ", "group": "あ", "desc": "居住環境における「快適性」や「心地よさ」のこと。日当たり、通風、静粛性、周辺の緑の多さなどが優れている状態。" },
        { "term": "洗出し仕上げ", "kana": "あらいだししあげ", "group": "あ", "desc": "セメントに砂利を混ぜて塗り、固まる前に表面を水で洗い流して中の美しい石を露出させる、和風玄関やアプローチの左官工法。" },
        { "term": "アンダーピニング工法", "kana": "あんだーぴにんぐこうほう", "group": "あ", "desc": "傾いた建物の基礎の下を掘削し、鋼管杭などをジャッキで打ち込んで建物の傾きを正常に修正する土木・修繕工法。" },
        { "term": "RC造の寿命", "kana": "あーるしーぞうのじゅみょう", "group": "あ", "desc": "鉄筋コンクリート造の耐用年数。税法上は47年だが、適切なメンテナンスを行えば100年以上保つとされる。" },
        { "term": "暗証番号錠", "kana": "あんしょうばんごうじょう", "group": "あ", "desc": "鍵を使わず、テンキーなどであらかじめ設定した数字を入力することで開錠する電子錠。スマートロックの定番。" },
        { "term": "安全持参金", "kana": "あんぜんじさんきん", "group": "あ", "desc": "不動産投資において、物件購入費とは別に、突発的な空室や修繕の発生に備えて手元に残しておくべき数ヶ月分の運営資金。" },
        { "term": "案内図", "kana": "あんないず", "group": "あ", "desc": "不動産広告やパンフレットに掲載される、最寄り駅から対象物件までの経路や周辺の主要施設を示した地図。" },
        { "term": "アーケード", "kana": "あーけーど", "group": "あ", "desc": "商店街などの通路の全体を覆うように架けられた、雨天でも濡れずに買い物がきできる開閉式または固定式の大型の屋根構造物。" },
        { "term": "安全スペース", "kana": "あんぜんすぺーす", "group": "あ", "desc": "建築設計において、階段の踊り場やキッチンの通路など、車椅子や人がすれ違うために最低限確保すべきゆとりのある空間。" },
        { "term": "Ｒコーナー", "kana": "あーるこーなー", "group": "あ", "desc": "室内の壁の角（出隅部分）を直角にせず、緩やかな曲線（半径を持った丸み）に仕上げる工法。子供の衝突対策や意匠性に優れる。" },
        { "term": "雨濡れリスク", "kana": "あまぬれりすく", "group": "あ", "desc": "一戸建てやアパートの駐輪場・駐車場に屋根がない場合や、エントランスポーチが狭く雨天時に濡れてしまう設計上の課題。" },
        { "term": "青地", "kana": "あおち", "group": "あ", "desc": "農業振興地域内の農用地区域にある土地の俗称。原則として住宅の建築や転用が厳しく制限されている農地。" },
        { "term": "赤地", "kana": "あかち", "group": "あ", "desc": "明治時代の旧公図において赤く塗られていた土地で、国有地である「道路（里道）」の通称。建築時に払い下げ手続きが必要な場合がある。" },
        { "term": "頭つなぎ", "kana": "あたまつなぎ", "group": "あ", "desc": "2×4（ツーバイフォー）工法において、壁パネルの最上部に水平に取り付け、上階の床や屋根の荷重を分散・緊結する重要な木部材。" },
        { "term": "厚畳", "kana": "あつだたみ", "group": "あ", "desc": "主に関西地方の伝統的な建築や神社仏閣で使われる、畳床の厚みが通常の5.5cmよりも厚く、重厚感のある最高級仕様の畳。" },
        { "term": "溢れ水桝", "kana": "あふれみずます", "group": "あ", "desc": "集中豪雨などの際、宅地内の排水が逆流して溢れるのを防ぐため、敷地の境界付近に設置されるオーバーフロー用の桝。" },
        { "term": "雨戸枠", "kana": "あまどわく", "group": "あ", "desc": "サッシの外側に取り付けられる、雨戸を収納する戸袋や、雨戸をスムーズに滑らせるための上下のレールを含めた外枠構造。" },
        { "term": "荒床", "kana": "あらゆか", "group": "あ", "desc": "フローリングなどの仕上げ材を貼る前に、下地として梁や根太の上に直接敷き詰める構造用合板や杉の粗木板のこと。" },
        { "term": "アンボンド工法", "kana": "あんぼんどこうほう", "group": "あ", "desc": "マンションの床スラブ内に、あらかじめPC鋼線を通して引張力を与えることで、室内に小梁のない大空間を作る工法。" },
        { "term": "RC骨組", "kana": "あーるしーほねぐみ", "group": "あ", "desc": "柱と梁を鉄筋コンクリートで強固に接合した、建物の骨組み。中高層ビルやマンションの基本となるラーメン構造のこと。" },
        { "term": "空き駐車場", "kana": "あきちゅうしゃじょう", "group": "あ", "desc": "マンションの敷地内や月極駐車場において、現在契約者がおらず、すぐの利用・契約募集が可能な区画。" },
        { "term": "朝霧", "kana": "あさぎり", "group": "あ", "desc": "盆地や川沿いのリゾート地・分譲地において、気候特性として発生しやすい濃霧。視界不良や湿気対策などの説明要素となる。" },
        { "term": "亜鉛メッキ鋼板", "kana": "あえんめっきこうはん", "group": "あ", "desc": "鋼板の表面に亜鉛の膜を施し、サビの発生を劇的に抑えた建材。住宅の屋根や外壁、ダクト、ガルバリウム鋼板の基材となる。" },
        { "term": "粗利益", "kana": "あらりえき", "group": "あ", "desc": "不動産ビジネスや転売（買取再販）において、売上高（売却価格）から直接の仕入れ原価（購入費・リフォーム費）を引いた利益。" },
        { "term": "安全確認義務", "kana": "あんぜんかくにんぎむ", "group": "あ", "desc": "不動産管理会社やオーナーが、共用部の階段の手すりのガタつきや、ブロック塀の倒壊の危険を放置せず是正する法的義務。" },

        // --- あ行（い） ---
        { "term": "イニシャルコスト", "kana": "いにしゃるこすと", "group": "あ", "desc": "不動産の購入時、または賃貸の契約時にかかる「初期費用」のこと。仲介手数料、礼金、登記費用などが含まれる。" },
        { "term": "一戸建て", "kana": "いっこだて", "group": "あ", "desc": "一つの建物が一つの独立した住宅となっている建築形態。注文住宅やハウスメーカーによる建売分譲住宅がある。" },
        { "term": "一般定期借地権", "kana": "いっぱんていきしゃくちけん", "group": "あ", "desc": "借地期間を50年以上とし、期間満了時に更新をせず、土地を必ず更地にして所有者に返還する形式の定期借地権。" },
        { "term": "違約手付", "kana": "いやくてつけ", "group": "あ", "desc": "契約違反（債務不履行）があった場合、買い手なら手付金を没収され、売り手なら倍返しをするという没収を前提とした手付金。" },
        { "term": "委任状", "kana": "いにんじょう", "group": "あ", "desc": "不動産の売買契約、賃貸契約、あるいは登記手続きなどを、本人に代わって第三者に委ねることを証明する書面。" },
        { "term": "遺産分割協議", "kana": "いさんぶんかつきょうぎ", "group": "あ", "desc": "相続が発生した際、不動産や預貯金などの遺産を誰にどのように分けるかを、相続人全員で話し合って決定する法的手続き。" },
        { "term": "板の間", "kana": "いたのま", "group": "あ", "desc": "和室の一部分に設けられた、畳ではなくフローリングや板張りに仕上げてある床スペースのこと。重い家具を置くのに適する。" },
        { "term": "一級建築士", "kana": "いっきゅうけんちくし", "group": "あ", "desc": "国土交通大臣の免許を受け、超高層マンションから大規模商業施設まで、あらゆる規模・構造の建築設計や監理を行う国家資格者。" },
        { "term": "犬走り", "kana": "いぬばしり", "group": "あ", "desc": "建物の外壁の周りを取り囲むように、幅数十センチメートルほどコンクリートや砂利を敷き詰めた平らな部分。雨だれによる汚れを防ぐ。" },
        { "term": "囲繞地", "kana": "いにょうち", "group": "あ", "desc": "公道に出られない土地（袋地）をぐるりと取り囲んでいる、他人の所有する土地のこと。民法上の通行権が発生する。" },
        { "term": "インテリアコーディネーター", "kana": "いんてりあこーでぃねーたー", "group": "あ", "desc": "住まい手のライフスタイルに合わせて、家具、照明、壁紙、カーテンなどのインテリアを総合的に提案・企画する専門家。" },
        { "term": "IHクッキングヒーター", "kana": "あいえっちくっきんぐひーたー", "group": "あ", "desc": "磁力線の働きにより、鍋自体を直接発熱させる電磁調理器。火を使わないため安全性が非常に高く、掃除が容易。" },
        { "term": "入居審査", "kana": "にゅうきょしんさ", "group": "あ", "desc": "賃貸物件の契約前に、家賃の支払い能力（年収・勤務先）や過去のトラブルの有無を大家や保証会社が確認する手続き。" },
        { "term": "家賃保証会社", "kana": "やちんほしょうがいしゃ", "group": "あ", "desc": "賃借人が家賃を滞納した際、貸主に対して家賃を立て替え払い（代位弁済）する民間の保証サービス会社。現代の契約では必須が多い。" },
        { "term": "イベント広場", "kana": "いべんとひろば", "group": "あ", "desc": "大規模タワーマンションの敷地内（公開空地など）に設けられた、住民の交流やキッチンカー誘致、地域のお祭りに使われる多目的空間。" },
        { "term": "居室", "kana": "きょしつ", "group": "あ", "desc": "建築基準法上、居住、作業、娯楽などのために継続的に使用する部屋。採光や通風に関係する窓の面積比率が厳密に定められている。" },
        { "term": "居宅", "kana": "きょたく", "group": "あ", "desc": "登記簿上の建物の「種類」の一つで、人が日常生活を営むための独立した専用住宅・一戸建てなどのこと。" },
        { "term": "一時使用目的の借地権", "kana": "いちじしようもくてきのしゃくちけん", "group": "あ", "desc": "工事用仮設事務所やプレハブ店舗など、明らかに一時的な目的で土地を借りる契約。借地借家法の強い更新保護が適用されない。" },
        { "term": "入会地", "kana": "いりあいち", "group": "あ", "desc": "特定の地域の住民が共同で管理し、薪炭の採取や草刈りなどを行うための山林や原野などの土地。権利関係が複雑。" },
        { "term": "違法駐車", "kana": "いほうちゅうしゃ", "group": "あ", "desc": "マンションの私道やエントランス前、月極駐車場の他人の区画に、無断で自動車を停める迷惑行為。管理組合や警察の対応対象。" },
        { "term": "依頼者", "kana": "いらいしゃ", "group": "あ", "desc": "媒介契約において、不動産の売却や買い取り、賃貸の斡旋を不動産会社に正式に注文・依頼する側の当事者（顧客）。" },
        { "term": "色決めの打合せ", "kana": "いろぎめのうちあわせ", "group": "あ", "desc": "注文住宅やリフォームにおいて、外壁、床、キッチン、壁紙などの色やサンプルを、カタログやショールームで決定する楽しいプロセス。" },
        { "term": "入居可能時期", "kana": "にゅうきょかのうじき", "group": "あ", "desc": "不動産広告に表示される、物件の工事完了や前入居者の退去・原状回復が終わり、実際に住み始めることができる日付や時期。" },
        { "term": "引渡書", "kana": "ひきわたししょ", "group": "あ", "desc": "売買や建築工事の完了時に、物件の所有権や鍵、管理権が売主（または施工会社）から買主（施主）へ正式に移ったことを証明する書類。" },
        { "term": "異動届", "kana": "いどうとどけ", "group": "あ", "desc": "法人の本店移転や所有者の住所変更があった際、税務署や市区町村の固定資産税課に対して、課税台帳の情報を書き換えるために出す書類。" },
        { "term": "一括査定サイト", "kana": "いっかつさていさいと", "group": "あ", "desc": "インターネット上で土地や建物の情報を一度入力するだけで、複数の不動産会社へ同時に売却価格の査定を依頼できる便利なポータルサービス。" },
        { "term": "意思能力", "kana": "いしのうりょく", "group": "あ", "desc": "自分が起こす法律行為（売買契約など）の結果を正しく判断できる精神的な能力。これが無い状態での契約は法的に無効となる。" },
        { "term": "一括発注", "kana": "いっかつはっちゅう", "group": "あ", "desc": "建築工事において、施主が元請けのハウスメーカーやゼネコンに対し、設計から施工、電気、水道などすべての工事をまとめて注文する方式。" },
        { "term": "一般承継", "kana": "いっぱんしょうけい", "group": "あ", "desc": "相続や会社の合併などにより、前所有者の不動産に関する権利や義務（ローンの債務など）を、新しい当事者が一括して丸ごと引き継ぐこと。" },
        { "term": "インフラ整備費用", "kana": "いんふらせいびひよう", "group": "あ", "desc": "古い土地や未開発の分譲地を購入した際、敷地内に水道管を引き込んだり、電柱から電気を通したりするために自己負担する工事費用。" },
        { "term": "一帯開発", "kana": "いったいかいはつ", "group": "あ", "desc": "複数の細分化された土地を一つにまとめ、総合的な都市計画やガイドラインに基づいて、美しい街並みや大規模ビル、マンションを創る手法。" },
        { "term": "移住促進", "kana": "いじゅうそくしん", "group": "あ", "desc": "地方自治体が空き家バンクを運営したり、購入・リフォームの補助金を交付したりして、都市部から地方への引っ越しを後押しする政策。" },
        { "term": "異形土地", "kana": "いけいとち", "group": "あ", "desc": "不整形地のこと。三角形やL字型（旗竿地）、極端に細長いなど、正方形や長方形（整形地）ではない、設計の工夫が必要な土地。" },
        { "term": "違反建築物への是正措置", "kana": "いはんけんちくぶつへのぜせいそっち", "group": "あ", "desc": "容積率超過や接道義務違反の建物に対し、特定行政庁（知事や市長）が工事の停止や解体、使用制限などを命令する公的な手続き。" },
        { "term": "移転補償金", "kana": "いてんほしょうきん", "group": "あ", "desc": "公共事業（道路拡張など）のために土地を収用される際、その土地にある建物を取り壊して別の場所へ引っ越すために国や自治体から支払われるお金。" },
        { "term": "インテリアグリーン", "kana": "いんてりあぐりーん", "group": "あ", "desc": "室内のデザインや空気環境を良くするために配置する観葉植物の総称。マンションのモデルルームやエントランスの演出の定番。" },
        { "term": "一時払い", "kana": "いちじばらい", "group": "あ", "desc": "住宅ローンに関わる火災保険料や保証料、あるいは賃貸の更新料などを、分割ではなく一括でまとめて支払う方法。" },
        { "term": "印鑑証明書", "kana": "いんかんしょうめいしょ", "group": "あ", "desc": "市区町村に登録された実印が本物であることを公的に証明する書類。不動産売買での登記やローンの契約（金消契約）で必須となる。" },
        { "term": "遺贈", "kana": "いぞう", "group": "あ", "desc": "遺言によって、自身の所有する土地やマンションなどの不動産を、法定相続人あるいはそれ以外の特定の人物・団体に無償で譲ること。" },
        { "term": "位置指定道路の廃止", "kana": "いちしていどうろのはいし", "group": "あ", "desc": "一度道路とみなされた私道について、周辺の土地を一帯開発するなどの理由で、関係者全員の同意を得て特定行政庁から指定を取り消してもらう手続き。" },
        { "term": "一筆", "kana": "いっぴつ", "group": "あ", "desc": "土地の個数を数えるための法律・登記上の単位。登記簿上で「1つの地番」が与えられた独立した土地の範囲のこと。" },
        { "term": "入母屋", "kana": "いりもや", "group": "あ", "desc": "上部が切妻、下部が寄棟になっている、日本の伝統的な高級和風住宅の格式高い屋根形式。建築コストやメンテナンス性が異なる。" },
        { "term": "色あせ防止ガラス", "kana": "いろあせぼうしがらす", "group": "あ", "desc": "紫外線（UV）を大幅にカットする特殊な金属膜をコーティングした複層ガラス（Low-Eガラスなど）。室内の家具や畳の日焼けを防ぐ。" },
        { "term": "一括受電システム", "kana": "いっかつじゅでんしすてむ", "group": "あ", "desc": "マンション全体の電気を電力会社から高圧でまとめて一括購入し、各住戸へ分配することで、毎月の電気料金を安く抑える仕組み。" },
        { "term": "隠蔽配管", "kana": "いんぺいはいかん", "group": "あ", "desc": "エアコンの冷媒管やドレンホースを、壁や天井の内部に通して外から見えないようにする施工。部屋の見た目がすっきりする。" },
        { "term": "イベントスペースの利用規約", "kana": "いべんとすぺーすのりようきやく", "group": "あ", "desc": "大規模分譲マンションの共用施設であるシアタールームや多目的室を使う際の、予約方法、利用料金、騒音禁止などを定めた規則。" },

        // --- あ行（う） ---
        { "term": "請負代金", "kana": "うけおいだきん", "group": "あ", "desc": "注文住宅の建築や大規模リフォームにおいて、工事の完成に対して発注者から施工会社へ支払われる契約費用総額。" },
        { "term": "売り急ぎ", "kana": "うりいそぎ", "group": "あ", "desc": "転勤、買い替え、または資金調達などの理由により、相場よりも安い価格であっても不動産を早期に売却しようとする状態。" },
        { "term": "雨水貯留タンク", "kana": "うすいちょりゅうたんく", "group": "あ", "desc": "屋根から雨どいを伝って流れてくる雨水を溜めておき、庭の植物への散水や災害時の非常用水として活用するためのタンク。" },
        { "term": "受水槽", "kana": "じゅすいそう", "group": "あ", "desc": "中高層のマンションやビルにおいて、水道局から供給される水を一時的に溜めておくための、敷地内や地下にある大型給水タンク。" },
        { "term": "内断熱工法", "kana": "うちだんねつこうほう", "group": "あ", "desc": "建物の柱の間や外壁の内側の空間にグラスウールなどの断熱材を詰め込む、日本の木造住宅で最も一般的な工法。" },
        { "term": "売主の担保責任", "kana": "うりぬしのたんぽせきにん", "group": "あ", "desc": "売買物件に隠れた欠陥があった際、売主が買主に対して負う法的責任（民法改正により現在は契約不適合責任と呼ばれる）。" },
        { "term": "ウッドタイルの床", "kana": "うっどたいるのゆか", "group": "あ", "desc": "木目をリアルに再現した塩化ビニル製のタイルを敷き詰めた床。傷や水に強くメンテナンスが楽なため、賃貸物件で多用される。" },
        { "term": "ウレタン塗装", "kana": "うれたんとそう", "group": "あ", "desc": "フローリングや木製家具の表面にウレタン樹脂の透明な膜を作る塗装。傷や水に強く、ワックス掛けが原則不要。" },
        { "term": "上張りリフォーム", "kana": "うわばりりふぉーむ", "group": "あ", "desc": "古いフローリングやクロスを剥がさず、その上から新しい床材や壁紙を重ねて貼る工法。解体費用や廃材が出ず安価に抑えられる。" },
        { "term": "受託者", "kana": "じゅたくしゃ", "group": "あ", "desc": "家族信託や不動産信託において、委託者（オーナー）から信頼されて不動産の管理や処分を任され、運用を行う義務を負う人物・会社。" },
        { "term": "売渡通知書", "kana": "うりわたしつうちしょ", "group": "あ", "desc": "不動産のオークションや競売において、裁判所や執行官が最高価買受人（落札者）に対し、物件を売却することを公式に伝える書類。" },
        { "term": "ウッドロングエコ", "kana": "うっどろんぐえこ", "group": "あ", "desc": "木造建築やウッドデッキの耐久性を高めるために広く用いられる、環境や人体に優しい、北欧生まれの天然成分木材防腐剤。" },
        { "term": "浮造り仕上げ", "kana": "うづくりしあげ", "group": "あ", "desc": "木材の表面を何度もこすって柔らかい部分を削り、年輪の固い部分（木目）をぷっくりと浮き立たせる、足触りが良く傷が目立たない床の伝統技法。" },
        { "term": "初荷", "kana": "うぶに", "group": "あ", "desc": "地主や旧家から売りに出される、過去に一度も市場に流通したことがない、初めて売りに出される希少な土地や古い屋敷のこと。" },
        { "term": "裏込め石", "kana": "うらごめいし", "group": "あ", "desc": "宅地造成の擁壁（ブロック塀やコンクリート壁）の裏側に敷き詰める砂利や砕石。壁の裏側の水はけを良くし、水圧での倒壊を防ぐ。" },
        { "term": "雨天順延", "kana": "うてんじゅんえん", "group": "あ", "desc": "地鎮祭や上棟式、またはオープンハウスや現地見学会などの屋外イベントが、激しい雨の日の場合に別の日程に延期されること。" },
        { "term": "馬踏み目地", "kana": "うまふみめじ", "group": "あ", "desc": "タイルやレンガを貼る際、上の段のタイルの継ぎ目が、下の段のタイルのちょうど真ん中に来るように交互にずらして配置するお洒落な貼り方。" },
        { "term": "上吊り戸", "kana": "うわつりど", "group": "あ", "desc": "天井や壁の上部に設置したレールから扉を吊り下げるタイプの引き戸。床にレールや溝がないため、バリアフリーでゴミも溜まらない。" },
        { "term": "運搬費用", "kana": "うんぱんひよう", "group": "あ", "desc": "リフォームや解体工事の際に出るがれきや廃材を、トラックで処分場まで運ぶための費用。見積書の「廃材処分費」に含まれることが多い。" },
        { "term": "内装制限", "kana": "ないそうせいげん", "group": "あ", "desc": "建築基準法に基づき、火災時の延焼を防ぐため、キッチンの周りやマンションの避難経路の壁・天井に難燃・不燃材料の使用を義務付ける規制。" },
        { "term": "薄型レンジフード", "kana": "うすがたれんじふーど", "group": "あ", "desc": "キッチンのコンロの上に設置する、厚みが薄くスタイリッシュな最新の換気扇。お掃除が簡単で、システムキッチンの定番設備。" },
        { "term": "うなぎの寝床", "kana": "うなぎのねどこ", "group": "あ", "desc": "間口（道路に接する幅）が非常に狭く、奥行きが極端に長い形状をした土地や建物の俗称。京都の古い町家などに多く見られる。" },
        { "term": "内回り", "kana": "うちまわり", "group": "あ", "desc": "マンションの間取りにおいて、玄関や廊下から直接、トイレ・浴室・洗面所などの水回りにアクセスできる効率的な動線設計。" },
        { "term": "埋込照明", "kana": "うめこみしょうめい", "group": "あ", "desc": "ダウンライトのこと。天井に穴を開けて照明器具をすっぽりと埋め込むため、天井面がフラットになり、空間を広く見せる効果がある。" },
        { "term": "売行き動向", "kana": "うれゆきどうこう", "group": "あ", "desc": "特定のエリアや価格帯における、新築マンションや中古一戸建ての「売れるスピードや成約率」に関する市場トレンド。" },
        { "term": "運用利回り", "kana": "うんようりまわり", "group": "あ", "desc": "不動産投資（RCマンションや一棟アパートなど）において、投資金額に対して、毎月の家賃収入から経費を引いた純利益がどれくらい出るかの割合。" },
        { "term": "ウッドシェード", "kana": "うっどしぇーど", "group": "あ", "desc": "ベランダや西日の強い窓の外側に取り付ける、木製やすだれ状の日よけ。夏のエアコン効率を大幅に高めるエコ建材。" },
        { "term": "売上連動家賃", "kana": "うりあげれんどうやちん", "group": "あ", "desc": "商業ビルやショッピングモールに入居するテナントの賃料形態。毎月固定の家賃ではなく、その店舗の売上高の数％を家賃として支払う契約。" },
        { "term": "請負人の瑕疵担保責任", "kana": "うけおいにんのかしたんぽせきにん", "group": "あ", "desc": "家を建てた建築会社が、引き渡し後に雨漏りや構造上の重大な欠陥が見つかった際、無償で修理や損害賠償に応じる義務（品確法で10年間）。" },
        { "term": "雨水利用", "kana": "うすいりよう", "group": "あ", "desc": "建物の屋根に降った雨水を大規模な地下タンクに集めてろ過し、マンションの共用トイレの洗浄水や植栽への散水に使う省エネシステム。" },
        { "term": "ウレタンフォーム断熱材", "kana": "うれたんふぉーむだんねつざい", "group": "あ", "desc": "高い断熱性能を持つスポンジ状の素材。現場で柱や壁の裏側に直接スプレーで吹き付けることで、隙間のない高い気密性を実現する。" },
        { "term": "受水槽の清掃義務", "kana": "じゅすいそうのせいそうぎむ", "group": "あ", "desc": "マンションの受水槽の容量が10立方メートルを超える場合、水道法に基づき、毎年1回以上の定期清掃と水質検査が管理組合に義務付けられている。" },
        { "term": "売り文句", "kana": "うりもんく", "group": "あ", "desc": "不動産広告や販売図面に記載される、「駅徒歩3分の好立地」「南向き日当たり良好」などの物件の最大の魅力・キャッチコピー。" },
        { "term": "運営代行会社", "kana": "うんえいだいこうがいしゃ", "group": "あ", "desc": "民泊やシェアハウス、コインパーキングなどの投資用不動産において、オーナーに代わって日々の清掃、集客、トラブル対応を丸ごと行う業者。" },
        { "term": "内廊下", "kana": "うちろうか", "group": "あ", "desc": "ホテルのように、建物の内部に設けられた左右を壁で囲まれた共用廊下。雨風の影響を受けず、プライバシーや防犯性、高級感が高い。" },
        { "term": "ウッドチップの敷設", "kana": "うっどちっぷのふせつ", "group": "あ", "desc": "一戸建ての庭やマンションの専用庭の土の上に木片を敷き詰めること。雑草が生えるのを抑え、ドッグランとしても人気。" },
        { "term": "内地", "kana": "ないち", "group": "あ", "desc": "分譲地や道路から奥まった場所にある、外からは見えにくい静かな区画のこと。プライバシーが保たれやすい反面、接道に注意が必要。" },
        { "term": "売買代金の決済", "kana": "ばいばいだいきんのけっさい", "group": "あ", "desc": "不動産取引の最終段階（引き渡し）。銀行の応接室などに集まり、ローンの実行、残代金の振込、鍵と登記書類の受け渡しを同時に行う手続き。" },
        { "term": "上枠", "kana": "うわわく", "group": "あ", "desc": "ドアや窓のサッシ枠のうち、一番上の水平な部分の部材。ここにカーテンレールや引き戸のレールが取り付けられる。" },
        { "term": "浮き基礎", "kana": "うききそ", "group": "あ", "desc": "地盤が非常に軟弱な場所において、建物全体の重さとバランスが取れるように地下に大きなくぼみ（箱状の空間）を作り、土の浮力で支える特殊な基礎工法。" },

        // --- あ行（え） ---
        { "term": "エアコン", "kana": "えあこん", "group": "あ", "desc": "室内の温度や湿度を調節する空気調和機。賃貸の契約書において、オーナー側の「設備」か前入居者の「残置物」かで修理負担が変わる。" },
        { "term": "エクステリア", "kana": "えくすてりあ", "group": "あ", "desc": "建物の「外観」や「外構」の総称。門扉、フェンス、カーポート、アプローチ、庭園など、敷地内の建物以外の空間全般。" },
        { "term": "エコジョーズ", "kana": "えこじょーず", "group": "あ", "desc": "従来は捨てていた排気熱を再利用して効率よくお湯を沸かす、ガス代を節約できる省エネ型の潜熱回収式ガス給湯器。" },
        { "term": "越境物の覚書", "kana": "えっきょうぶつのおぼえがき", "group": "あ", "desc": "塀やひさし等の越境物がある際、隣人と「将来の建て替え時に境界内に是正する」等の条件を合意し、取り交わす公式書面。" },
        { "term": "ALCパネル", "kana": "えーえるしーぱねる", "group": "あ", "desc": "工場で製造された軽量気泡コンクリートの板。耐火性・断熱性・遮音性が高く、鉄骨造アパートやビルの外壁に広く使われる。" },
        { "term": "エントランス", "kana": "えんとらんす", "group": "あ", "desc": "マンションやビルの建物の正面出入り口、およびそこを入ったところにある広場やロビーなどの共用空間。" },
        { "term": "営業保証金", "kana": "えいぎょうほしょうきん", "group": "あ", "desc": "宅地建物取引業を開始する際、消費者保護のために法務局へ供託することが法律で義務付けられている保証金（主たる事務所は1,000万円）。" },
        { "term": "延床面積", "kana": "のべゆかめんせき", "group": "あ", "desc": "建物の各階の床面積をすべて合計した面積。容積率（敷地に対する延床面積の割合）の計算基準となる。" },
        { "term": "液状化現象", "kana": "えきじょうかげんしょう", "group": "あ", "desc": "地震の強い揺れにより、水分を多く含んだ砂質の地盤が一時的に液体のようになってしまい、建物が沈下したり傾いたりする現象。" },
        { "term": "エスクロー取引", "kana": "えすくろーとりひき", "group": "あ", "desc": "不動産売買において、安全性を高めるために、買い手の代金支払いと売り手の書類引き渡しを、信頼できる中立な第三者機関が仲介するシステム。" },
        { "term": "エプロン", "kana": "えぷろん", "group": "あ", "desc": "浴室のユニットバスにおいて、浴槽の側面を覆っている取り外し可能なカバー（化粧板）のこと。裏側にカビが溜まりやすいため掃除が必要。" },
        { "term": "延滞金", "kana": "えんたいきん", "group": "あ", "desc": "賃貸物件において家賃の支払いが期日より遅れた場合、または分譲マンションで管理費の支払いが遅れた場合に、ペナルティとして加算される利息。" },
        { "term": "沿道確認", "kana": "えんどうかくにん", "group": "あ", "desc": "道路に面した土地を開発・建築する際、敷地と道路の正確な境界線や高さを確定させるために、道路管理者（国や自治体）と行う現地立ち会い手続き。" },
        { "term": "エリアマネジメント", "kana": "えりあまねじめんと", "group": "あ", "desc": "地域住民や企業、デベロッパーが主体となり、街の資産価値や良好な環境を維持・向上させるための清掃やイベントなどの住民活動。" },
        { "term": "エコウィル", "kana": "えこうぃる", "group": "あ", "desc": "ガスを使って自宅で発電し、その際に出る熱を回収してお風呂などの給湯に利用する、環境に優しい家庭用コージェネレーションシステム。" },
        { "term": "閲覧制度", "kana": "えつらんせいど", "group": "あ", "desc": "法務局で誰でも手数料を支払えば特定の土地や建物の登記簿謄本・公図を確認できる、不動産取引の安全を支える公的な仕組み。" },
        { "term": "エネルギー確認", "kana": "えねるぎーかくにん", "group": "あ", "desc": "ZEH（ネット・ゼロ・エネルギー・ハウス）などの省エネ住宅を建てる際、設計段階で建物の断熱性能や年間消費電力量をシミュレーションする手続き。" },
        { "term": "営業マン", "kana": "えいぎょうまん", "group": "あ", "desc": "不動産会社において、物件の紹介、現地案内、売買・賃貸の契約仲介を直接担当し、顧客の住まい探しをサポートする営業担当者。" },
        { "term": "駅前再開発", "kana": "えきまえさいかいはつ", "group": "あ", "desc": "駅周辺の古い木造密集地や未利用地をまとめ、タワーマンションや大型商業施設、ロータリーを整備して利便性を劇的に高める大事業。" },
        { "term": "縁側", "kana": "えんがわ", "group": "あ", "desc": "日本の伝統的な和風住宅において、室内の畳の部屋と庭との間に設けられた、板張りの通路・くつろぎスペース。" },
        { "term": "L字型キッチン", "kana": "えるじがたきっちん", "group": "あ", "desc": "コンロとシンクがL字の形に配置されたシステムキッチン。作業動線が短く効率的で、コーナースペースを広く使える人気のレイアウト。" },

    function renderGlossary(data) {
        const container = document.getElementById('glossaryContainer');
        const countContainer = document.getElementById('resultCount');
        container.innerHTML = '';
        
        countContainer.textContent = `該当件数: ${data.length}件`;

        if (data.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:30px; color:#999;">該当する用語が見つかりません。</p>';
            return;
        }

        // 50音グループおよび英数の定義
        const groups = [
            { label: 'あ行', key: 'あ' },
            { label: 'か行', key: 'か' },
            { label: 'さ行', key: 'さ' },
            { label: 'た行', key: 'た' },
            { label: 'な行', key: 'な' },
            { label: 'は行', key: 'は' },
            { label: 'ま行', key: 'ま' },
            { label: 'や行', key: 'や' },
            { label: 'ら行', key: 'ら' },
            { label: 'わ行', key: 'わ' },
            { label: '英数字・他', key: '英数' }
        ];

        groups.forEach(group => {
            const groupItems = data.filter(item => item.group === group.key);
            
            if (groupItems.length > 0) {
                const groupSection = document.createElement('div');
                groupSection.className = 'glossary-group';
                
                let html = `<h2 class="group-title">${group.label}</h2>`;
                groupItems.forEach(item => {
                    html += `
                        <div class="term-item">
                            <div class="term-title">${item.term}</div>
                            <div class="term-kana">${item.kana}</div>
                            <div class="term-desc">${item.desc}</div>
                        </div>
                    `;
                });
                groupSection.innerHTML = html;
                container.appendChild(groupSection);
            }
        });
    }

    const searchInput = document.getElementById('searchInput');
    const filterButtons = document.getElementById('filterButtons');
    let currentFilter = 'all';

    function filterData() {
        const searchText = searchInput.value.toLowerCase().trim();
        
        const filtered = glossaryData.filter(item => {
            const matchesFilter = (currentFilter === 'all' || item.group === currentFilter);
            const matchesSearch = !searchText || 
                item.term.toLowerCase().includes(searchText) ||
                item.kana.includes(searchText) ||
                item.desc.toLowerCase().includes(searchText);

            return matchesFilter && matchesSearch;
        });

        renderGlossary(filtered);
    }

    searchInput.addEventListener('input', filterData);
    
    filterButtons.addEventListener('click', (e) => {
        if (!e.target.classList.contains('filter-btn')) return;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.getAttribute('data-kana');
        filterData();
    });

    // 初回実行
    renderGlossary(glossaryData);
</script>
