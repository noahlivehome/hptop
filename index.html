<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お役立ち情報 - バナーグリッド</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&amp;family=Playfair+Display:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <style>
        /* Base styles with a clean white and beige color palette */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #ffffff;
            --main-gold: #c5c1b2; /* Subtle beige/gold for accents */
            --text-dark: #3A3231;
            --text-muted: #615553;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-dark);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* Container for content, centered with a comfortable max width */
        .container {
            max-width: 900px; /* Limits the width for better readability */
            margin: 0 auto 60px auto; /* Centers the container */
            padding: 0 20px;
        }

        /* Styling for the section titles with icons */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 40px 0 25px 0;
            padding-bottom: 10px;
        }

        .section-title h2 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            color: var(--text-dark);
        }

        .section-title .material-symbols-outlined {
            color: var(--main-gold);
            font-size: 24px;
        }

        /* -------------------------------------------
           Image Banner Grid System
        ------------------------------------------- */
        /* Display items in a grid with 3 columns */
        .banner-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px; /* Space between grid items */
            margin-bottom: 50px;
        }

        /* Styling for each banner link item */
        .banner-item, .footer-banner {
            display: block;
            aspect-ratio: 366 / 110; /* Fixed aspect ratio to prevent image distortion */
            border-radius: 8px; /* Slightly rounded corners */
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(58, 50, 49, 0.06); /* Subtle shadow */
            transition: opacity 0.3s ease, transform 0.3s ease; /* Transition for hover effects */
            border: 1px solid rgba(0,0,0,0.03); /* Faint border */
        }

        /* Hover effects for the links */
        .banner-item:hover, .footer-banner:hover {
            opacity: 0.9;
            transform: translateY(-3px); /* Subtle lift on hover */
            box-shadow: 0 6px 18px rgba(58, 50, 49, 0.12); /* Increased shadow on hover */
        }

        /* Styling for the images inside the links */
        .banner-item img, .footer-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures image covers the area without distorting */
            display: block;
        }

        /* -------------------------------------------
           Footer Styles
        ------------------------------------------- */
        footer {
            text-align: center;
            margin-top: 50px;
            padding-bottom: 40px;
            border-top: 1px solid #E8E2D7; /* Divider line above footer */
            padding-top: 30px;
        }

        /* Styling for the LINE contact button */
        .footer-link {
            display: inline-block;
            background-color: #06C755; /* LINE Green color */
            color: #ffffff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 30px;
            box-shadow: 0 4px 12px rgba(6, 199, 85, 0.2);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .footer-link:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* -------------------------------------------
           Responsive Styles (Mobile & Tablet)
        ------------------------------------------- */
        @media (max-width: 768px) {
            /* On smaller screens, use 2 columns instead of 3 */
            .banner-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            /* Reduce aspect ratio slightly for better fit on small screens */
            .banner-item, .footer-banner {
                aspect-ratio: 300 / 110;
            }
        }

        @media (max-width: 480px) {
            /* On very small screens (phones), use 1 column */
            .banner-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <main>
            
            <div class="section-title">
                <span class="material-symbols-outlined">auto_awesome</span>
                <h2>お役立ち情報</h2>
            </div>

            <div class="banner-grid">
                <a href="heya.html" class="banner-item">
                    <img src="images/raiten.png" alt="来店予約：スムーズなお部屋探し">
                </a>

                <a href="https://lin.ee/Qsj3s42" class="footer-banner" target="_blank" rel="noopener">
                    <img src="images/naga.png" alt="LINEでのお問い合わせはこちら">
                </a>

                <a href="blog.html" class="banner-item">
                    <img src="images/hayena.png" alt="スタッフブログ：定期的に更新中！">
                </a>

                <a href="gourmet.html" class="banner-item">
                    <img src="images/yoko.png" alt="グルメ：周辺飲食店情報">
                </a>

                <a href="flow.html" class="banner-item">
                    <img src="images/megane.png" alt="お部屋探しから契約までの流れ">
                </a>

                <a href="shitsumon.html" class="banner-item">
                    <img src="images/banner_faq.png" alt="よくある質問">
                </a>

                <a href="jiki.html" class="banner-item">
                    <img src="images/banner_jiki.png" alt="お部屋探しに良い時期とポイント・コツ">
                </a>

                <a href="shoki.html" class="banner-item">
                    <img src="images/banner_shoki.png" alt="賃賃借契約費用や初期費用">
                </a>

                <a href="checklist.html" class="banner-item">
                    <img src="images/banner_checklist.png" alt="失敗しない部屋選び 選び方とチェック方法">
                </a>

                <a href="madori.html" class="banner-item">
                    <img src="images/banner_madori.png" alt="間取り図・資料の見方">
                </a>
            </div>

        </main>

        <footer>
            <a href="https://lin.ee/Qsj3s42" class="footer-link" target="_blank" rel="noopener">
                LINEで質問・お問い合わせをする
            </a>
        </footer>
    </div>

</body>
</html>
