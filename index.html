<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お役立ち情報</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&amp;family=Playfair+Display:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #ffffff;
            --card-beige: #c5c1b2;
            --main-gold: #c5c1b2;
            --icon-accent: #c5c1b2;
            --text-dark: #3A3231;
            --text-muted: #615553;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-dark);
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 900px;
            margin: 0 auto 60px auto; /* 上部の不要なマージンを削り、スッキリさせました */
            padding: 0 20px;
        }

        /* SECTION TITLE */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 40px 0 25px 0;
            /* 一番上の不要な境界線（border-bottom）を削除しました */
            padding-bottom: 10px;
        }

        .section-title h2 {
            font-size: 20px;
            font-weight: 700;
            margin: 0;
            color: var(--text-dark);
        }

        .section-title .material-symbols-outlined {
            color: var(--main-gold);
            font-size: 24px;
        }

        /* -------------------------------------------
            IMAGE BANNER GRID SYSTEM (お役立ち情報バナー)
        ------------------------------------------- */
        .banner-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .banner-item, .footer-banner {
            display: block;
            aspect-ratio: 366 / 110; /* 画像の比率を維持 */
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(58, 50, 49, 0.06);
            transition: opacity 0.3s ease, transform 0.3s ease;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .banner-item:hover, .footer-banner:hover {
            opacity: 0.9;
            transform: translateY(-3px);
            box-shadow: 0 6px 18px rgba(58, 50, 49, 0.12);
        }

        .banner-item img, .footer-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .banner-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .banner-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <main>
            
            <div class="section-title">
                <span class="material-symbols-outlined">auto_awesome</span>
                <h2>お役立ち情報</h2>
            </div>

            <div class="banner-grid">
                <a href="heya.html" class="banner-item">
                    <img src="images/lineline.png" alt="来店予約：スムーズなお部屋探し">
                </a>

                <a href="https://lin.ee/Qsj3s42" class="footer-banner" target="_blank" rel="noopener">
                    <img src="images/nagare.png" alt="LINEでのお問い合わせはこちら">
                </a>

                <a href="blog.html" class="banner-item">
                    <img src="images/shitu.png" alt="スタッフブログ：定期的に更新中！">
                </a>

                <a href="gourmet.html" class="banner-item">
                    <img src="images/yougo.png" alt="グルメ：周辺飲食店情報">
                </a>

                <a href="heya.html" class="banner-item">
                    <img src="images/banner_flow.png" alt="お部屋探しから契約までの流れ">
                </a>

                <a href="shitsumon.html" class="banner-item">
                    <img src="images/banner_faq.png" alt="よくある質問">
                </a>

                <a href="jiki.html" class="banner-item">
                    <img src="images/banner_jiki.png" alt="お部屋探しに良い時期とポイント・コツ">
                </a>

                <a href="shoki.html" class="banner-item">
                    <img src="images/banner_shoki.png" alt="賃貸契約費用や一人暮らしの初期費用">
                </a>

                <a href="checklist.html" class="banner-item">
                    <img src="images/banner_checklist.png" alt="賃貸物件の選び方とチェック方法">
                </a>

                <a href="madori.html" class="banner-item">
                    <img src="images/banner_madori.png" alt="間取り図・資料の見方">
                </a>


            </div>

        </main>

        <footer>
            
        </footer>
    </div>

</body>
</html>
