<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不動産用語集（テスト版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            line-height: 1.7;
            color: #333;
            background-color: #f4f6f8;
        }
        header {
            background-color: #1e3d59;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        header h1 { font-size: 2rem; margin-bottom: 10px; }
        
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #1e3d59; }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }
        .filter-btn {
            background: #eee;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #ff6e40;
            color: #fff;
        }

        .glossary-group {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .group-title {
            font-size: 1.6rem;
            color: #1e3d59;
            border-bottom: 3px solid #1e3d59;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }
        .term-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #eee;
        }
        .term-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .term-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: #ff6e40;
            margin-bottom: 5px;
        }
        .term-kana {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 5px;
        }
        .term-desc { color: #444; }

        .result-count {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #666;
            text-align: right;
        }
    </style>
</head>
<body>

<header>
    <h1>不動産用語集</h1>
    <p>キーワード検索・50音フィルター機能付き</p>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="キーワードや読み仮名で検索（例：仲介、ばいかい、RC）...">
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-kana="all">すべて</button>
            <button class="filter-btn" data-kana="あ">あ</button>
            <button class="filter-btn" data-kana="か">か</button>
            <button class="filter-btn" data-kana="さ">さ</button>
            <button class="filter-btn" data-kana="た">た</button>
            <button class="filter-btn" data-kana="な">な</button>
            <button class="filter-btn" data-kana="は">は</button>
            <button class="filter-btn" data-kana="ま">ま</button>
            <button class="filter-btn" data-kana="や">や</button>
            <button class="filter-btn" data-kana="ら">ら</button>
            <button class="filter-btn" data-kana="わ">わ</button>
            <button class="filter-btn" data-kana="英数">英数</button>
        </div>
    </div>

    <div class="result-count" id="resultCount"></div>
    <div id="glossaryContainer"></div>
</div>

<script>
    // 1. 読み込む分割ファイルの一覧
    const dataFiles = [
        'yougo-a.html',  // あ行
        'yougo-ka.html', // か行
        'yougo-sa.html', // さ行
        'yougo-ta.html', // た行
        'yougo-na.html', // な行
        'yougo-ha.html', // は行
        'yougo-ma.html', // ま行
        'yougo-ya.html', // や行
        'yougo-ra.html', // ら行
        'yougo-wa.html', // わ行
        'yougo-num.html' // 英数
    ];

    let allTerms = []; 
    let currentFilter = 'all'; 

    // 2. 分割されたHTMLファイルを裏でロードする
    async function loadAllData() {
        const resultCountEl = document.getElementById('resultCount');
        if (resultCountEl) resultCountEl.innerText = "データを読み込み中...";

        for (const file of dataFiles) {
            try {
                const response = await fetch(file);
                if (!response.ok) continue; // ファイルがまだ存在しなくてもスキップして次へ
                const text = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                
                const items = doc.querySelectorAll('.term-data');
                items.forEach(item => {
                    allTerms.push({
                        title: item.dataset.title || '',
                        yomi: item.dataset.yomi || '',
                        row: item.dataset.row || '', 
                        desc: item.innerHTML.trim() 
                    });
                });
            } catch (e) {
                console.error("読み込みエラー:", file, e);
            }
        }
        renderTerms();
    }

    // 3. 画面にマージして描画する処理
    function renderTerms() {
        const query = document.getElementById('searchInput').value.toLowerCase().trim();
        const container = document.getElementById('glossaryContainer');
        if (!container) return;
        container.innerHTML = ''; 

        const filtered = allTerms.filter(item => {
            const matchesSearch = item.title.toLowerCase().includes(query) || 
                                  item.yomi.includes(query) || 
                                  item.desc.toLowerCase().includes(query);
            
            const matchesFilter = (currentFilter === 'all') || (item.row === currentFilter);
            
            return matchesSearch && matchesFilter;
        });

        const resultCountEl = document.getElementById('resultCount');
        if (resultCountEl) {
            resultCountEl.innerText = `該当件数: ${filtered.length}件`;
        }

        if (filtered.length === 0) {
            container.innerHTML = '<div class="glossary-group"><p>該当する用語が見つかりませんでした。</p></div>';
            return;
        }

        const groupDiv = document.createElement('div');
        groupDiv.className = 'glossary-group';
        
        const displayTitle = currentFilter === 'all' ? '検索結果・全用語' : `${currentFilter}行`;
        let htmlContent = `<h2 class="group-title">${displayTitle}</h2>`;

        filtered.forEach(item => {
            htmlContent += `
                <div class="term-item">
                    <div class="term-title">${item.title}</div>
                    <div class="term-kana">${item.yomi}</div>
                    <div class="term-desc">${item.desc}</div>
                </div>
            `;
        });

        groupDiv.innerHTML = htmlContent;
        container.appendChild(groupDiv);
    }

    // 4. ボタンのクリックイベント
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');

            currentFilter = e.target.getAttribute('data-kana');
            renderTerms();
        });
    });

    // 5. キーワード検索のリアルタイム連動
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', renderTerms);
    }

    window.addEventListener('DOMContentLoaded', loadAllData);
</script>
</body>
</html>
