<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不動産用語集（即戦力版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            line-height: 1.7;
            color: #333;
            background-color: #f4f6f8;
        }
        header {
            background-color: #1e3d59;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        header h1 { font-size: 2rem; margin-bottom: 10px; }
        
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #1e3d59; }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }
        .filter-btn {
            background: #eee;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #ff6e40;
            color: #fff;
        }

        .glossary-group {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .group-title {
            font-size: 1.6rem;
            color: #1e3d59;
            border-bottom: 3px solid #1e3d59;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }
        .term-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #eee;
        }
        .term-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .term-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: #ff6e40;
            margin-bottom: 5px;
        }
        .term-kana {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 5px;
        }
        .term-desc { color: #444; }

        .result-count {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #666;
            text-align: right;
        }
    </style>
</head>
<body>

<header>
    <h1>不動産用語集</h1>
    <p>キーワード検索・50音フィルター機能付き</p>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="キーワードや読み仮名で検索（例：仲介、ばいかい、RC）...">
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-kana="all">すべて</button>
            <button class="filter-btn" data-kana="あ">あ</button>
            <button class="filter-btn" data-kana="か">か</button>
            <button class="filter-btn" data-kana="さ">さ</button>
            <button class="filter-btn" data-kana="た">た</button>
            <button class="filter-btn" data-kana="な">な</button>
            <button class="filter-btn" data-kana="は">は</button>
            <button class="filter-btn" data-kana="ま">ま</button>
            <button class="filter-btn" data-kana="や">や</button>
            <button class="filter-btn" data-kana="ら">ら</button>
            <button class="filter-btn" data-kana="わ">わ</button>
            <button class="filter-btn" data-kana="英数">英数</button>
        </div>
    </div>

    <div class="result-count" id="resultCount"></div>
    <div id="glossaryContainer"></div>
</div>

<script>
// 組み込み用の不動産用語データ（全199個）
const glossaryData = [
  { "term": "青色申告", "kana": "あおいろしんこく", "group": "あ", "desc": "不動産所得や事業所得がある人が、一定の帳簿を記録・保存することで最高65万円の特別控除など税制上の優遇を受けられる制度。" },
  { "term": "青田売り", "kana": "あおたうり", "group": "あ", "desc": "未完成の宅地や建物の売買契約を締結すること。新築分譲マンションや一戸建ての販売で一般的な手法。" },
  { "term": "空き家", "kana": "あきや", "group": "あ", "desc": "人が居住していない、または使用されていない住宅のこと。管理義務や特定空家への指定など、税制上のペナルティリスクがある。" },
  { "term": "空き家特別控除", "kana": "あきやとくべつこうじょ", "group": "あ", "desc": "相続した古い空き家やその跡地を売却した際、一定の要件を満たすことで譲渡所得から最高3000万円まで控除できる税制上の優遇措置。" },
  { "term": "空き家対策特措法", "kana": "あきやたいさくとくそほう", "group": "あ", "desc": "放置された空き家による治安・衛生の悪化を防ぐための法律。倒壊の危険がある物件を「特定空家」に指定し、解体や修繕を勧告・命令できる。" },
  { "term": "空き家バンク", "kana": "あきやばんく", "group": "あ", "desc": "地方自治体などが運営する、地域の空き家情報を提供・仲介するシステム。移住・定住促進や地域活性化を目的としている。" },
  { "term": "空室率", "kana": "あきしつりつ", "group": "あ", "desc": "賃貸マンションやアパートにおいて、全体の戸数のうち入居者がおらず空室になっている部屋の割合。不動産投資の収益性を測る指標。" },
  { "term": "明け渡し", "kana": "あけわたし", "group": "あ", "desc": "借主が不動産の占有を解き、貸主に対してその物件を自由に使える状態に戻して返すこと。原状回復を伴う。" },
  { "term": "明け渡し猶予制度", "kana": "あけわたしゆうよせいど", "group": "あ", "desc": "抵当権の実行により買い受けられた賃貸物件の入居者が、競売による買受人の決定後、最大6ヶ月間は即座の退去を猶予される制度。" },
  { "term": "アパート", "kana": "あぱーと", "group": "あ", "desc": "一般的に木造や軽量鉄骨造で作られた2〜3階建ての共同住宅。マンションに比べて建築コストが低く、賃料も比較的安価。" },
  { "term": "アパートローン", "kana": "あぱーとろーん", "group": "あ", "desc": "金融機関が提供する、賃貸用アパートや一棟マンションなどの投資用・事業用不動産を購入・建築するための融資（ローン）。" },
  { "term": "アパートローン審査", "kana": "あぱーとろーんしんさ", "group": "あ", "desc": "金融機関が投資用物件への融資可否を決める手続き。個人の属性（年収や勤務先）だけでなく、物件の収益性や担保価値が厳しく評価される。" },
  { "term": "アパート経営", "kana": "あぱーとけいえい", "group": "あ", "desc": "一棟アパートを所有し、各部屋を賃貸に出すことで、毎月の家賃収入（インカムゲイン）を得る不動産投資・事業のこと。" },
  { "term": "アメニティ", "kana": "あめにてぃ", "group": "あ", "desc": "住居や周辺環境における「快適性」「居心地の良さ」のこと。日当たり、通風、公園の近さなど、目に見えない付加価値を指す。" },
  { "term": "頭金", "kana": "あたまきん", "group": "あ", "desc": "不動産を購入する際、住宅ローンの融資額以外に、自己資金から現金で支払う物件代金の一部。通常は物件価格の1〜2割が目安。" },
  { "term": "頭金なし", "kana": "あたまきんなし", "group": "あ", "desc": "物件価格の全額（場合によっては諸費用も含む）を住宅ローンで賄い、自己資金の持ち出しゼロで購入すること（フルローン）。" },
  { "term": "頭金相場", "kana": "あたまきんそうば", "group": "あ", "desc": "住宅ローンを組んでマイホームを購入する際、一般的に用意すべきとされる現金の目安。物件価格の「10%〜20%」程度が理想とされる。" },
  { "term": "頭金割合", "kana": "あたまきんわりあい", "group": "あ", "desc": "物件の購入総額に対して、ローンではなく自己資金（頭金）で支払う金額の比率。この割合が高いほどローンの審査が有利になりやすい。" },
  { "term": "按分", "kana": "あんぶん", "group": "あ", "desc": "不動産取引において、土地と建物の総額から、それぞれの価値の比率に応じて価格を割り振ること。消費税や減価償却費の計算等に必須。" },
  { "term": "按分比率", "kana": "あんぶんひりつ", "group": "あ", "desc": "土地と建物がセットで販売される不動産において、全体の価格から土地と建物のそれぞれの価値を切り分けるための計算比率。" },
  { "term": "按分計算", "kana": "あんぶんけいさん", "group": "あ", "desc": "一戸建ての売買時や確定申告において、土地（非課税）と建物（課税）の価格を、固定資産税評価額などの比率を用いて計算し切り分けること。" },
  { "term": "按分単価", "kana": "あんぶんたんか", "group": "あ", "desc": "土地と建物が一体となった売買価格から、税金計算等のためにそれぞれの平米（坪）あたりに割り振られた、計算上の1単位あたりの価格。" },
  { "term": "按分計算書", "kana": "あんぶんけいさんしょ", "group": "あ", "desc": "不動産売買の決済時や確定申告において、購入総額から土地代（非課税）と建物代（課税・償却対象）をどのような根拠で分けたかを示す明細書。" },
  { "term": "アセット", "kana": "あせっと", "group": "あ", "desc": "英語で「資産」の意味。不動産投資の文脈では、投資対象となる土地、建物、マンションなどの物件を指す。" },
  { "term": "アセットマネジメント", "kana": "あせっとまねじめんと", "group": "あ", "desc": "投資用不動産の所有者に代わり、物件の資産価値を最大化するための運用計画の策定や管理を行う業務（AM）。" },
  { "term": "アセットクラス", "kana": "あせっとくらす", "group": "あ", "desc": "投資対象となる資産の種類・分類（不動産、国内株式、外国債券など）。不動産は安定したインカムゲインを生むクラスに属する。" },
  { "term": "アセット・アロケーション", "kana": "あせっとあろけーしょん", "group": "あ", "desc": "投資において、資金を不動産、株式、債券、現金などの異なる資産（アセット）にどのような割合で配分するかを決める運用戦略。" },
  { "term": "アセット・アプローチ", "kana": "あせっとあぷろーち", "group": "あ", "desc": "不動産鑑定評価や投資分析において、対象物件が持つ純資産（土地・建物の原価価値）の積み上げをベースにして価格を算出するアプローチ方法。" },
  { "term": "アセット・ライト", "kana": "あせっとらいと", "group": "あ", "desc": "不動産投資や企業経営において、自社で不動産などの重い資産（アセット）を極力持たず、賃貸やリースを活用して身軽に運営する手法。" },
  { "term": "アセット・バリュー", "kana": "あせっとばりゅー", "group": "あ", "desc": "不動産が持つ本来の「資産価値」のこと。土地の立地条件や建物の状態、将来生み出すであろう賃料収入などを総合して評価される。" },
  { "term": "安心R住宅", "kana": "あんしんあーるじゅうたく", "group": "あ", "desc": "耐震性があり、インスペクション（建物状況調査）実施済で、リフォーム情報が開示された国の基準を満たす中古住宅の標章。" },
  { "term": "アクセス", "kana": "あくせす", "group": "あ", "desc": "物件から最寄り駅、または主要都市への交通の便や所要時間のこと。不動産の資産価値や賃貸需要を左右する重要な指標。" },
  { "term": "相見積もり", "kana": "あいみつもり", "group": "あ", "desc": "建築工事やリフォーム、管理委託、売買の仲介査定などを依頼する際、複数の業者から同時に見積書を取り寄せて比較検討すること。" },
  { "term": "合決（相決）", "kana": "あいけつ", "group": "あ", "desc": "不動産取引や建築契約、賃貸募集において、複数の当事者や業者の間で、条件や意思決定を相互に合意・決定すること。" },
  { "term": "粗利益", "kana": "あらりえき", "group": "あ", "desc": "不動産会社などの営業活動において、売上高（仲介手数料など）から直接の売上原価を差し引いた、大まかな利益（売上総利益）。" },
  { "term": "粗利（あらり）", "kana": "あらり", "group": "あ", "desc": "売上高から売上原価を引いた最も基本的な利益（売上総利益）。不動産の売買仲介では、仲介手数料がそのまま粗利に近い扱いになる。" },
  { "term": "粗利率（あらりりつ）", "kana": "あらりりつ", "group": "あ", "desc": "売上高に対する粗利益（売上総利益）の割合。不動産仲介業は仕入れ原価がほとんどかからないため、この比率が非常に高い。" },
  { "term": "アフォーダブル住宅", "kana": "あふぉーだぶるじゅうたく", "group": "あ", "desc": "中間層から低所得層向けに、市場価格よりも安価で提供される「購入・維持が可能な価格帯」の良質な住宅のこと。" },
  { "term": "空き店舗", "kana": "あきてんぽ", "group": "あ", "desc": "商業ビルや商店街において、営業が行われておらず借り手を募集している状態の店舗物件。地域の経済状況を反映する指標。" },
  { "term": "空き区画", "kana": "あきくかく", "group": "あ", "desc": "分譲地や工業団地、月極駐車場、テナントビルなどにおいて、現在契約者がおらず新規の申し込みを受け付けている対象エリア。" },
  { "term": "空き駐車場", "kana": "あきちゅうしゃじょう", "group": "あ", "desc": "マンション敷地内や月極駐車場において、契約者がおらず現在利用者を募集している区画のこと。" },
  { "term": "空き家所有者", "kana": "あきやしょゆうしゃ", "group": "あ", "desc": "現在使用されていない住宅の登記上の持ち主。相続によって予期せず所有者になり、税制や管理方法に悩むケースが増えている。" },
  { "term": "空き家率", "kana": "あきやりつ", "group": "あ", "desc": "総住宅数に占める「空き家」の割合。地域の少子高齢化や不動産需要の過疎化、将来の資産価値を測る社会的な指標となる。" },
  { "term": "空きロット数", "kana": "あきろっとすう", "group": "あ", "desc": "貸しコンテナや月極駐車場、資材置き場、分譲区画などにおいて、現在、契約が埋まっておらず募集をかけている利用可能な残り区画数。" },
  { "term": "案内所", "kana": "あんないじょ", "group": "あ", "desc": "宅地分譲地や新築マンションの現地などで、買い手に対して物件の説明や契約手続きを臨時に行うために設置される宅建業法上の施設。" },
  { "term": "案内図", "kana": "あんないず", "group": "あ", "desc": "不動産のマイソク（販売図面）やパンフレットに掲載される物件の周辺地図。最寄り駅からのルートや主要施設の位置を示す。" },
  { "term": "案内用図面", "kana": "あんないようずめん", "group": "あ", "desc": "不動産会社が顧客を物件に案内する際、または店頭に掲示するために、間取り図、諸条件、地図などを1枚にまとめた「マイソク」のこと。" },
  { "term": "案内用図面作成", "kana": "あんないずめんさくせい", "group": "あ", "desc": "不動産会社が、管理している賃貸・売買物件の情報を流通させるため、間取り図や諸条件をまとめた広告用の図面を制作する業務。" },
  { "term": "案内用看板", "kana": "あんないかんばん", "group": "あ", "desc": "現地見学会やオープンハウスの会場へ買い手を誘導するために、道路沿いや物件前に設置される、経路や物件概要を示した看板。" },
  { "term": "売り主（売主）", "kana": "うりぬし", "group": "あ", "desc": "不動産売買取引において、対象となる土地や建物を売却する側の当事者。個人である場合と、不動産会社（宅建業者）である場合がある。" },
    { "term": "売り建て", "kana": "うりだて", "group": "あ", "desc": "土地の売買契約を先行して締結し、その後、売主や指定の建築業者と建物の建築請負契約を結んで住宅を建てる手法。プラン変更の自由度が比較的高い。" },
  { "term": "売り注文", "kana": "うりちゅうもん", "group": "あ", "desc": "不動産の所有者が、不動産仲介会社に対して「この条件で物件を売り出してほしい」と正式に売却の依頼や条件提示を行うこと。" },
  { "term": "売り急ぎ", "kana": "うりいそぎ", "group": "あ", "desc": "買い替えの資金調達やローンの返済、相続税の支払い期限などの理由から、相場よりも安い価格であっても不動産を早期に売却しようとすること。" },
  { "term": "売り物件", "kana": "うりぶっけん", "group": "あ", "desc": "現在、市場に売り出されており、購入が可能な状態にある土地や戸建て、一棟ビル、分譲マンションなどの不動産物件のこと。" },
  { "term": "移転登記", "kana": "いてんとうき", "group": "あ", "desc": "売買や相続、贈与などによって、不動産の所有権が旧所有者から新所有者へ移ったことを公的に証明するために、法務局の登記簿に記録する手続き。" },
  { "term": "遺言（いごん・ゆいごん）", "kana": "いごん", "group": "あ", "desc": "自分が亡くなった後の財産（不動産など）の処分方法や帰属先について、生前に法的効力を持つ形で残す意思表示。自筆証書遺言や公正証書遺言がある。" },
  { "term": "遺言執行者", "kana": "いごんしっこうしゃ", "group": "あ", "desc": "遺言書の内容を具体的に実現するために、必要な手続き（不動産の名義変更、預貯金の解約など）を行う法的権限と義務を持つ人のこと。" },
  { "term": "遺産分割", "kana": "いさんぶんかつ", "group": "あ", "desc": "亡くなった人（被相続人）が残した不動産や現金などの財産を、相続人全員の話し合いによって具体的に誰にどれだけ分けるかを決める手続き。" },
  { "term": "遺産分割協議", "kana": "いさんぶんかつきょうぎ", "group": "あ", "desc": "相続人全員が集まり、遺産の具体的な分け方を話し合う会議。成立には相続人全員の合意が必要で、内容をまとめた「協議書」を作成する。" },
  { "term": "遺産分割協議書", "kana": "いさんぶんかつきょうぎしょ", "group": "あ", "desc": "遺産分割協議で合意した内容をまとめた正式な書類。不動産の相続登記（名義変更）や預貯金の払い戻し手続きの際に提出が求められる。" },
  { "term": "遺産分割の禁止", "kana": "いさんぶんかつ の きんし", "group": "あ", "desc": "被相続人の遺言、または共同相続人全員の合意によって、一定の期間（最長5年）、遺産の分割を行わないように制限をかけること。" },
  { "term": "遺留分", "kana": "いりゅうぶん", "group": "あ", "desc": "配偶者や子供などの法定相続人に、遺言の内容に関わらず法律上最低限保障されている、遺産（不動産含む）の受け取り分のこと（兄弟姉妹にはない）。" },
  { "term": "遺留分侵害額請求", "kana": "いりゅうぶんしんがいがくせいきゅう", "group": "あ", "desc": "遺言や生前贈与によって自分の遺留分が侵害された相続人が、多くの財産を貰った人に対して、侵害された分を金銭で支払うよう求める権利。" },
  { "term": "一般媒介契約", "kana": "いっぱんばいかいけいやく", "group": "あ", "desc": "不動産の売却や賃貸募集を仲介業者に依頼する際、同時に複数の不動産会社へ重ねて依頼ができる契約形式。自分で買主を見つけることも可能。" },
  { "term": "一般定期借地権", "kana": "いっぱんていきしゃくちけん", "group": "あ", "desc": "契約期間を50年以上として土地を借りる権利。期間満了時に更新はなく、借主は建物を解体して更地で地主に返還しなければならない。" },
  { "term": "一般賃貸住宅", "kana": "いっぱんちんたいじゅうたく", "group": "あ", "desc": "公営住宅やUR都市機構などの公的な賃貸住宅とは異なり、民間のオーナーや不動産会社が一般的な市場価格で貸し出している賃貸物件のこと。" },
  { "term": "違約金", "kana": "いやくきん", "group": "あ", "desc": "売買契約などで当事者の一方が債務不履行（約束違反）を起こした際、損害賠償とは別に、相手方に支払うことをあらかじめ約束した金銭。" },
  { "term": "違約手付", "kana": "いやくてつけ", "group": "あ", "desc": "契約締結時に支払われる手付金の一種。債務不履行があった場合、買主側が違反すれば手付没収、売主側が違反すれば倍返しとなる性質を持つ。" },
  { "term": "一括査定", "kana": "いっかつさてい", "group": "あ", "desc": "インターネット上の専用サイトを利用して、物件情報を一度入力するだけで、複数の不動産会社から同時に売却見積もりや査定価格を受け取るシステム。" },
  { "term": "一括借上げ", "kana": "いっかつかりあげ", "group": "あ", "desc": "管理会社やサブリース業者が、アパート等の全戸をオーナーから一括して借り上げ、入居の有無に関わらず毎月一定の賃料を保証する仕組み。" },
  { "term": "一時使用目的の借地権", "kana": "いちじしようもくてきのしゃくちけん", "group": "あ", "desc": "プレハブの仮設事務所や工事用資材置き場など、客観的に見てごく短い期間だけ土地を使用するために設定される、借地借家法の適用を受けない借地権。" },
  { "term": "一時使用目的の借家契約", "kana": "いちじしようもくてきのしゃくかけいやく", "group": "あ", "desc": "建替え期間中の仮住まいや、博覧会期間中の店舗など、一時的な使用であることが明白な場合に結ぶ、借主の保護規定（更新等）が適用されない賃貸借契約。" },
  { "term": "一戸建て（一戸建）", "kana": "いっこだて", "group": "あ", "desc": "1棟でひとつの独立した住宅のこと。集合住宅と違い、敷地内の土地や建物をすべて所有できるため、管理費がなくリフォームの自由度が高い。" },
  { "term": "一棟売り", "kana": "いっとううり", "group": "あ", "desc": "分譲マンションのように部屋ごとではなく、アパートやマンション、商業ビルなどを、建物丸ごと1棟と土地をセットにして売却すること。" },
  { "term": "一棟買い", "kana": "いっとうがい", "group": "あ", "desc": "収益物件（投資用）として、マンションやアパート、オフィスビルなどを建物1棟丸ごと土地ごと購入すること。効率的な資産運用に向く。" },
  { "term": "居座り", "kana": "いすわり", "group": "あ", "desc": "賃貸借契約が解除されたり、競売で所有者が変わったりした後に、正当な権原がないにもかかわらず物件の退去に応じず占有し続ける状態。" },
  { "term": "位置指定道路", "kana": "いちしていどうろ", "group": "あ", "desc": "特定行政庁から位置の指定を受けた私道のこと。建築基準法上の道路とみなされるため、この私道に接していれば家を建てることができる。" },
  { "term": "印紙税", "kana": "いんしぜい", "group": "あ", "desc": "不動産の売買契約書、建築請負契約書、住宅ローンの金銭消費貸借契約書など、特定の課税文書を作成する際に、収入印紙を貼って消印することで納める国税。" },
  { "term": "隠れた瑕疵", "kana": "かくれたかし", "group": "あ", "desc": "不動産の売買契約時において、買主が一般的な注意を払っても容易に発見できなかった、建物の雨漏りやシロアリ被害、地中埋設物などの欠陥のこと。" },
  { "term": "インカムゲイン", "kana": "いんかむげいん", "group": "あ", "desc": "不動産を所有し、運用することで定期的・継続的に得られる収益のこと。不動産投資においては、毎月の「家賃収入」がこれに該当する。" },
  { "term": "インスペクション", "kana": "いんすぺくしょん", "group": "あ", "desc": "建物状況調査。専門の建築士（既存住宅状況調査技術者）が、住宅の基礎や外壁のひび割れ、雨漏りの有無などを目視や計測で診断する行為。" },
  { "term": "インターネット無料物件", "kana": "いんたーねっとむりょうぶっけん", "group": "あ", "desc": "大家さん側が一括して回線契約を支払っているため、入居者が個別にプロバイダ等と契約・負担をすることなく、入居後すぐに無料でネットが使える賃貸物件。" },
  { "term": "違法建築", "kana": "いほうけんちく", "group": "あ", "desc": "建築基準法や都市計画法などの法令、または義務付けられた手続き（建築確認など）を無視して建てられた、適法ではない状態の建築物のこと。" },
  { "term": "委任状", "kana": "いにんじょう", "group": "あ", "desc": "不動産の売買手続きや、法務局での登記申請、役所での書類取得などを、本人に代わって代理人に委ねることを証明するために作成する書類。" },
  { "term": "入居審査", "kana": "にゅうきょしんさ", "group": "あ", "desc": "賃貸物件の申し込み時に、貸主や管理会社、家賃保証会社が、借主の家賃支払い能力、勤務先、連帯保証人の有無、人柄などを総合的に確認する手続き。" },
  { "term": "入居申込書", "kana": "にゅうきょもうしこみしょ", "group": "あ", "desc": "気に入った賃貸物件を借りる意思を示すため、契約前に対象の不動産会社へ提出する書類。氏名、年収、勤務先、同居人などを記入する。" },
  { "term": "居宅", "kana": "きょたく", "group": "あ", "desc": "人が居住するための建物のこと。不動産登記簿の「種類」の欄において、店舗や事務所、工場などと区別して住宅を表す際に用いられる用語。" },
  { "term": "居室", "kana": "きょしつ", "group": "あ", "desc": "建築基準法上、居住、作業、娯楽などのために継続的に使用する部屋のこと。採光や換気の基準を満たす必要があり、満たさない場合は納戸（サービスルーム）となる。" },
  { "term": "入居費用", "kana": "にゅうきょひよう", "group": "あ", "desc": "賃貸物件を契約する際に必要となる初期費用の総称。敷金、礼金、前家賃、仲介手数料、火災保険料、保証会社利用料などが含まれる。" },
  { "term": "遺産", "kana": "いさん", "group": "あ", "desc": "亡くなった人（被相続人）から相続人に引き継がれる財産の総称。土地や建物などのプラスの財産だけでなく、借金や未払金などのマイナスの財産も含む。" },
  { "term": "意思能力", "kana": "いしのうりょく", "group": "あ", "desc": "自分が法律行為（不動産の売買契約や遺言の作成など）をした際、どのような結果が生じるかを正しく判断できる精神的な能力のこと。" },
  { "term": "一時金", "kana": "いちじきん", "group": "あ", "desc": "賃貸借契約の締結時などに、毎月の賃料とは別に、まとまった額で支払われる金銭の総称。敷金、礼金、建設協力金などがこれにあたる。" },
  { "term": "市場価値", "kana": "しじょうかち", "group": "あ", "desc": "マーケットにおいて、現実に成立する可能性が最も高いと考えられる不動産の売買・賃貸価格。需要と供給のバランスによって日々変動する。" },
  { "term": "市場分析", "kana": "しじょうぶんせき", "group": "あ", "desc": "不動産の開発や投資において、周辺の人口動態、競合物件の供給状況、家賃相場、ターゲット層のニーズなどを調査・分析すること。" },
  { "term": "居酒屋居抜き物件", "kana": "いざかやいぬきぶっけん", "group": "あ", "desc": "前店舗の厨房設備、カウンター、テーブル、内装造作、看板などがそのまま残された状態で賃貸に出される、初期費用を抑えて開業できる店舗物件。" },
  { "term": "意匠", "kana": "いしょう", "group": "あ", "desc": "製品や建築物の外観におけるデザイン、形状、模様、色彩、またはそれらが組み合わさった装飾的な美しさや工夫のこと。" },
  { "term": "委託管理", "kana": "いたくかんり", "group": "あ", "desc": "分譲マンションの管理組合や賃貸オーナーが、建物の清掃、設備の点検、家賃の回収などの業務を、専門のマンション管理会社へ委託して行う方式。" },
  { "term": "委託管理費", "kana": "いたくかんりひ", "group": "あ", "desc": "業務を外部の不動産管理会社に委託する際に、対価として支払う毎月の費用。業務の範囲（巡回、常駐、事務のみなど）によって金額が変わる。" },
  { "term": "一部所有権", "kana": "いちぶしょゆうけん", "group": "あ", "desc": "1つの不動産（土地や建物）を、複数の人数で割合（持分）を決めて共同で所有している場合の、それぞれの人が持つ所有権（共有持分）。" },
  { "term": "一括納付", "kana": "いっかつのうふ", "group": "あ", "desc": "分割払いが認められている税金（固定資産税や相続税など）や費用について、期日にまとめて全額を一度に支払う（納付する）こと。" },
    { "term": "一括返済", "kana": "いっかつへんさい", "group": "あ", "desc": "住宅ローンやアパートローンなどの借入金について、期日前、または期日に残債の全額を一度にまとめて返済すること（繰り上げ一括返済など）。" },
  { "term": "一世帯", "kana": "いっせたい", "group": "あ", "desc": "住居と生計を共にする人の集まり、または独立して一つの住居に暮らす単独の人のこと。賃貸物件の入居可能人数の基準などに用いられる。" },
  { "term": "一般定期借家契約", "kana": "いっぱんていきしゃくかけいやく", "group": "あ", "desc": "契約期間が満了すると更新がなく、確実に契約が終了する賃貸借契約。貸主は事前に書面での説明が必要で、期間は自由に設定できる。" },
  { "term": "一般法人", "kana": "いっぱんほうじん", "group": "あ", "desc": "社団法人や財団法人のうち、公益性の認定を受けていない法人のこと。所有不動産の管理会社（プライベートカンパニー）をこの形式にするケースもある。" },
  { "term": "移転補償", "kana": "いてんほしょう", "group": "あ", "desc": "公共事業などのために土地を国や自治体に譲渡・明け渡す際、その土地の上にある建物などを他の場所へ移転するために支給される補償金。" },
  { "term": "遺留分侵害額の計算", "kana": "いりゅうぶんしんがいがくのけいさん", "group": "あ", "desc": "相続において遺留分がどれだけ侵害されたかを算出する処理。不動産の評価額、生前贈与、債務（借金）などを基に複雑な計算を行う。" },
  { "term": "依存関係", "kana": "いぞんかんけい", "group": "あ", "desc": "不動産取引や相続において、一つの契約や法律上の効果が、別の契約や前提条件（特約の成否、他者の同意など）に縛られている状態のこと。" },
  { "term": "違約による解除", "kana": "いやくによるかいじょ", "group": "あ", "desc": "売買契約等において、当事者の一方に重大な義務違反（手付金や代金の未払いなど）があった場合に、もう一方が契約を強制的に解約すること。" },
  { "term": "入居開始日", "kana": "にゅうきょかいしび", "group": "あ", "desc": "賃貸借契約において、借主が実際に物件を使用・居住できるようになる日。原則としてこの日から家賃（賃料）が発生する（賃貸借開始日）。" },
  { "term": "入居率", "kana": "にゅうきょりつ", "group": "あ", "desc": "賃貸マンションやアパート全体の戸数のうち、実際に契約・入居されている部屋の割合。空室率の逆で、一棟物件の収益健全性を測る最重要指標。" },
  { "term": "引渡（引渡し）", "kana": "ひきわたし", "group": "あ", "desc": "売買や賃貸において、物件の占有（管理権・使用権）を売主（貸主）から買主（借主）へ移すこと。鍵の受け渡しをもって完了とするのが一般的。" },
  { "term": "引渡日", "kana": "ひきわたしび", "group": "あ", "desc": "不動産の取引が最終的に完了し、物件（鍵）が買い手や借り手に渡される予定日のこと。売買では代金全額の決済と同日に行われる。" },
  { "term": "請負契約", "kana": "うけおいけいやく", "group": "あ", "desc": "建築工事やリフォームを依頼する際、施工業者が「工事の完成」を約束し、発注者がその「成果に対する報酬」を支払うことを交わす契約。" },
  { "term": "内金", "kana": "うちきん", "group": "あ", "desc": "不動産売買において、売買代金の一部として前払いされる金銭。手付金とは異なり、契約を解除する権利（手付解除）を担保する性質を持たない。" },
  { "term": "内訳明細", "kana": "うちわけめいさい", "group": "あ", "desc": "不動産取引の諸費用、建築の見積もり、賃貸の初期費用などにおいて、総額の根拠となる一つひとつの項目と金額を詳しく記した書面。" },
  { "term": "営業権", "kana": "えいぎょうけん", "group": "あ", "desc": "店舗や企業が持つ、立地や顧客、ノウハウなどの無形の財産価値（のれん）。店舗の居抜き売買（造作譲渡）の際に評価対象となることがある。" },
  { "term": "駅物件", "kana": "えきぶっけん", "group": "あ", "desc": "最寄り駅から極めて近い場所（徒歩数分圏内）に位置する不動産。生活利便性が高く、賃貸需要や資産価値が落ちにくいという特長を持つ。" },
  { "term": "延滞", "kana": "えんたい", "group": "あ", "desc": "家賃や住宅ローンの返済、固定資産税などの税金を、あらかじめ定められた期限までに支払わず、期日を過ぎて遅れている状態のこと。" },
  { "term": "延滞利息（延滞金）", "kana": "えんたいりそく", "group": "あ", "desc": "各種支払い（家賃・ローン・税金）が期日に遅れた際、遅れた日数に応じてペナルティとして加算・徴収される遅延損害金のこと。" },
  { "term": "大口投資家", "kana": "おおぐちとうしか", "group": "あ", "desc": "一件あたり、あるいは一ファンドあたりに巨額の資金を投入する投資家のこと。一棟ビルや大規模な開発物件の主な買い手となる。" },
  { "term": "オーナー", "kana": "おーなー", "group": "あ", "desc": "不動産の「所有者（大家さん）」のこと。特に賃貸経営においては、建物を所有し、入居者に部屋を貸し出して賃料収入を得ている個人・法人。" },
  { "term": "オーナーチェンジ", "kana": "おーなーちぇんじ", "group": "あ", "desc": "賃貸物件に入居者が住んだままの状態で、その不動産（一戸建てや区分マンション、一棟アパートなど）を丸ごと売却し、所有者を変更すること。" },
  { "term": "オーナー管理", "kana": "おーなーかんり", "group": "あ", "desc": "管理会社を挟まず、大家さん（オーナー）自身が賃貸物件の入居者対応、清掃、家賃回収、修繕手配などをすべて自主的に行う管理方式（自主管理）。" },
  { "term": "おとり物件", "kana": "おとりぶっけん", "group": "あ", "desc": "実際には存在しない、またはすでに成約済みで契約できない好条件の物件を、集客のためにネットや店頭に掲載し続ける違法な広告行為。" },
  { "term": "覚書（おぼえがき）", "kana": "おぼえがき", "group": "あ", "desc": "契約の内容を補足・変更する際や、当事者間で合意した特定の事項を簡潔に記録するために作成する、契約書に準じた効力を持つ合意文書。" },
  { "term": "親族間売買", "kana": "しんぞくかんばいばい", "group": "あ", "desc": "親子や兄弟などの身内同士で行う不動産の売買。相場より極端に安い価格で取引すると、差額が「みなし贈与」と判定され贈与税がかかるリスクがある。" },
  { "term": "空き地", "kana": "あきち", "group": "あ", "desc": "建物が建っておらず、特定の目的で使用されていない土地。雑草の繁茂やゴミの不法投棄など、売買や相続前の管理上の問題が生じやすい。" },
  { "term": "空き地管理", "kana": "あきちかんり", "group": "あ", "desc": "所有している未利用の土地について、定期的な草刈りやゴミの不法投棄防止フェンスの設置など、近隣トラブルや行政指導を防ぐための維持活動。" },
  { "term": "空き部屋", "kana": "あきべや", "group": "あ", "desc": "賃貸物件において、入居者がおらず現在募集中の状態にある部屋。空室率の計算ベースとなる。" },
  { "term": "案内看板設置", "kana": "あんないかんばんせっち", "group": "あ", "desc": "新築一戸建ての現地見学会などへ顧客をスムーズに誘導するため、週末に交差点や物件付近（許可を取得した場所）に看板を置く宅建業者の実務。" },
  { "term": "按分比率計算", "kana": "あんぶんひりつけいさん", "group": "あ", "desc": "マイホームや投資用物件を購入した際、土地代（非課税）と建物代（課税）の内訳を、固定資産税評価額の比率等を用いて算出する確定申告等の処理。" },
  { "term": "按分計算の特約", "kana": "あんぶんけいさんのとくやく", "group": "あ", "desc": "不動産売買契約において、土地と建物の価格内訳を「固定資産税評価額の比率による」など、事前に計算方法を合意しておくための条項。" },
  { "term": "安全確認", "kana": "あんぜんかくにん", "group": "あ", "desc": "不動産の現地案内（内見）の際や、建築工事の開始前に、足元の段差、設備の作動状態、周囲の環境に危険がないかを現場で目視・点検する行為。" },
  { "term": "安全性評価", "kana": "あんぜんせいひょうか", "group": "あ", "desc": "不動産鑑定や取引において、対象物件の耐震性、ハザードマップ（洪水・土砂災害など）上の位置、地盤強度などを総合的に査定すること。" },
  { "term": "案内図作成ソフト", "kana": "あんないずさくせいそふと", "group": "あ", "desc": "不動産業者が物件の販売図面（マイソク）を制作する際、最寄り駅から物件までのルートや周辺施設を分かりやすく描くための専門地図ソフト。" },
  { "term": "案内用図面配布業務", "kana": "あんないようずめんはいふぎょうむ", "group": "あ", "desc": "管理している賃貸・売買物件の情報をいち早く成約させるため、物件詳細や間取りを載せた図面を近隣の客付け不動産会社に配る営業活動。" },
  { "term": "青色申告特別控除", "kana": "あおいろしんこくとくべつこうじょ", "group": "あ", "desc": "不動産所得の確定申告において、複式簿記での記帳や電子申告を行うなど一定の要件を満たすことで、最高65万円を所得から差し引ける税制優遇。" },
  { "term": "青色事業専従者給与", "kana": "あおいろじぎょうせんじゅうしゃきゅうよ", "group": "あ", "desc": "不動産賃貸業（事業規模）を行う青色申告者が、生計を一にする配偶者や親族に支払った適正な給与を、全額必要経費に算入できる制度。" },
  { "term": "空き家再生", "kana": "あきやさいせい", "group": "あ", "desc": "放置された古い空き家を売買・相続後にリノベーションし、賃貸住宅、カフェ、シェアハウス等に生まれ変わらせて利活用する取り組み。" },
  { "term": "空き家処分", "kana": "あきやしょぶん", "group": "あ", "desc": "相続等で引き継いだ利用予定のない空き家について、売却、解体して更地売却、または自治体への寄付などを通じて手放すための一連の手続き。" },
  { "term": "空き家特例", "kana": "あきやとくれい", "group": "あ", "desc": "相続した空き家（昭和56年5月31日以前に建築）を売却した際、一定の耐震基準を満たすか更地にすることで、譲渡所得から3000万円が控除される税制の特例。" },
  { "term": "明け渡し期日", "kana": "あけわたしきじつ", "group": "あ", "desc": "売買契約や賃貸借契約の解約において、現入居者や売主が物件から退去し、荷物をすべて撤去して相手方に引き渡さなければならない最終期限。" },
  { "term": "明け渡し訴訟", "kana": "あけわたしそしょう", "group": "あ", "desc": "家賃の長期滞納や不法占有（居座り）が続く借主に対し、貸主が裁判所を通じて、物件の強制的な退去と返還を求めて起こす民事訴訟。" },
  { "term": "アパートローン借換え", "kana": "あぱーとろーんかえかえ", "group": "あ", "desc": "現在借りている投資用不動産ローンから、より金利が低い他の金融機関のローンへ乗り換えることで、毎月の返済額を減らす財務の手法。" },
  { "term": "アパート建築", "kana": "あぱーとけんちく", "group": "あ", "desc": "所有する土地の有効活用や相続税の評価額引き下げ（節税）を目的として、新たに賃貸用のアパートやマンションを建てること。" },
  { "term": "アメニティ施設", "kana": "あめにてぃしせつ", "group": "あ", "desc": "マンション内や周辺にある、居住者の快適な生活をサポートする共有設備。宅配ボックス、キッズルーム、敷地内のゴミ置き場などが該当。" },
  { "term": "頭金調達", "kana": "あたまきんちょうたつ", "group": "あ", "desc": "不動産購入時にローンのほかに必要となる自己資金（頭金や諸費用）を、預貯金の解約、親からの資金贈与などを通じて用意すること。" },
  { "term": "頭金なしローン", "kana": "あたまきんなしろーん", "group": "あ", "desc": "物件価格の100％を融資する「フルローン」や、諸費用まで含めて貸し出すローンのこと。手元の現金を残したまま不動産を購入できる。" },
  { "term": "アセット・マネジャー", "kana": "あせっとまねじゃー", "group": "あ", "desc": "不動産投資ファンドや富裕層などの所有者に代わり、物件の運用・管理計画の立案、売却時期の決定などを行い、資産価値の最大化を担う専門職（AM）。" },
  { "term": "安心R住宅標章", "kana": "あんしんあーるじゅうたくひょうしょう", "group": "あ", "desc": "国の基準（耐震性・インスペクション済み・リフォーム情報開示）をクリアした良質な中古住宅の広告にのみ掲載が許される、安心のマーク。" },
  { "term": "アクセシブル住宅", "kana": "あくせしぶるじゅうたく", "group": "あ", "desc": "高齢者や障害を持つ人が移動・生活しやすいよう、段差の解消や手すりの設置など、バリアフリーに配慮して設計された住宅。" },
  { "term": "相見積もり比較", "kana": "あいみつもりひかく", "group": "あ", "desc": "不動産の売却査定、管理委託、修繕・リフォーム工事などの際、複数の業者から取った見積書を金額やサービス面で徹底的に比べること。" },
  { "term": "空き区画募集", "kana": "あきくかくぼしゅう", "group": "あ", "desc": "月極駐車場やテナントビル、大型の分譲地などにおいて、現在契約が空いているスペースに対して、新しい利用者を募るための広告活動。" },
  { "term": "空き店舗対策", "kana": "あきてんぽたいさく", "group": "あ", "desc": "商店街や商業ビルでテナントの退去が相次いだ際、地域活性化やビル価値維持のために、リノベーションや補助金を用いて新規出店を促す取り組み。" },
  { "term": "空き部屋対策", "kana": "あきべやたいさく", "group": "あ", "desc": "賃貸マンションの空室を埋めるため、フリーレントの導入、家賃の見直し、ネット無料化、ステージング（演出）などを行う一連の経営努力。" },
  { "term": "アパート経営リスク", "kana": "あぱーとけいえいりすく", "group": "あ", "desc": "不動産投資に伴う代表的なリスク。空室リスク、家賃滞納、金利上昇、建物の老朽化による修繕費の増加、災害リスクなどが挙げられる。" },
  { "term": "アパートローン金利", "kana": "あぱーとろーんきんり", "group": "あ", "desc": "収益物件（アパートや一棟マンション）を建築・購入する際の融資に適用される利息の割合。住宅ローンよりも高めに設定されるのが一般的。" },
  { "term": "アセット・アロケーション戦略", "kana": "あせっとあろけーしょんせんりゃく", "group": "あ", "desc": "投資家がリスクを分散するため、手持ちの全資金を「不動産」「株式」「債券」「現金」などの各資産へどのような割合で配分するかを決める方針。" },
  { "term": "案内所設置届出", "kana": "あんないじょせっちとどけで", "group": "あ", "desc": "宅建業者が分譲マンションの現地などに臨時の案内所（契約を行う場所）を設ける際、業務開始の10日前までに管轄の都道府県知事等へ提出する書類。" },
  { "term": "売り主の担保責任", "kana": "うりぬしのたんぽせきにん", "group": "あ", "desc": "引き渡した不動産に、契約内容と異なる欠陥（雨漏りやシロアリ等）が見つかった際、売主が買主に対して負うべき修繕や損害賠償などの法的な責任。" },
  { "term": "売り建て工法", "kana": "うりだてこうほう", "group": "あ", "desc": "土地を先に売買し、その後で買主の希望を取り入れた建築請買契約を結ぶ方式。建売住宅よりも間取りや設備のカスタマイズがしやすい。" },
  { "term": "移転登記費用", "kana": "いてんとうきひよう", "group": "あ", "desc": "不動産の所有権を移す登記（名義変更）を行う際に発生する実費。国に納める「登録免許税」と、手続きを代行する「司法書士への報酬」で構成される。" },
  { "term": "遺言書（いごんしょ・ゆいごんしょ）", "kana": "いごんしょ", "group": "あ", "desc": "自分の死後、不動産や預貯金などの財産を誰にどう引き継がせるかを記した法的書面。遺産分割のトラブル（争続）を防ぐ最も有効な手段の一つ。" },
  { "term": "遺言書の検認", "kana": "いごんしょのけんにん", "group": "あ", "desc": "自筆証書遺言などを発見した際、家庭裁判所で相続人の立ち会いのもと中身を確認し、遺言書の偽造・変造を防ぐための法的な手続き。" },
  { "term": "遺産分割協議のやり直し", "kana": "いさんぶんかつきょうぎのやりなおし", "group": "あ", "desc": "一度成立した遺産分割であっても、相続人全員の同意があれば合意を白紙に戻して再協議すること。ただし、税務上は再度の贈与とみなされるリスクがある。" },
  { "term": "遺留分侵害額の請求期限", "kana": "いりゅうぶんしんがいがくのせいきゅうきげん", "group": "あ", "desc": "遺留分を侵害された相続人が金銭請求できる期限。相続の開始および遺留分を侵害する贈与等があったことを知った時から「1年間」で時効となる。" },
  { "term": "一般定期借地権マンション", "kana": "いっぱんていきしゃくちけんまんしょん", "group": "あ", "desc": "土地は地主から50年以上の長期で借り、建物部分のみを購入する分譲マンション。土地の取得税や固定資産税がかからず、割安で購入できる。" },
  { "term": "違約金特約", "kana": "いやくきんとくやく", "group": "あ", "desc": "不動産売買契約書に盛り込まれる条項。万が一、契約違反（代金不払いなど）で解除となった場合、相手方に支払うペナルティの金額をあらかじめ定めたもの。" },
  { "term": "一括査定サイト", "kana": "いっかつさていさいと", "group": "あ", "desc": "ネット上で物件の住所や広さを入力するだけで、複数の不動産会社へ同時に売却の査定依頼を送り、価格を比較できる便利なWebサービス。" },
  { "term": "一時使用目的の賃貸借", "kana": "いちじしようもくてきのちんたいしゃく", "group": "あ", "desc": "建替え期間中の仮住まいなど、短期間の利用であることが明らかな賃貸契約。借主を強く保護する借地借家法の更新規定が適用されない。" },
  { "term": "位置指定道路の申請", "kana": "いちしていどうろのしんせい", "group": "あ", "desc": "家を建てるための接道義務を果たすため、私道を建築基準法上の道路として認めてもらえるよう、特定行政庁（役所）に対して行う申請手続き。" },
  { "term": "インカムゲイン狙い", "kana": "いんかむげいんねらい", "group": "あ", "desc": "物件の値上がり益（売却益）を追うのではなく、毎月安定して入ってくる「家賃収入」を主な目的として不動産を購入・運用する投資スタンス。" },
  { "term": "入居審査基準", "kana": "にゅうきょしんさきじゅん", "group": "あ", "desc": "家賃の支払い能力（年収に対する家賃比率）や、職業、勤続年数、保証会社の承認、過去の滞納履歴など、管理会社やオーナーが設定する入居の可否基準。" },
  { "term": "入居申込書の提出", "kana": "にゅうきょもうしこみしょのていしゅつ", "group": "あ", "desc": "賃貸物件を借りる意思が固まった段階で、自分の個人情報や連帯保証人の内容を記入した書類を不動産会社に渡し、部屋の確保と審査を依頼する行為。" },
  { "term": "請負契約書（うけおいけいやくしょ）", "kana": "うけおいけいやくしょ", "group": "あ", "desc": "注文住宅の建築やリフォームを行う際、施主と施工業者の間で交わす正式な契約書。工事代金、工期、引き渡し時期、仕様などが明記される。" },
  { "term": "オーナーチェンジ物件", "kana": "おーなーちぇんじぶっけん", "group": "あ", "desc": "現在、賃貸中で入居者が入っている状態のまま売り出されている投資用不動産。購入直後から家賃収入が得られるのが最大のメリット。" },
  { "term": "おとり広告", "kana": "おとりこうこく", "group": "あ", "desc": "実際には契約できない（売却済み・存在しない）魅力的な物件をネットに載せ、それを見た客を来店させて別の物件を勧める違法な集客手法。" },
  { "term": "青色申告のメリット", "kana": "あおいろしんこくのめりっと", "group": "あ", "desc": "不動産所得の確定申告を青色で行う利点。最高65万円の控除、家族への給与を経費にできる（専従者給与）、赤字を3年間繰り越せる等がある。" },
  { "term": "空き家再生ビジネス", "kana": "あきやさいせいびじねす", "group": "あ", "desc": "市場価値の落ちた古い空き家を安く仕入れ（または借り受け）、リノベーションして賃貸に出したり、店舗や宿泊施設として蘇らせて収益化する事業。" },
  { "term": "明け渡し費用", "kana": "あけわたしひよう", "group": "あ", "desc": "賃貸物件の退去時にかかる費用の総称。借主が負担すべき原状回復費用（故意・過失による汚損の補修費）や、引っ越し費用などがこれに該当する。" },
  { "term": "アパート建築費用", "kana": "あぱーとけんちくひよう", "group": "あ", "desc": "賃貸アパートを新築する際にかかる総コスト。建物の本体工事費、外構（駐車場や植栽）工事費、設計費、各種税金やローン手数料などが含まれる。" },
  { "term": "頭金の準備", "kana": "あたまきんのじゅんび", "group": "あ", "desc": "マイホーム購入の計画において、住宅ローンの借り入れ額を抑え、毎月の返済を楽にするために、自己資金（現金）を計画的に貯蓄・用意すること。" },
  { "term": "アセットマネジメント業務", "kana": "あせっとまねじめんとぎょうむ", "group": "あ", "desc": "不動産投資ファンド等において、物件の購入から日常の運用（PM会社への指示）、リノベーション計画、最終的な売却までを統括し、利回りを最大化する業務。" },
  { "term": "相見積もりのマナー", "kana": "あいみつもり の まなー", "group": "あ", "desc": "複数の不動産会社や施工業者に見積もりを依頼する際、あらかじめ「他社にも声をかけて比較している」と正直に伝え、断る際も誠実に連絡を入れる配慮。" },
  { "term": "空き店舗の活用", "kana": "あきてんぽのかつよう", "group": "あ", "desc": "シャッター街やビル内の空き店舗を、コワーキングスペース、地域のコミュニティスペース、ネット通販の配送拠点（ダークストア）等に転用する取り組み。" },
  { "term": "売り主の義務", "kana": "うりぬし の ぎむ", "group": "あ", "desc": "不動産売買取引において売主が果たすべき法的な役割。物件を約束通りの状態で引き渡すこと、所有権移転登記の手続きに協力することなど。" },
  { "term": "移転登記の手続き", "kana": "いてんとうき の てつづき", "group": "あ", "desc": "売買や相続で不動産の持ち主が変わった際、新しい所有者の名義に変更するため、必要書類（登記原因証明情報、印鑑証明等）を揃えて法務局に申請する流れ。" },
  { "term": "遺産分割協議書の書き方", "kana": "いさんぶんかつきょうぎしょ の かきかた", "group": "あ", "desc": "相続人全員の合意内容を記す書面の作成法。不動産は登記簿の通り正確に記載し、実印の押印と印鑑証明書の添付がないと名義変更に使用できない。" },
  { "term": "一般定期借地権のメリット", "kana": "いっぱんていきしゃくちけん の めりっと", "group": "あ", "desc": "土地を購入するよりも初期費用が格段に安く抑えられる点。また、土地に対する固定資産税や都市計画税を毎年支払う必要がない点。" },
  { "term": "一括査定の注意点", "kana": "いっかつさてい の ちゅういてん", "group": "あ", "desc": "ネットの一括査定で提示される価格はあくまで「売れそうな予想価格」であり、契約を欲しさにわざと高すぎる査定額を出す業者に惑わされないようにする心構え。" },
  { "term": "入居審査の期間", "kana": "にゅうきょしんさ の きかん", "group": "あ", "desc": "賃貸の申し込みをしてから結果が出るまでの日数。一般的には「3日〜1週間」程度。書類の不備や、本人・連帯保証人への電話確認が遅れると長引く。" },
  { "term": "請負契約の解除", "kana": "うけおいけいやく の かいじょ", "desc": "注文住宅の建築中などに、施主の都合で工事を取りやめること。着工後であれば、それまでにかかった実費や業者の損害を賠償して解約することになる。" },
  { "term": "おとり広告の罰則", "kana": "おとりこうこく の ばっそく", "group": "あ", "desc": "成約済みの物件などをネットに載せ続けた不動産業者に対し、不動産公正取引協議会から「厳重警告」や「違約金」、最悪の場合は広告掲載禁止などの処分が下されること。" },
  { "term": "青色申告特別控除の要件", "kana": "あおいろしんこくとくべつこうじょ の ようけん", "group": "あ", "desc": "最高65万円の控除を受けるための条件。アパートなら10室以上、一戸建てなら5棟以上の「事業規模」で賃貸経営を行い、複式簿記で記録し電子申告すること。" },
  { "term": "空き家特例の要件", "kana": "あきやとくれい の ようけん", "group": "あ", "desc": "相続空き家の3000万円控除を受けるための主な縛り。昭和56年5月31日以前の旧耐震基準の家であること、相続から3年目の年の12月末までに売ることなど。" },
  { "term": "明け渡し訴訟の費用", "kana": "あけわたしそしょう の ひよう", "group": "あ", "desc": "悪質な滞納者を退去させる裁判にかかるコスト。弁護士費用や裁判所への予納金のほか、強制執行（荷物の搬出・保管）まで行うと数十万〜百万円以上の負担になる。" },
  { "term": "アパート建築の利回り", "kana": "あぱーとけんちく の りまわり", "group": "あ", "desc": "投資した建築総額（土地代含む）に対し、年間でどれだけの家賃収入が得られるかの割合。新築時は表面利回りで「7%〜10%」前後がひとつの目安となる。" },
  { "term": "頭金と諸費用の違い", "kana": "あたまきん と しょひよう の ちがい", "group": "あ", "desc": "頭金は「物件価格の一部」に充てられる現金。諸費用は「登記費用、ローン手数料、仲介手数料、保険料」など、取引そのものにかかる全く別の現金のこと。" },
  { "term": "アセットマネジメントとプロパティマネジメントの違い", "kana": "あせっとまねじめんと と ぷろぱてぃまねじめんと の ちがい", "group": "あ", "desc": "アセットマネジメント（AM）は資産の運用や売買など「経営的判断」を行う業務。プロパティマネジメント（PM）は現場の清掃や入居者対応など「実務的管理」を行う業務。" },
  { "term": "安心R住宅の基準", "kana": "あんしんあーるじゅうたく の きじゅん", "group": "あ", "desc": "①新耐震基準に適合、②インスペクションで構造上の欠陥や雨漏りがない、③リフォーム済、またはリフォーム提案・見積書付き、④購入者に過去の修繕履歴を開示すること。" },
  { "term": "アンカー効果", "kana": "あんかーこうか", "group": "あ", "desc": "不動産価格の交渉において、最初に提示された価格（売出価格など）が基準（アンカー）となり、その後の値引き交渉や意思決定に強く影響を与える心理現象。" },
  { "term": "あんしん解体業者認定", "kana": "あんしんかいたいぎょうしゃにんてい", "group": "あ", "desc": "古い空き家などを解体する際、法令遵守や近隣対策、適切な廃材処理を行う優良な解体業者を国や第三者機関が認定・推奨する制度。" },
  { "term": "安全な取引（不動産）", "kana": "あんぜんなとりひき", "group": "あ", "desc": "詐欺や二重譲渡、境界トラブル、隠れた欠陥などのリスクを排除するため、宅地建物取引士が重要事項説明を行い、司法書士が同席して代金決済と登記を同時に行う仕組み。" },
  { "term": "案内用図面テンプレート", "kana": "あんないようずめんてんぷれーと", "group": "あ", "desc": "不動産会社が物件チラシ（マイソク）を効率よく作成するために、間取り図や物件概要、賃当条件の配置があらかじめ決まっているデータ雛形。" },
  { "term": "按分計算書の作成", "kana": "あんぶんけいさんしょのさくせい", "group": "あ", "desc": "不動産の売買において、売買契約書に土地と建物の内訳価格が明記されていない場合、固定資産税評価額を基に比率を割り出し、税務署に提出する明細を作る実務。" },
  { "term": "按分計算の注意点", "kana": "あんぶんけいさんのちゅういてん", "group": "あ", "desc": "建物の比率を意図的に高くして減価償却費を増やそうとすると、税務調査で否認されるリスクがあるため、客観的で合理的な基準（評価額比率など）を用いるべきという留意点。" },
  { "term": "安定収入（不動産投資）", "kana": "あんていしゅうにゅう", "group": "あ", "desc": "株式投資などの乱高下に比べ、不動産投資（特に住居系）は家賃が急激に下がりにくく、毎月決まった時期にまとまった現金が手に入るインカムゲインの強みを指す言葉。" },
  { "term": "空き地処分", "kana": "あきちしょぶん", "group": "あ", "desc": "利用予定のない所有地や相続した土地について、売却、隣人への譲渡、または自治体への寄付などを検討し、固定資産税の負担や管理義務から解放されるための手続き。" },
  { "term": "空き区画管理", "kana": "あきくかくかんり", "group": "あ", "desc": "不動産管理会社やオーナーが、月極駐車場やコンテナ、テナントの空き状況をリアルタイムで把握し、機会損失が出ないよう速やかに募集をかける業務。" },
  { "term": "空き駐車場管理", "kana": "あきちゅうしゃじょうかんり", "group": "あ", "desc": "分譲マンションの管理組合や月極駐車場のオーナーが、空き区画の把握、外部貸し出しの検討、募集看板の設置などを通じて、駐車料収入の最大化を図る業務。" },
  { "term": "空き家見回りサービス", "kana": "あきやみまわりさーびす", "group": "あ", "desc": "遠方に住む所有者に代わり、不動産会社や警備会社が定期的に空き家を訪れ、通風、簡易清掃、雨漏りや不審者の有無を確認する有償サービス。" },
  { "term": "空き家再生プロデューサー", "kana": "あきやさいせいぷろでゅーさー", "group": "あ", "desc": "全国で深刻化する空き家問題に対し、物件の調査、リノベーション企画、地域のニーズに合わせた利活用提案を行う専門家・資格。" },
  { "term": "空き家対策の税制", "kana": "あきやたいさくのぜいせい", "group": "あ", "desc": "適切な管理が行われていない「特定空家」等に指定されると、敷地に対する固定資産税の優遇措置（最大6分の1に軽減）が解除され、税負担が実質6倍に跳ね上がる仕組み。" },
  { "term": "空き家所有者の義務", "kana": "あきやしょゆうしゃのぎむ", "group": "あ", "desc": "空き家対策特措法に基づき、所有者が建物の倒壊、害虫の発生、不審者の侵入などを防ぐため、周囲の安全や衛生を損なわないよう適切に管理・維持しなければならない法的責任。" },
  { "term": "空き家率の推移", "kana": "あきやりつのすいい", "group": "あ", "desc": "総務省の住宅・土地統計調査などで発表される、国内の全住宅に対する空き家の割合の変動。地域の賃貸需要や将来の地価を予測するマクロ経済指標。" },
  { "term": "明け渡し猶予", "kana": "あけわたしゆうよ", "group": "あ", "desc": "競売によって賃貸物件のオーナーが変わった際、入居者が即座に退去を迫られるのを防ぐため、買受人の決定から「最長6ヶ月間」は住み続けられる法律上の救済措置。" },
  { "term": "明け渡し交渉", "kana": "あけわたしこうしょう", "group": "あ", "desc": "建物の老朽化による建て替えや家賃滞納などにおいて、貸主（または弁護士）が借主と話し合い、立ち退き料の支払いや退去スケジュールなどの合意を目指す手続き。" },
  { "term": "アパートローン審査書類", "kana": "あぱーとろーんしんさしょるい", "group": "あ", "desc": "投資用融資を申し込む際、金融機関に提出する書類。個人の確定申告書や源泉徴収票だけでなく、物件のレントロール、間取り図、想定収支表などが求められる。" },
  { "term": "アパートローンの団信", "kana": "あぱーとろーんのだんしん", "group": "あ", "desc": "アパートローン用の団体信用生命保険。融資期間中にオーナーが死亡または高度障害になった際、ローンの残債がゼロになり、遺族に無借金の収益物件が残る仕組み。" },
  { "term": "アパートローンの金利相場", "kana": "あぱーとろーんのきんりそうば", "group": "あ", "desc": "投資用物件の融資に適用される金利の目安。借入人の属性や金融機関（地銀、ネット銀行、信金など）によるが、一般的に1%台後半〜3%台後半で推移する。" },
  { "term": "アパートローンの融資期間", "kana": "あぱーとろーんのゆうじきかん", "group": "あ", "desc": "投資用ローンの返済期間。「法定耐用年数（木造22年、RC47年など）ー 築年数」をベースに設定されることが多く、構造によって大きく異なる。" },
  { "term": "アパート経営の経費", "kana": "あぱーとけいえいのけいひ", "group": "あ", "desc": "不動産所得の計算において家賃収入から差し引ける費用。管理委託料、固定資産税、火災保険料、修繕費、借入金の利息、建物の減価償却費などが該当。" },
  { "term": "アパート経営の法人化", "kana": "あぱーとけいえいのほうじんか", "group": "あ", "desc": "不動産投資の規模が大きくなった際、個人ではなく資産管理会社（法人）を設立して物件を所有すること。所得税よりも法人税の方が税率が低くなる所得分散の節税策。" },
  { "term": "アセット・マネジメント会社", "kana": "あせっとまねじめんとかいしゃ", "group": "あ", "desc": "不動産投資信託（REIT）や不動産ファンドにおいて、大口投資家から集めた資金を基に、物件の選定、取得、運用、売却などの戦略的判断を行う専門企業。" },
  { "term": "アセット・アプローチ手法", "kana": "あせっとあぷろーちしゅほう", "group": "あ", "desc": "不動産の価格算定や投資分析において、将来の収益（家賃）ではなく、その物件が今持っている「土地の更地価値 ＋ 建物の再建築原価」を足し上げて評価する積算の考え方。" },
  { "term": "アセットの流動性", "kana": "あせっとのりゅうどうせい", "group": "あ", "desc": "資産（不動産）をどれだけ早く、適正な現金（キャッシュ）に換えられるかの度合い。不動産は株式に比べて流動性が低いアセットクラスとされる。" },
  { "term": "頭金充当金", "kana": "あたまきんじゅうとうきん", "group": "あ", "desc": "不動産の購入契約時に支払う「手付金」を、そのまま最終的な代金決済時に「頭金の一部」として振り替えて充当する資金のこと。" },
  { "term": "頭金なしのリスク", "kana": "あたまきんなしのりすく", "group": "あ", "desc": "フルローンで購入した際、借入総額が増えるため毎月の返済負担が重くなる点。また、売却時に住宅ローン残高が売却額を上回り、手出しが出やすくなる（オーバーローン）リスク。" },
  { "term": "相見積もりの取り方", "kana": "あいみつもりのおりかた", "group": "あ", "desc": "リフォームや大規模修繕の発注時、各社の条件を正しく比較するため、工事の仕様（使用する材料やグレード、範囲）を統一して複数業者に依頼する手順。" },
  { "term": "相見積もりの比較表", "kana": "あいみつもりのひかくひょう", "group": "あ", "desc": "複数の不動産仲介会社や施工業者から集めた提案書を、金額、担当者の対応、特約条件、アフターサービスなどの項目ごとに並べて一目で比べられるようにした整理表。" },
  { "term": "売り主の瑕疵担保責任", "kana": "うりぬしのかしたんぽせきにん", "group": "あ", "desc": "（民法改正前の旧用語。現在は契約不適合責任）売却した不動産に隠れた欠陥（瑕疵）があった場合、売主が買主に対して負う、解約や損害賠償に応じる法的な義務。" },
  { "term": "売り主の契約不適合責任", "kana": "うりぬしのけいやくふてきごうせきにん", "group": "あ", "desc": "引き渡した不動産が、契約書に書かれた種類・品質・数量と一致しない場合（雨漏りの未記載など）、売主が買主から修繕請求や減額請求、解約、損害賠償を求められる法的責任。" },
  { "term": "売り主による告知", "kana": "うりぬしによるこくち", "group": "あ", "desc": "不動産売買において、売主が知っている物件の不具合や過去の事件・事故（心理的瑕疵）、周辺環境の嫌悪施設などについて、「物件状況報告書」を用いて買主に事前に明かすこと。" },
  { "term": "売り建てのメリット", "kana": "うりだてのめりっと", "group": "あ", "desc": "土地を購入した後に建物の打ち合わせを行うため、建売住宅よりも間取りや内装、キッチンの設備などを自分の好みや予算に合わせて自由に変更・調整できる点。" },
  { "term": "売り急ぎのデメリット", "kana": "うりいそぎのでめりっと", "group": "あ", "desc": "相続税の納付期限や住み替えの資金繰りで期限に追われるため、買い手からの指値（値引き要求）を拒むことが難しくなり、市場相場よりもかなり安い価格で手放さざるを得なくなる点。" },
  { "term": "移転登記の必要書類", "kana": "いてんとうきのひつようしょるい", "group": "あ", "desc": "所有権名義を変更する際に法務局へ出す書類。売主の登記済証（権利証）や印鑑証明書、買主の住民票、固定資産税評価証明書、登記原因証明情報などが必要となる。" },
  { "term": "移転登記の登録免許税", "kana": "いてんとうきのとうろくめんきょぜい", "group": "あ", "desc": "不動産の所有権移転を登記する際に国に納める税金。固定資産税評価額に一定の税率（売買、相続、贈与などの原因によって異なる）を掛けて算出する。" },
  { "term": "遺言書の作成費用", "kana": "いごんしょのさくせいひよう", "group": "あ", "desc": "将来の不動産相続トラブルを防ぐために遺言を遺すコスト。公正証書遺言の場合、財産の額に応じた公証人手数料や、サポートを依頼する司法書士・行政書士への報酬がかかる。" },
  { "term": "遺言書の保管制度", "kana": "いごんしょのほかんせいど", "group": "あ", "desc": "自筆で書いた遺言書を法務局が預かってくれる公的な制度。紛失や改ざんを防げるほか、死後の家庭裁判所による「検認」手続きが不要になるメリットがある。" },
  { "term": "遺産分割協議の進め方", "kana": "いさんぶんかつきょうぎのすすめかた", "group": "あ", "desc": "被相続人の財産（土地・建物・預貯金）を特定し、法定相続人を全員確定させた上で、全員が合意できる分割方法（現物分割、換価分割、代償分割など）を話し合うステップ。" },
  { "term": "遺産分割のトラブル", "kana": "いさんぶんかつのとらぶる", "group": "あ", "desc": "相続財産の大部分が「実家の土地・建物」といった分けにくい不動産である場合に、誰が継ぐか、あるいは売却して分けるかで相続人同士の意見が対立し、長期化する現象（争続）。" },
  { "term": "遺留分侵害額の弁済", "kana": "いりゅうぶんしんがいがくのべんさい", "group": "あ", "desc": "遺言によって特定の人がすべての不動産を相続した結果、他の相続人の遺留分を侵害した際、その侵害した額に相当する金額を「金銭（現金）」で支払って解決（弁済）すること。" },
  { "term": "一般定期借地権の保証金", "kana": "いっぱんていきしゃくちけんのほしょうきん", "group": "あ", "desc": "定期借地権で土地を借りる際、契約締結時に借主から地主へ預けられるまとまった金銭。期間満了による更地返還時に、原則として借主に全額返還される性質を持つ。" },
  { "term": "一括査定の仕組み", "kana": "いっかつさていのしくみ", "group": "あ", "desc": "ポータルサイトを介して、売りたい不動産の情報を送信すると、地域に対応した複数の仲介会社（最大6社程度）にデータが共有され、自動的に机上査定や訪問査定の依頼が届くネットシステム。" },
  { "term": "入居審査の必要書類", "kana": "にゅうきょしんさのひつようしょるい", "group": "あ", "desc": "賃貸アパートの審査を申し込む際に提出する書類。本人確認書類（免許証等）のほか、収入を証明する源泉徴収票や確定申告書、在籍証明書などが求められる。" },
  { "term": "入居審査の連帯保証人", "kana": "にゅうきょしんさのれんたいほしょうにん", "group": "あ", "desc": "借主が家賃を滞納した際などに、代わりに支払う義務を負う人。審査では連帯保証人自身の「3親等以内の親族か」「安定した収入があるか」が厳しくチェックされる。" },
  { "term": "おとり物件の見分け方", "kana": "おとりぶっけんのみわけかた", "group": "あ", "desc": "ネット上の賃貸広告で、周辺相場より明らかに家賃が安い、物件の現地集合での内見を拒まれる（一度店舗に来るよう促される）、などの特徴から架空広告を疑う手法。" },
  { "term": "青色申告特別控除のメリット", "kana": "あおいろしんこくとくべつこうじょのめりっと", "group": "あ", "desc": "不動産所得から最大65万円を差し引くことで、課税所得が減り、所得税だけでなく住民税や国民健康保険料の負担も大きく抑えられる税制上の最大の恩恵。" },
  { "term": "空き家特例の必要書類", "kana": "あきやとくれいのひつようしょるい", "group": "あ", "desc": "相続空き家の3000万円控除を確定申告で受けるための書類。物件の登記事項証明書、売買契約書に加え、自治体が発行する「被相続人居住用家屋等確認書」が必要。" },
  { "term": "アセットマネジメントの役割", "kana": "あせっとまねじめんとのやくわり", "group": "あ", "desc": "不動産投資において、物件の購入・売却時期の決定、リノベーション投資の判断、融資の調達・組み換え（リファイナンス）などを行い、ポートフォリオ全体の利回りを高める機能。" },
    { "term": "違算", "kana": "いさん", "group": "い", "desc": "不動産売買の精算や家賃の入金管理、税金計算において、計算違いや入力ミスによって帳簿上の金額と実際の金額が合致しないこと。" },
  { "term": "違算金", "kana": "いさんきん", "group": "い", "desc": "不動産の決済時や賃貸管理の収支報告において、計算ミスや精算漏れが原因で生じた、本来支払うべき・受け取るべき金額との差額のこと。" },
  { "term": "遺産総額", "kana": "いさんそうがく", "group": "い", "desc": "相続税の基礎控除や税額を計算するベースとなる、亡くなった人が残したすべてのプラスの財産（土地、建物、預貯金等）の合計評価額。" },
  { "term": "遺産評価額", "kana": "いさんひょうかがく", "group": "い", "desc": "相続税の計算や遺産分割の基準とするために、残された財産の価値を金銭に見積もった額。不動産は路線価や固定資産税評価額を基に算出する。" },
  { "term": "遺産目録", "kana": "いさんもくろく", "group": "い", "desc": "遺産分割協議をスムーズに進めるため、亡くなった人が所有していた不動産（地番や家屋番号）や金融資産などを一覧表にまとめた書類。" },
  { "term": "遺産分割の基準", "kana": "いさんぶんかつのきじゅん", "group": "い", "desc": "遺産を分ける際、法律が定める法定相続分のほか、各相続人の年齢、職業、心身の状態、過去に受けた贈与（特別受益）などを総合的に考慮する目安。" },
  { "term": "遺産分割の方法", "kana": "いさんぶんかつほうほう", "group": "い", "desc": "不動産等をそのまま分ける「現物分割」、売却して現金で分ける「換価分割」、特定の人が継ぐ代わりに他者に現金を払う「代償分割」などがある。" },
  { "term": "遺産分割調停", "kana": "いさんぶんかつちょうてい", "group": "い", "desc": "相続人間の話し合い（協議）がまとまらない場合、家庭裁判所に申し立てを行い、裁判官や調停委員を交えて納得のいく解決を目指す手続き。" },
  { "term": "遺産分割審判", "kana": "いさんぶんかつしんぱん", "group": "い", "desc": "遺産分割調停でも合意に至らなかった場合、家庭裁判所の裁判官が、一切の事情を考慮して法的強制力のある分割方法を決定（命令）すること。" },
  { "term": "医師の診断書", "kana": "いしのしんだんしょ", "group": "い", "desc": "高齢者が不動産の売買契約を結ぶ際や遺言書を作成する際、本人に十分な「意思能力」があることを第三者的に証明するために取得を求められる書類。" },
  { "term": "以心伝心契約", "kana": "いしんでんしんけいやく", "group": "い", "desc": "（俗称）書面（契約書）を交わさず、口約束や阿吽の呼吸だけで成立させてしまう取引。不動産業界ではトラブルに直結するため宅建業法で禁止されている。" },
  { "term": "委託手数料", "kana": "いたくてすうりょう", "group": "い", "desc": "不動産の賃貸管理や売買の仲介業務、あるいは民泊の運営代行などを専門業者に依頼（委託）した際に支払う報酬金のこと。" },
  { "term": "委託料", "kana": "いたくりょう", "group": "い", "desc": "マンションの清掃、エレベーターの保守点検、家賃回収代行など、特定のサービスや業務を外部の専門業者に委託する際に支払う費用の総称。" },
  { "term": "維持管理", "kana": "いじかんり", "group": "い", "desc": "不動産の資産価値や安全性を維持するため、定期的な点検、修繕、清掃、消耗品の交換などを継続的に行うこと。賃貸経営の重要な要素。" },
  { "term": "維持管理費", "kana": "いじかんりひ", "group": "い", "desc": "建物の性能や美観を保つために必要な費用の総称。マンションの修繕積立金や管理費、戸建ての外壁塗装費用、エレベーター点検費などがこれにあたる。" },
  { "term": "維持費", "kana": "いじひ", "group": "い", "desc": "不動産を所有しているだけで毎月・毎年発生するコスト。固定資産税・都市計画税、火災保険料、修繕費、マンションの管理費などが含まれる。" },
  { "term": "移住", "kana": "いじゅう", "group": "い", "desc": "それまで住んでいた地域から、別の地域（都市部から地方など）へ生活の拠点を移すこと。地方の空き家バンクを活用するケースが増えている。" },
  { "term": "移住支援金", "kana": "いじゅうしえんきん", "group": "い", "desc": "東京圏から地方へ移住し、就業または起業した人に対し、国と自治体が共同で支給する交付金。地方での住まい探し（賃貸・売買）の原資となる。" },
  { "term": "一時金等の精算", "kana": "いちじきんとうのせいさん", "group": "い", "desc": "賃貸物件の退去時において、入居時に預かった敷金や保証金から原状回復費用を差し引き、残った金額を借主に払い戻す（または不足分を請求する）手続き。" },
  { "term": "医療用居抜き物件", "kana": "いりょうよういぬきぶっけん", "group": "い", "desc": "内科や歯科、整骨院などの内装や、受付、待合室、X線室の遮蔽設備などがそのまま残された状態で、賃貸または売買される店舗不動産。" },
  { "term": "色校正", "kana": "いろこうせい", "group": "い", "desc": "不動産のパンフレットや間取り図、販売チラシを印刷する際、画面上の色と実際の印刷の仕上がりにズレがないかを事前に確認・修正する作業。" },
  { "term": "違法建築の売買", "kana": "いほうけんちくのばいばい", "group": "い", "desc": "法令に違反した建物を売買すること。取引自体は可能だが、仲介会社は重要事項説明での告知義務があり、買主は住宅ローンが組めないリスクが高い。" },
  { "term": "一番登記（1番登記）", "kana": "いちばんとうき", "group": "い", "desc": "不動産の登記簿において、特定の区（甲区・乙区）の最初（順位番号1）に記載された登記。所有権の保存登記や、第1順位の抵当権設定などが該当する。" },
  { "term": "一棟アパート", "kana": "いっとうあぱーと", "group": "い", "desc": "木造や軽量鉄骨造の賃賃共同住宅を建物丸ごと1棟所有・運用する不動産投資アセット。区分マンション投資に比べて高い利回りを期待しやすい。" },
  { "term": "一棟マンション", "kana": "いっとうまんしょん", "group": "い", "desc": "RC（鉄筋コンクリート）造などの大型賃貸共同住宅を1棟丸ごと所有すること。高額な投資資金が必要だが、部屋数が多いため空室リスクが分散される。" },
  { "term": "一棟ビル", "kana": "いっとうびる", "group": "い", "desc": "オフィスや店舗が入る商業ビルを土地・建物ごと1棟所有すること。テナント企業の入退去によって収益が大きく変動するが、高利回りを狙える。" },
  { "term": "印刷物作成（不動産）", "kana": "いんさつぶつさくせい", "group": "い", "desc": "物件の魅力を伝えるための間取り図、募集図面（マイソク）、現地看板、店頭ポスター、分譲パンフレットなどをデザイン・印刷する実務業務。" },
  { "term": "医事紛争", "kana": "いじふんそう", "group": "い", "desc": "医療事故や診療報酬を巡るトラブル。病院やクリニックの居抜き物件・不動産売買において、前テナントの係争リスクを引き継がないための事前調査が重要となる。" },
  { "term": "遺贈", "kana": "いぞう", "group": "い", "desc": "遺言によって、自分の財産（不動産や現金など）を特定の個人や法人、自治体等に無償で譲る（贈与する）こと。法定相続人以外にも財産を遺せる。" },
  { "term": "遺贈寄付", "kana": "いぞうきふ", "group": "い", "desc": "自分が亡くなった後、遺言によって遺産（不動産や預貯金など）の一部または全部を、公益法人や自治体、NPOなどの団体に寄付すること。" },
  { "term": "一般定期借地権の減額特例", "kana": "いっぱんていきしゃくちけんのげんがくとくれい", "group": "い", "desc": "相続税の計算において、貸し付けている土地が一般定期借地権の対象である場合、将来返ってくる土地である点を考慮して評価額を一定割合減額できる仕組み。" },
  { "term": "一般社団法人（不動産管理）", "kana": "いっぱんしゃだんほうじん", "group": "い", "desc": "営利を目的としない法人の一種。相続税対策として不動産をこの法人に所有させ、親族間で持分を移転しやすくする節税手法に使われることがある。" },
  { "term": "遺族年金", "kana": "いぞくねんきん", "group": "い", "desc": "一家の働き手が亡くなった際、遺された遺族に支給される公的年金。賃貸物件の入居審査において、高齢の申込者が持つ安定した収入源として評価される場合がある。" },
  { "term": "依頼・媒介の撤回", "kana": "いらいばいかいてっかい", "group": "い", "desc": "不動産の売却や賃貸募集を依頼していた仲介会社に対し、契約期間中であっても、業者の対応不備などを理由に媒介契約を途中で解除・取り消すこと。" },
  { "term": "委託管理のメリット", "kana": "いたくかんりのめりっと", "group": "い", "desc": "アパート経営やマンション管理において、家賃督促や24時間トラブル対応、清掃などをプロに任せることで、オーナーが手間をかけずに収入を得られる点。" },
  { "term": "委託管理のデメリット", "kana": "いたくかんりのでめりっと", "group": "い", "desc": "毎月一定の管理委託手数料（家賃の3%〜5%程度など）が発生するため、自主管理に比べて手元のキャッシュフロー（実質利回り）が減少する点。" },
  { "term": "違約金相場", "kana": "いやくきんそうば", "group": "い", "desc": "不動産売買契約において当事者が約束違反をした場合のペナルティ金額の目安。一般的には「物件価格の10%〜20%」の間で設定されることが多い。" },
  { "term": "違約金返還請求", "kana": "いやくきんへんかんせいきゅう", "group": "い", "desc": "契約解除の際に過大すぎる違約金を請求された場合や、契約書に基づかない不当な没収に対し、支払った違約金の払い戻しを求める法的な手続き。" },
  { "term": "入居案内", "kana": "入居案内", "group": "い", "desc": "賃貸契約が成立した後に、管理会社から入居者へ渡されるマニュアル。ゴミの出し方、駐車場の利用ルール、トラブル時の連絡先などが記されている。" },
  { "term": "印紙の消印", "kana": "いんしのけしいん", "group": "い", "desc": "不動産売買契約書などに貼り付けた収入印紙と文書の双方にまたがって印鑑（または署名）を押すこと。印紙の再利用を防ぐための法的な行為（割り印）。" },
  { "term": "隠れた瑕疵の特約", "kana": "かくれたかしのとくやく", "group": "い", "desc": "不動産売買契約において、売主が引き渡し後に負う隠れた欠陥の責任（契約不適合責任）について、その期間を「3ヶ月」などに制限または免除する合意条項。" },
  { "term": "一筆（いっぴつ）", "kana": "いっぴつ", "group": "い", "desc": "土地登記簿上において、1つの土地として区切られ、独立した地番が与えられている土地の単位のこと。2つの土地を合わせることを合筆という。" },
  { "term": "印鑑証明書の期限", "kana": "いんかんしょうめいしょのきげん", "group": "い", "desc": "不動産の登記申請（名義変更や抵当権設定など）において提出する印鑑証明書は、法務局の規定により「発行から3ヶ月以内」のものでなければならないという縛り。" },
  { "term": "移動壁（可動間仕切り）", "kana": "いどうかべ", "group": "い", "desc": "部屋のレイアウトを自由に変えられるよう、天井や床のレールに沿って動かせる壁（間仕切り戸）。賃貸物件の間取り（1LDKと2DKの可変など）によく使われる。" },
  { "term": "一般管理契約", "kana": "いっぱんかんりけいやく", "group": "い", "desc": "賃貸管理において、サブリース（一括借り上げ）とは異なり、空室リスクはオーナーが負うものの、管理会社に督促や入居者対応の実務だけを委託する契約形態。" },
  { "term": "違法民泊", "kana": "いほうみんぱく", "group": "い", "desc": "旅館業法の許可や、住宅宿泊事業法（民泊新法）の届出を行わずに、分譲マンションの一室や戸建てを旅行者に有料で宿泊させる違法なモグリ運営のこと。" },
  { "term": "依頼書（査定）", "kana": "いらいしょ", "group": "い", "desc": "不動産の売却を検討する際、物件の机上査定や訪問査定を正式に行ってもらうために、不動産会社に対して売主が差し出す書面。" },
  { "term": "衣服の遺品整理", "kana": "いふくのいひんせいり", "group": "い", "desc": "相続が発生した実家や空き家の中に残された大量の衣類について、形見分けするもの、リサイクルに出すもの、廃棄するものに仕分けして処分する実務。" },
    { "term": "遺産分割の割合", "kana": "いさんぶんかつのわりあい", "group": "い", "desc": "相続において各相続人が取得する財産の比率。法律が定める「法定相続分」のほか、全員の合意があればそれと異なる割合（指定相続分など）で分けることも可能。" },
  { "term": "移住促進区域", "kana": "いじゅうそくしんくいき", "group": "い", "desc": "人口減少や空き家問題に悩む地方自治体が、都市部からの移住者を呼び込むために指定したエリア。住宅の購入・リフォームに手厚い補助金が出る傾向がある。" },
  { "term": "委託管理の範囲", "kana": "いたくかんりのはんい", "group": "い", "desc": "分譲マンションの管理組合や賃貸オーナーが管理会社と結ぶ契約において、どこまでの業務（清掃、エレベーター保守、家賃督促、クレーム対応など）を任せるかの線引き。" },
  { "term": "違約金の上限", "kana": "いやくきんのじょうげん", "group": "い", "desc": "宅地建物取引業法に基づき、不動産業者が売主となる売買契約において設定できる違約金や損害賠償額の総額の上限。原則として「売買代金の20%」までと定められている。" },
  { "term": "入居案内書の作成", "kana": "にゅうきょあんないしょのさくせい", "group": "い", "desc": "賃貸管理会社が新入居者向けに、物件ごとのローカルルール（ゴミ捨て曜日、自転車置き場の駐輪ステッカー貼付、騒音の注意点など）をまとめた冊子を編集・発行する実務。" },
  { "term": "一般定期借地権の終了", "kana": "いっぱんていきしゃくちけんのしゅうりょう", "group": "い", "desc": "50年以上の契約期間が満了した際、更新や建物買取請求権がないため、土地が確実に地主の手元に戻ること。借主は建物を解体して更地にする義務がある。" },
  { "term": "一般定期借家契約の説明義務", "kana": "いっぱんていきしゃくかけいやくのせつめいぎむ", "group": "い", "desc": "貸主が定期借家契約を結ぶ際、借主に対して「期間満了によって更新がなく失効する」旨を、契約書とは別の書面（事前説明書面）を交付して説明しなければならない法的な義務。" },
  { "term": "印刷費", "kana": "いんさつひ", "group": "い", "desc": "不動産仲介業や分譲会社が、新着物件チラシ（マイソク）の大量配布、高級分譲マンションのパンフレット製本、店頭ポスターの印刷等にかける営業・広告コスト。" },
  { "term": "委任状の偽造", "kana": "いにんじょうのぎぞう", "group": "い", "desc": "不動産取引や名義変更において、本人の承諾なく勝手に代理人仕立ての書類を作ること。重大な犯罪（有印私文書偽造罪）であり、これによりなされた契約は原則として無効となる。" },
  { "term": "依頼先の選定", "kana": "いらいさきのせんてい", "group": "い", "desc": "不動産を売却・購入、あるいは管理委託する際、大手ハウスメーカー、地域密着型の不動産屋、地元の工務店など、目的や物件種別に応じて最適な業者を見極めて選ぶこと。" },
  { "term": "違法民泊の通報", "kana": "いほうみんぱくのつうほう", "group": "い", "desc": "分譲マンションや住宅街で、夜間の騒音やゴミ出しルール違反を繰り返す無許可・無届のモグリ民泊に対し、周辺住民や管理組合が保健所や警察、自治体の窓口へ苦情を申し立てる行為。" },
  { "term": "一筆の土地", "kana": "いっぴつのとち", "group": "い", "desc": "土地登記簿上で、1つの独立した地番（例：〇〇町1丁目101番）を与えられて管理されている最小単位の土地のこと。面積の大小に関わらず、登記上は「一筆」と数える。" },
  { "term": "隠れた瑕疵の発見", "kana": "かくれたかしのはっけん", "group": "い", "desc": "物件の引き渡し後に、通常の外見チェックでは気づかなかった床下のシロアリ被害、壁の内部の雨漏り、地中のコンクリート破片（埋設物）などが後から見つかること。" },
  { "term": "維持費の削減", "kana": "いじひのさくげん", "group": "い", "desc": "賃貸経営やマンション管理において、共用部LED化による電気代カット、エレベーター保守会社の独立系への切り替え、火災保険のプラン見直し等で固定費を抑える経営努力。" },
  { "term": "維持管理のガイドライン", "kana": "いじかんりのがいどらいん", "group": "い", "desc": "国土交通省などが定める、マンションの長寿命化や資産価値維持を目的とした適切な大規模修繕工事、定期点検、修繕積立金の算出基準に関する指針・目安。" },
  { "term": "医療モール物件", "kana": "いりょうもーるぶっけん", "group": "い", "desc": "1つのビルや敷地内に、内科、小児科、皮膚科、調剤薬局などが複数集まって入居している商業不動産。相乗効果による集客力が高く、テナントが退去しにくい安定性がある。" },
  { "term": "色褪せ（外壁）", "kana": "いろあせ", "group": "い", "desc": "アパートや戸建ての外壁塗装が、長年の紫外線や雨風によって変色・退色する現象。建物の美観を損ねるだけでなく、防水性の低下のシグナルとなるため修繕目安になる。" },
  { "term": "委託管理の変更", "kana": "いたくかんりのへんこう", "group": "い", "desc": "現在のマンション管理会社の対応（清掃の手抜き、レスポンスの遅さ）や管理費の高さに不満がある場合、別の管理会社へリプレイス（乗り換え）を行う手続き。" },
  { "term": "依存度（家賃収入）", "kana": "いぞんど", "group": "い", "desc": "リタイア層や投資家の総所得において、給与収入や年金に対して不動産（家賃）から得られるインカムゲインが占める割合。これが高いほど空室発生時のリスク管理が重要になる。" },
  { "term": "衣服の処分代", "kana": "いふくのしょぶんだい", "group": "い", "desc": "孤独死が発生した賃貸物件や、相続した実家の遺品整理において、残された大量の衣類や寝具を専門業者に依頼して仕分け・回収・廃棄してもらう際にかかる実費コスト。" },
  { "term": "一時金の性質", "kana": "いちじきんのせいしつ", "group": "い", "desc": "賃貸契約の際に支払うまとまった金銭のうち、敷金は「退去時に返ってくる預け金」、礼金は「大家さんへの謝礼（返ってこない）」という、それぞれの法的な扱いや違いのこと。" },
  { "term": "以心伝心のトラブル", "kana": "いしんでんしのとらぶる", "group": "い", "desc": "「言わなくても分かってくれているだろう」と地主と借主、あるいは売主と買主が口約束で済ませた結果、数年後に言った・言わないの水掛け論に発展する境界や費用の揉め事。" },
  { "term": "医師能力の証明", "kana": "いしのうりょくのしょうめい", "group": "い", "desc": "認知症の疑いがある高齢者が、所有する不動産を売却したり遺言を書いたりする際、後々親族から「契約は無効だ」と訴えられないよう、当日の動画撮影や専門医の意見書を用意する対策。" },
  { "term": "違算金の精算", "kana": "いさんきんのせいさん", "group": "い", "desc": "固定資産税の按分計算や日割り家賃の算出において、端数の処理違いや二重計上が発覚した際、決済後に売主・買主間（または貸主・借主間）で差額を返金・追加徴収する処理。" },
  { "term": "医院居抜きのメリット", "kana": "いいんいぬきのめりっと", "group": "い", "desc": "新規に開業する医師にとって、高額なレントゲン室の防護壁や配管、待合室の内装をそのまま引き継げるため、初期の建築投資コストを数千万円単位で大幅に削減できる点。" },
  { "term": "違算の防止", "kana": "いさんのぼうし", "group": "い", "desc": "月次で行う賃貸アパート数十〜数百棟分の送金業務において、家賃の二重入金や未入金のチェックミスを防ぐため、専用の賃貸管理ソフトや入出金自動マッチングシステムを導入する実務。" },
  { "term": "遺産分割の長期化", "kana": "いさんぶんかつのちょうきか", "group": "い", "desc": "相続人同士の仲が悪かったり、実家の土地の取り分で揉めたりして話し合いが数年間に及び決着がつかない状態。この間、不動産の名義変更や売却、有効活用が一切できなくなる。" },
  { "term": "遺産分割協議のメンバー", "kana": "いさんぶんかつきょうぎのめんばー", "group": "い", "desc": "遺産を分ける話し合いに参加しなければならない「法定相続人の全員」。戸籍謄本を遡って調査した結果、前妻との子供や隠し子など、面識のない相続人が発覚することもある。" },
  { "term": "移住者の確保", "kana": "いじゅうしゃのかくほ", "group": "い", "desc": "地方のシャッター街や過疎化が進む自治体が、地域の空き家を安く提供する「空き家バンク」や、一定期間お試しで住める一戸建てを用意して、定住人口を増やすための施策。" },
  { "term": "維持管理の義務", "kana": "いじかんりのぎむ", "group": "い", "desc": "区分所有法に基づき、マンションの専有部分は各部屋のオーナーが、共用部分（外壁やエントランスなど）は管理組合（全オーナーの集まり）が適切に修繕・清掃を行う法律上の責任。" },
  { "term": "移住支援金の条件", "kana": "いじゅうしえんきんのじょうけん", "group": "い", "desc": "国や自治体から最大数百万円の移住手当を受け取るための縛り。「移住先に5年以上継続して住む意思があること」「地域の対象企業に就職すること」などが定められている。" },
  { "term": "一時金等の返還請求", "kana": "いちじきんとうのへんかんせいきゅう", "group": "い", "desc": "賃貸物件を退去した借主が、不当に高い原状回復費用を敷金から差し引かれた（敷引きされた）際、ガイドラインを基に敷金の正当な返還を大家さんや管理会社に求める行為。" },
  { "term": "医療用居抜きの注意点", "kana": "いりょうよういぬきのちゅういてん", "group": "い", "desc": "前医院が導入していた古い医療機器がそのまま残されていても、リース契約が残っていたり、型式が古く保守点検が受けられなかったりして、結局撤去費用がかさむリスクがある点。" },
  { "term": "色校正のやり直し", "kana": "いろこうせいのやりなおし", "group": "い", "desc": "新築分譲マンションのパンフレットを印刷する際、高級感のある外観タイルの質感や、室内のフローリングの色味が実物と違って安っぽく見えた場合に、再度版を修正して刷り直す工程。" },
  { "term": "違法建築のローン制限", "kana": "いほうけんちくのろーんせいげん", "group": "い", "desc": "建蔽率（けんぺいりつ）や容積率をオーバーしている違反物件は、銀行の担保評価が著しく低くなる（またはゼロになる）ため、買主が住宅ローンやアパートローンを組めなくなる制約。" },
  { "term": "一番登記の効力", "kana": "いちばんとうきのこうりょく", "group": "い", "desc": "登記簿の甲区や乙区の先頭に記載されることで、所有権や抵当権の優先順位が確定する効果。万が一、物件が競売にかけられた際、1番抵当権者が最も優先して売却代金から回収できる。" },
  { "term": "一棟アパートの利回り", "kana": "いっとうあぱーとのりまわり", "group": "い", "desc": "物件の購入総額に対し、年間の満室想定家賃が占める割合（表面利回り）。木造や軽量鉄骨造の一棟アパートは、RC造のマンションに比べて建築・購入費が安いため、利回りが高くなりやすい。" },
  { "term": "一棟マンションの減価償却", "kana": "いっとうまんしょんのげんかしょうきゃく", "group": "い", "desc": "RC造の一棟建物を購入した際、建物の法定耐用年数が47年と長いため、木造アパートに比べて1年あたりに経費計上できる減価償却費の額が少なくなり、所得税の圧縮効果が緩やかになる特徴。" },
  { "term": "一棟ビルのテナント管理", "kana": "いっとうびるのてなんとかんり", "group": "い", "desc": "オフィスや店舗ビルを1棟経営する際、入居している企業の賃料回収だけでなく、夜間の警備体制、共有看板の割り当て、飲食店のダクト清掃の指導など、特有の維持実務を行うこと。" },
  { "term": "印刷物作成のコスト", "kana": "いんさつぶつさくせいのこすと", "group": "い", "desc": "新築マンションの販売センターで配る豪華なカタログや、周辺エリアに何万枚もポスティングするチラシの作成費用。広告宣伝費として売買プロジェクトの初期予算に組み込まれる。" },
  { "term": "医事紛争の履歴調査", "kana": "いじふんそうのりれきちょうさ", "group": "い", "desc": "病院やクリニック向けの不動産（売買・賃貸）において、過去にその場所で悪質な医療事故や患者との激しいトラブルがなかったかを、地域の評判やネット情報から調べるリスク管理。" },
  { "term": "遺贈の登記手続き", "kana": "いぞうのとうきてつづき", "group": "い", "desc": "遺言によって不動産を譲り受けた人（受遺者）が、自分の名義に書き換える法務局への申請。相続人全員の協力、または遺言で指定された「遺言執行者」の単独署名と実印が必要となる。" },
  { "term": "遺贈寄付の非課税", "kana": "いぞうきふのひかぜい", "group": "い", "desc": "亡くなった人の遺言により、遺産である不動産を国や特定の公益法人、NPO等に寄付した場合、その寄付した分の財産には相続税がかからない（課税対象から除外される）税制上の優遇措置。" },
  { "term": "一般定期借地権の地代", "kana": "いっぱんていきしゃくちけんのちだい", "group": "い", "desc": "50年以上の長期にわたり、借主が地主に支払い続ける土地のレンタル料。物価の変動や固定資産税の増減に応じて、数年ごとに地代を改定する条項を契約書に入れるのが一般的。" },
  { "term": "一般社団法人による実家管理", "kana": "いっぱんしゃだんほうじんによるじっかかんり", "group": "い", "desc": "高齢の親が認知症になる前に親族で法人を立ち上げ、実家の不動産をその法人名義に移しておくことで、親の意識が低下した後でも法人の意思決定として実家の売却や賃貸ができるようにする対策。" },
  { "term": "遺族年金での賃貸契約", "kana": "いぞくねんきんでのちんたいけいやく", "group": "い", "desc": "配偶者を亡くした高齢者が新たに一人暮らしの部屋を借りる際、主な収入源が遺族年金であっても、受給口座の通帳のコピーや改定通知書を提出することで、十分な支払い能力があるとみなされる実務。" },
  { "term": "依頼・媒介契約の有効期間", "kana": "いらいばいかいけいやくのゆうこうきかん", "group": "い", "desc": "不動産の売却を仲介会社に頼む「専任媒介契約」や「専属専任媒介契約」において、法律（宅建業法）で定められている最長の契約期間。一回の締結につき「3ヶ月以内」と決まっている。" },
  { "term": "委託管理のコストパフォーマンス", "kana": "いたくかんりのこすとぱふぉーまんす", "group": "い", "desc": "管理会社に支払う手数料（家賃の数％）に対し、どれだけ迅速に空室を埋めてくれるか、夜間の水漏れ対応が確実かなど、費用対効果の面から管理会社の優秀さを評価すること。" },
  { "term": "違約金特約の有効性", "kana": "いやくきんとくやくのゆうこうせい", "group": "い", "desc": "売買契約書に「契約違反時は〇〇万円を支払う」と明記されている場合、実際に発生した損害がそれより少なくても多くても、原則としてその定めた金額通りのペナルティが法的に認められる性質。" },
  { "term": "隠れた瑕疵の責任期間", "kana": "かくれたかしのせきにんきかん", "group": "い", "desc": "（現：契約不適合責任の期間）買主が物件の欠陥を見つけてから「1年以内」に売主に通知しなければならないという民法の基本ルール。実務では契約書でさらに短い期間に特約されることが多い。" },
    { "term": "初動対応（賃貸管理）", "kana": "しょどうたいおうちんたいかんり", "group": "う", "desc": "入居者から「水漏れが起きた」「鍵を紛失した」などの緊急連絡を受けた際、管理会社が被害の拡大を防ぐために迅速に業者を手配したり現場へ駆けつけたりする最初の動き。" },
  { "term": "売出物件の競合調査", "kana": "うりだしぶっけんのきょうごうちょうさ", "group": "う", "desc": "不動産を売却する際、同じエリアや沿線で現在売りに出されている似たような間取り・価格の物件を洗い出し、自分の物件が埋もれないための差別化戦略を立てる実務。" },
  { "term": "売主の引渡義務", "kana": "うりぬしのひきわたしぎむ", "group": "う", "desc": "不動産売買契約において、売主が買主から代金の全額を受け取るのと引き換えに、物件の鍵を渡し、登記名義を変更して完全に物件を明け渡さなければならない法的な義務。" },
  { "term": "有償譲渡の税金", "kana": "ゆうしょうじょうとのぜいきん", "group": "う", "desc": "不動産をお金（対価）を貰って他人に譲り渡すこと。いわゆる通常の売買取引を指し、購入時よりも高い価格で売却できた場合は、その差額（譲渡益）に対して所得税や住民税が課される。" },
  { "term": "請負契約の解除", "kana": "うけおいけいやくのかいじょ", "group": "う", "desc": "ハウスメーカー等と結んだ建築請負契約を、着工前のプラン変更や資金調達の失敗（ローン不成立）などを理由に中途で解約すること。進捗状況に応じて違約金や実費精算が発生する。" },
  { "term": "埋立地の液状化", "kana": "うめたてちのえきじょうか", "group": "う", "desc": "水分を多く含んだ人工の砂質地盤が、大きな地震の揺れによって一時的に液体のようになってしまう現象。建物の沈下やライフラインの寸断を引き起こすリスクがある。" },
  { "term": "裏口の照明設備", "kana": "うらぐちのしょうめいせつび", "group": "う", "desc": "アパートの共用部や店舗の裏手など、死角になりやすい場所に設置する防犯用のライト。夜間に人の動きを検知して自動点灯するセンサーライトなどが空き巣対策として有効。" },
  { "term": "売却のタイミング", "kana": "ばいきゃくのたいみんぐ", "group": "う", "desc": "所有不動産を手放す最適な時期。税率が下がる「長期譲渡所得（所有5年超）」に達する時期や、周辺の再開発による地価の高騰、ファミリー層の需要が増す2〜3月などを狙う判断。" },
  { "term": "売出価格の値下げ", "kana": "うりだしかかくのねさげ", "group": "う", "desc": "物件を売り出してから数ヶ月間問い合わせや内見がない場合、市場の相場や買い手の反応を見ながら、媒介契約の更新タイミング等に合わせて募集価格を引き下げる調整実務。" },
  { "term": "上物の解体費用", "kana": "うわもののかいたいひよう", "group": "う", "desc": "土地を更地として売却・活用するために、敷地内に残っている古い木造住宅や鉄骨ビルを壊して廃材を処分する際にかかるコスト。構造や広さ、重機の進入しやすさで総額が大きく変わる。" },
  { "term": "受取家賃の未収金", "kana": "うけとりやちんのみしゅうきん", "group": "う", "desc": "賃貸経営において、入居者の口座残高不足や支払い遅延によって、当月中に回収ができなかった家賃のこと。管理簿上は未収金（資産）として計上し、速やかに催促を行う必要がある。" },
  { "term": "ウッドデッキの耐久性", "kana": "うっどでっきのたいきゅうせい", "group": "う", "desc": "戸建てやアパートの庭・バルコニーに設置するデッキの寿命。安価な天然木（杉など）は数年で腐食しやすいが、人工木（樹脂製）やハードウッド（イペなど）を選べばメンテナンス周期を長くできる。" },
  { "term": "売渡承諾書の効力", "kana": "うりわたししょうだくしょのこうりょく", "group": "う", "desc": "売主が「この条件で売ります」と意思表示する書面の法的な位置づけ。これ自体は正式な売買契約ではないため、原則として金銭のペナルティなしで撤回できるが、取引の信頼性を高めるために交わされる。" },
  { "term": "請負契約の追加工事", "kana": "うけおいけいやくのついかこうじ", "group": "う", "desc": "注文住宅の建築中やリフォームの施工中に、施主の希望でコンセントの位置を増やしたり、設備のグレードを上げたりすることで、当初の契約金額から発生するプラスの費用。" },
  { "term": "閲覧制限（DV等特例）", "kana": "えつらんせいげん", "group": "え", "desc": "配偶者からの暴力（DV）やストーカー被害者が新居に引っ越した際、加害者に現住所を突き止められないよう、役所で住民票や固定資産課税台帳などの閲覧・交付を厳しく制限する手続き。" },
  { "term": "営業権の引継ぎ", "kana": "えいぎょうけんのひきつぎ", "group": "え", "desc": "飲食店や美容室などの店舗物件を居抜きで売買・賃貸する際、前のオーナーが獲得していた顧客データや店舗名、SNSのアカウントなどを新しい運営者に譲渡する実務。" },
  { "term": "駅前再開発プロジェクト", "kana": "えきまえさいかいはつぷろじぇくと", "group": "え", "desc": "自治体やデベロッパーが主導し、古い駅周辺の土地を集約して高層タワーマンションや大型商業ビル、ロータリーを一体整備する事業。周辺の不動産価値が大きく上昇する要因となる。" },
  { "term": "越境の是正請求", "kana": "えっきょうのぜせいせいきゅう", "group": "え", "desc": "隣の家の木の枝が自分の敷地に張り出していたり、ブロック塀が境界線をまたいでいる場合、所有者に対してその部分をカットしたり、工事をして元に戻すよう法的に求める行為。" },
  { "term": "越境物の現地確認", "kana": "えっきょうぶつのげんちかくにん", "group": "え", "desc": "不動産の売買前に、土地家屋調査士の測量図を手に持ちながら、実際の隣地との境界線から何（屋根のひさし、雨樋、エアコンの室外機など）がどれくらい飛び出しているかを目視でチェックする実務。" },
  { "term": "エレベーターのフルリニューアル", "kana": "えれべーたーのふるりにゅーある", "group": "え", "desc": "一棟マンションやビルにおいて、設置から20〜25年が経過した昇降機を、制御盤からワイヤー、カゴ（本体）まですべて最新型に交換する大型工事。数百万〜一千万円規模の費用がかかる。" },
  { "term": "延滞家賃の回収代行", "kana": "えんたいやちんのかいしゅうだいこう", "group": "え", "desc": "家賃債務保証会社や専門の督促業者が、オーナーに代わって滞納者から家賃を回収するサービス。オーナーは精神的な負担なく、毎月の家賃収入を安定させることができる。" },
  { "term": "延長敷地の駐車スペース", "kana": "えんちょうしきちのちゅうしゃすぺーす", "group": "え", "desc": "道路から奥の敷地へ続く細長い通路部分（敷地延長）を、自家用車の駐車場として有効活用する設計。車のサイズや幅（2メートルの接道規制など）によってはドアが開けにくいなどの注意点がある。" },
  { "term": "延床面積の緩和規定", "kana": "のべゆかめんせきのかんわきてい", "group": "え", "desc": "建築基準法上、住宅の地下室や車庫（ガレージ）、共同住宅の共用廊下・階段などの面積について、一定の割合まで延床面積（容積率の計算）に算入しなくてよいとする特例ルール。" },
  { "term": "塩害による鉄部サビ", "kana": "えんがいによるてつぶさび", "group": "え", "desc": "海沿いのエリアにある物件の屋外非常階段やベランダの手すりなどが、塩分を含んだ風によって通常より早く腐食する現象。放置すると強度が落ちるため、こまめなケレン（サビ落とし）と塗装が必要。" },
  { "term": "駅距離の徒歩計算", "kana": "えききょりのとほけいさん", "group": "え", "desc": "物件概要に書かれている「駅から徒歩〇分」の算出方法。物件から最も近い駅の出入口までの道路距離を測定し、「80m＝1分」として割り算を行う（1mでも端数が出れば1分切り上げ）。" },
  { "term": "応急仮設住宅の買上げ", "kana": "おうきゅうかせつじゅうたくのかいあげ", "group": "お", "desc": "災害時に自治体が被災者の住まいを迅速に確保するため、民間の賃貸マンションやアパートの一室を「みなし仮設住宅」として一定期間まとめて借り上げ、家賃を全額公費で負担する仕組み。" },
  { "term": "大型犬可の条件特約", "kana": "おおがたけんかのじょうけんとくやく", "group": "お", "desc": "賃貸物件で大型犬の飼育を認める代わりに、契約書に「退去時の専門業者による消臭消毒費用は100%借主負担とする」「敷金を通常より1ヶ月分多く預かる」などの特別なペナルティや条件を課す条項。" },
  { "term": "大口投資家向けの私募REIT", "kana": "おおぐちとうしかむけのしぼりーと", "group": "お", "desc": "証券取引所に上場しておらず、年金基金や大手金融機関などの大口プロ投資家だけを対象に資金を集めて運用する不動産投資信託。市場の価格変動を受けにくく、安定した利回りが特徴。" },
  { "term": "オートロックの不具合対応", "kana": "おーとろっくのふぐたいたいおう", "group": "お", "desc": "マンションのエントランスドアが閉まらない、鍵をかざしても解錠しないなどのトラブル時に、管理会社が電気錠の専門業者を手配し、入居者のセキュリティと安全を確保する保守実務。" },
  { "term": "オーナーチェンジの利回り確認", "kana": "おーなーちぇんじのりまわりかくにん", "group": "お", "desc": "入居者が住んだままの状態で売買される収益物件を購入する際、提示されている利回りが現在の実際の家賃（レントロール）に基づいた「表面利回り」なのか、経費を差し引いた「実質利回り」なのかを精査する作業。" },
  { "term": "屋上防水の保証期間", "kana": "おくじょうぼうすいのほしょうきん", "group": "お", "desc": "大規模修繕工事で屋上の防水シートや塗装を行った際、施工業者や材料メーカーから出される雨漏りに対する保証。一般的には「10年間」の契約が多く、期間内の自然劣化による雨漏りは無償補修される。" },
  { "term": "押し入れのカビ対策", "kana": "おしいれのかびたいさく", "group": "お", "desc": "賃貸一戸建てやアパートの収納内部の衛生管理。湿気が籠もりやすい北側の押し入れにすのこを敷いたり、調湿効果のあるしっくい・エコカラットを壁面に施工して、退去時のトラブルを防ぐ工夫。" },
  { "term": "汚水桝の破損交換", "kana": "おすいますのはそんこうかん", "group": "お", "desc": "敷地内の地中に埋まっている古いコンクリート製の桝が、木の根の侵入や経年劣化で割れて汚水が漏れ出した際、耐久性が高く密閉性の良いポリ塩化ビニル（塩ビ）製の桝へ入れ替える修繕工事。" },
  { "term": "おとり物件の掲載ペナルティ", "kana": "おとりぶっけんのけいさいぺなるてぃ", "group": "お", "desc": "不動産ポータルサイトの広告規約に違反し、すでに成約して存在しない目玉物件を載せ続けた会社に対し、主要ポータルサイトへの広告掲載が一定期間（数ヶ月〜）全面的に禁止される厳しい措置。" },
  { "term": "オフィスビルの賃料相場", "kana": "おふぃすびるのちんりょうそうば", "group": "お", "desc": "特定のビジネスエリアにおける、オフィス床面積1坪（約3.3平米）あたりの月額家賃の平均値。景気動向や企業のオフィス回帰・テレワーク普及の割合によって変動する。" },
  { "term": "親族間売買の税務リスク", "kana": "しんぞくかんばいばいのぜいむりすく", "group": "お", "desc": "親子や兄弟間で不動産を売買する際、税務署からの指摘を避けるための注意点。市場の適正価格よりも著しく低い金額（格安）で取引すると、差額分が「みなし贈与」と判定され、重い贈与税が課される点。" },
  { "term": "親族間贈与の特例利用", "kana": "しんぞくかんぞうよのとくれいりよう", "group": "お", "desc": "子や孫へ住宅取得資金をプレゼントする際や不動産を譲る際、「住宅取得等資金の贈与税の非課税特例」などを活用し、事前の届出と確定申告を行うことで税金負担をゼロまたは大幅に軽減する実務。" },
  { "term": "お盆の遺品整理プラン", "kana": "おぼんのいひんせいりぷらん", "group": "お", "desc": "実家を相続した兄弟姉妹が、連休中に一斉に集まって故人の残した家財道具や衣類を片付けられるよう、お盆休みの期間に合わせてスケジュールを組む専門の遺品整理・空き家片付け業者のサービス。" },
  { "term": "折込チラシの配布エリア", "kana": "おりこみちらしのはいふえりあ", "group": "お", "desc": "新築戸建ての現地見学会や不動産の売却募集を行う際、ターゲット層（ファミリー層やシニア層など）が多く住む地域や、物件から車で10〜15分圏内の近隣エリアを絞り込んで新聞にチラシを投入するマーケティング手法。" },
  { "term": "温水洗浄便座の電気工事", "kana": "おんすいせんじょうべんざのでんきこうじ", "group": "お", "desc": "築古アパートの和式から洋式へのリフォーム時など、トイレ内にウォシュレット用のコンセント（アース付き100V電源）がない場合に、ブレーカーから壁の内部を通して新しく配線を引き込む電気専門工事。" },
  { "term": "オーナーズクラブの会報誌", "kana": "おーなーずくらぶのかいほうし", "group": "お", "desc": "アパートやマンションの建築会社・管理会社が、顧客である大家さん向けに毎月・季刊で発行する情報誌。最新の不動産税制の法改正、空室対策の成功事例、リフォームのトレンドなどが掲載されている。" },
  { "term": "汚泥の引き抜き義務", "kana": "おでいのひきぬきぎむ", "group": "お", "desc": "浄化槽法に基づき、下水道未整備の物件にある浄化槽の機能を正常に保つため、所有者（または管理者）が毎年少なくとも1回、専門業者に依頼して槽内の汚泥やスカムをすべて吸い出さなければならない義務。" },
  { "term": "下水管の詰まりトラブル", "kana": "げすいかんのつまるトラブル", "group": "お", "desc": "共同住宅の共有排水管に、入居者が流した油脂や異物が蓄積して流れが悪くなり、1階の部屋のトイレやキッチンから排水が逆流する事故。管理会社が緊急で高圧洗浄をかけて開通させる。" },
  { "term": "重い家具の設置跡", "kana": "おもいかぐのせっちあと", "group": "お", "desc": "賃貸アパートの退去時における、タンスや本棚を長年置いていたことでクッションフロアについた四角い凹み傷。意図的なキズではないため、ガイドライン上は「経年劣化」として原則大家さんの負担で直す部分。" },
  { "term": "織物壁紙のメンテナンス", "kana": "おりものかべがみのめんてなんす", "group": "お", "desc": "布製の高級クロスが貼られた分譲住宅や注文住宅の維持方法。ビニールクロスのように水拭きができないため、ホコリをブラシで落としたり、シミがついた場合は中性洗剤を固く絞った布で叩くように落とすお手入れ。" },
  { "term": "オフバランス化の目的", "kana": "おふばらんすかのもくてき", "group": "お", "desc": "大企業が自社ビルを売却して賃貸（リースバック）に切り替える狙い。重い固定資産を現金化して本業の投資へ回すとともに、総資産利益率（ROA）などの財務指標を見栄え良く改善すること。" },
  { "term": "温熱環境の最高等級", "kana": "おんねつかんきょうのさいこうとうきゅう", "group": "お", "desc": "住宅性能表示制度における断熱性能のトップクラス。壁や窓の断熱材（複層ガラス等）を極限まで高めることで、外気温の影響をほとんど受けず、省エネかつ年中快適に過ごせる、環境に配慮した長期優良住宅の基準。" },
  { "term": "おとり物件の自動検知システム", "kana": "おとりぶっけんのじどうけんちしすてむ", "group": "お", "desc": "大手の不動産検索ポータルサイトが導入しているAI技術。指定流通機構（レインズ）の成約データと自社サイトの掲載物件をリアルタイムで照合し、すでに終了している架空広告を自動的に見つけ出して非表示にする仕組み。" },
  { "term": "汚水桝の定期点検", "kana": "おすいますのていきてんけん", "group": "お", "desc": "アパートや戸建てのオーナーが、敷地内の排水トラブルを防ぐために行う管理。半年に1回程度、外にある枡のフタを開けて、キッチンからの油汚れが固まって排水を塞いでいないかを確認する作業。" },
  { "term": "越境の覚書の引き継ぎ", "kana": "えっきょうのおぼえがきのひきつぎ", "group": "え", "desc": "不動産売買において、売主が隣人と交わしていた「越境物に関する覚書」を、新しく所有者になる買主へそのままスライドして引き継ぐ実務。これにより買主も将来の是正権利を隣人に対して主張できるようになる。" },
  { "term": "請負代金の分割払い", "kana": "うけおいだいきんのぶんかつばらい", "group": "う", "desc": "注文住宅の建築において、工事代金を契約時、着工時、上棟時、竣工時の4回などに分けて支払う仕組み。それぞれのタイミングで「つなぎ融資」を利用するのが一般的。" },
  { "term": "売出物件の写真撮影", "kana": "うりだしぶっけんのしゃしんさつえい", "group": "う", "desc": "不動産ポータルサイトの反響を高めるため、広角レンズや三脚を使用し、室内の明るさやバルコニーからの眺望などを魅力的に撮影する仲介業者の重要な募集実務。" },
  { "term": "売主の担保責任", "kana": "うりぬしのたんぽせきにん", "group": "う", "desc": "（現：契約不適合責任）売却した不動産に、契約書に記載のない欠陥や数量不足があった場合、売主が買主に対して負う、修補、代金減額、契約解除、損害賠償などの法的な責任。" },
  { "term": "有償譲渡の特例", "kana": "ゆうしょうじょうとのとくれい", "group": "う", "desc": "自分が住んでいるマイホーム（実質的な居住用不動産）を売却した際、売却益（譲渡所得）から最大3,000万円までを控除して税金をゼロまたは大幅に減額できる税制上の優遇措置。" },
  { "term": "請負契約のクーリングオフ", "kana": "うけおいけいやくのくーりんぐおふ", "group": "う", "desc": "ハウスメーカーの展示場や事務所ではなく、訪問営業などで自宅や喫茶店において住宅の建築請負契約を交わした場合、一定の要件を満たせば8日以内なら無条件で解約できる法的な権利。" },
  { "term": "埋立地の不同沈下", "kana": "うめたてちのふどうちんか", "group": "う", "desc": "地盤の強度が不均一な埋立地において、建物の重みによって地盤が斜めに傾くように沈む現象。ドアが閉まらなくなったり外壁に亀裂が入るなど、建物構造に深刻なダメージを与える。" },
  { "term": "裏口の動線設計", "kana": "うらぐちのどうせんせっけい", "group": "う", "desc": "戸建ての建築や店舗物件のレイアウトにおいて、勝手口や裏口からゴミ置き場、駐車場、厨房などへスムーズにアクセスできるよう、作業効率やプライバシーに配慮した配置計画。" },
  { "term": "売却の査定報告書", "kana": "ばいきゃくのさていほうこくしょ", "group": "う", "desc": "不動産会社が売主に対して提示する書面。近隣の取引事例や路線価、物件の状態などを根拠に算出した「3ヶ月以内に売却が可能と予想される価格」や販売戦略がまとめられている。" },
  { "term": "売出価格の交渉余白", "kana": "うりだしかかくのこうしょうよはく", "group": "う", "desc": "不動産を売りに出す際、買主から「端数を値引きしてほしい」と指値が入ることを見越して、実際の希望成約価格よりも数十万円から数百万円程度あらかじめ高く設定しておく価格の幅。" },
  { "term": "上物の登記簿調査", "kana": "うわもののとうきぼちょうさ", "group": "う", "desc": "古い建物が残る土地を売買する際、法務局で建物の登記事項証明書を取得し、所有者の名義が土地と同じか、古い抵当権が残っていないか、あるいは「未登記」状態でないかを確認する実務。" },
  { "term": "受取家賃の送金明細", "kana": "うけとりやちんのそうきんめいさい", "group": "う", "desc": "賃貸管理会社が物件オーナーに対して毎月発行する収支報告書。入居者から回収した総家賃から、管理委託手数料や突発的な修繕費用などを差し引いた実際の送金額と内訳が記されている。" },

// --- 検索・表示処理ロジック ---
function renderGlossary(data) {
    const container = document.getElementById('glossaryContainer');
    const countContainer = document.getElementById('resultCount');
    container.innerHTML = '';
    
    countContainer.textContent = `該当件数: ${data.length}件`;

    if (data.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:30px; color:#999;">該当する用語が見つかりません。</p>';
        return;
    }

    // 50音グループおよび英数の定義
    const groups = [
        { label: 'あ行', key: 'あ' },
        { label: 'か行', key: 'か' },
        { label: 'さ行', key: 'さ' },
        { label: 'た行', key: 'た' },
        { label: 'な行', key: 'な' },
        { label: 'は行', key: 'は' },
        { label: 'ま行', key: 'ま' },
        { label: 'や行', key: 'や' },
        { label: 'ら行', key: 'ら' },
        { label: 'わ行', key: 'わ' },
        { label: '英数字・他', key: '英数' }
    ];

    groups.forEach(group => {
        const groupItems = data.filter(item => item.group === group.key);
        
        if (groupItems.length > 0) {
            const groupSection = document.createElement('div');
            groupSection.className = 'glossary-group';
            
            let html = `<h2 class="group-title">${group.label}</h2>`;
            groupItems.forEach(item => {
                html += `
                    <div class="term-item">
                        <div class="term-title">${item.term}</div>
                        <div class="term-kana">${item.kana}</div>
                        <div class="term-desc">${item.desc}</div>
                    </div>
                `;
            });
            groupSection.innerHTML = html;
            container.appendChild(groupSection);
        }
    });
}

const searchInput = document.getElementById('searchInput');
const filterButtons = document.getElementById('filterButtons');
let currentFilter = 'all';

function filterData() {
    const searchText = searchInput.value.toLowerCase().trim();
    
    const filtered = glossaryData.filter(item => {
        const matchesFilter = (currentFilter === 'all' || item.group === currentFilter);
        const matchesSearch = !searchText || 
            item.term.toLowerCase().includes(searchText) ||
            item.kana.includes(searchText) ||
            item.desc.toLowerCase().includes(searchText);

        return matchesFilter && matchesSearch;
    });

    renderGlossary(filtered);
}

searchInput.addEventListener('input', filterData);

filterButtons.addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.getAttribute('data-kana');
    filterData();
});

// 初回実行
renderGlossary(glossaryData);
</script>
