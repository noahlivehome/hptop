<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不動産用語集（即戦力版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            line-height: 1.7;
            color: #333;
            background-color: #f4f6f8;
        }
        header {
            background-color: #1e3d59;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        header h1 { font-size: 2rem; margin-bottom: 10px; }
        
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .search-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .search-input {
            width: 100%;
            padding: 12px 15px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #1e3d59; }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            justify-content: center;
        }
        .filter-btn {
            background: #eee;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #ff6e40;
            color: #fff;
        }

        .glossary-group {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }
        .group-title {
            font-size: 1.6rem;
            color: #1e3d59;
            border-bottom: 3px solid #1e3d59;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }
        .term-item {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #eee;
        }
        .term-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .term-title {
            font-weight: bold;
            font-size: 1.2rem;
            color: #ff6e40;
            margin-bottom: 5px;
        }
        .term-kana {
            font-size: 0.85rem;
            color: #777;
            margin-bottom: 5px;
        }
        .term-desc { color: #444; }

        .result-count {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #666;
            text-align: right;
        }
    </style>
</head>
<body>

<header>
    <h1>不動産用語集</h1>
    <p>キーワード検索・50音フィルター機能付き</p>
</header>

<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="キーワードや読み仮名で検索（例：仲介、ばいかい、RC）...">
        <div class="filter-buttons" id="filterButtons">
            <button class="filter-btn active" data-kana="all">すべて</button>
            <button class="filter-btn" data-kana="あ">あ</button>
            <button class="filter-btn" data-kana="か">か</button>
            <button class="filter-btn" data-kana="さ">さ</button>
            <button class="filter-btn" data-kana="た">た</button>
            <button class="filter-btn" data-kana="な">な</button>
            <button class="filter-btn" data-kana="は">は</button>
            <button class="filter-btn" data-kana="ま">ま</button>
            <button class="filter-btn" data-kana="や">や</button>
            <button class="filter-btn" data-kana="ら">ら</button>
            <button class="filter-btn" data-kana="わ">わ</button>
            <button class="filter-btn" data-kana="英数">英数</button>
        </div>
    </div>

    <div class="result-count" id="resultCount"></div>
    <div id="glossaryContainer"></div>
</div>

<script>
// 組み込み用の不動産用語データ（全147個）
const glossaryData = [
  { "term": "青田売り", "kana": "あおたうり", "group": "あ", "desc": "未完成の宅地や建物の売買契約を締結すること。新築分譲マンションや一戸建ての販売で一般的な手法。" },
  { "term": "空き家", "kana": "あきや", "group": "あ", "desc": "人が居住していない、または使用されていない住宅のこと。管理義務や特定空家への指定など、税制上のペナルティリスクがある。" },
  { "term": "アパート", "kana": "あぱーと", "group": "あ", "desc": "一般的に木造や軽量鉄骨造で作られた2〜3階建ての共同住宅。マンションに比べて建築コストが低く、賃料も比較的安価。" },
  { "term": "頭金", "kana": "あたまきん", "group": "あ", "desc": "不動産を購入する際、住宅ローンの融資額以外に、自己資金から現金で支払う物件代金の一部。通常は物件価格の1〜2割が目安。" },
  { "term": "上がり框", "kana": "あがりがまち", "group": "あ", "desc": "玄関の靴を脱ぐ土間と、室内の床の段差部分に取り付けられる横木や化粧材のこと。家の第一印象を決める重要な要素。" },
  { "term": "アスベスト", "kana": "あすべすと", "group": "あ", "desc": "石綿。耐火性や断熱性に優れ過去に広く使われたが、健康被害が判明したため現在は製造・使用が全面的に禁止されている。" },
  { "term": "アトリエ", "kana": "あとりえ", "group": "あ", "desc": "芸術家やデザイナーが作業を行うための工房。賃貸物件では、広い土間や高天井、防音対策が施された部屋を指すことがある。" },
  { "term": "安心R住宅", "kana": "あんしんあーるじゅうたく", "group": "あ", "desc": "耐震性があり、インスペクション（建物状況調査）実施済で、リフォーム情報が開示された国の基準を満たす中古住宅の標章。" },
  { "term": "RC造", "kana": "あーるしーぞう", "group": "あ", "desc": "鉄筋コンクリート造の略。引張力に強い鉄筋と圧縮力に強いコンクリートを組み合わせた、高耐久・高遮音性の建築構造。" },
  { "term": "ALC造", "kana": "えーえるしーぞう", "group": "あ", "desc": "軽量気泡コンクリートパネルを使用した構造。断熱性、耐火性、軽量性に優れ、中高層住宅の外壁や床によく使われる。" },
  { "term": "空き部屋", "kana": "あきべや", "group": "あ", "desc": "賃貸物件において、入居者がおらず現在募集中の状態にある部屋。空室率の計算ベースとなる。" },
  { "term": "明け渡し", "kana": "あけわたし", "group": "あ", "desc": "借主が不動産の占有を解き、貸主に対してその物件を自由に使える状態に戻して返すこと。原状回復を伴う。" },
  { "term": "足場", "kana": "あしば", "group": "あ", "desc": "建築工事や外壁塗装の際、高所での作業を安全かつ円滑に行うために仮設される、作業員用の通路や構造物のこと。" },
  { "term": "青色申告", "kana": "あおいろしんこく", "group": "あ", "desc": "不動産所得や事業所得がある人が、一定の帳簿を記録・保存することで最高65万円の特別控除など税制上の優遇を受けられる制度。" },
  { "term": "案内所", "kana": "あんないじょ", "group": "あ", "desc": "宅地分譲地や新築マンションの現地などで、買い手に対して物件の説明や契約手続きを臨時に行うために設置される施設。" },
  { "term": "空き地", "kana": "あきち", "group": "あ", "desc": "建物が建っておらず、特定の目的で使用されていない土地。雑草の繁茂やゴミの不法投棄など管理上の問題が生じやすい。" },
  { "term": "アクセス", "kana": "あくせす", "group": "あ", "desc": "物件から最寄り駅、または主要都市への交通の便や所要時間のこと。不動産の資産価値を左右する重要な指標。" },
  { "term": "アプローチ", "kana": "あぷろーち", "group": "あ", "desc": "敷地の入り口（門扉）から建物の玄関口までに至る通路・空間のこと。植栽や舗装材で意意を凝らすことが多い。" },
  { "term": "雨戸", "kana": "あまど", "group": "あ", "desc": "防風、防犯、防火、遮光などの目的で、建物の窓の外側に設置される引戸やシャッター。台風などの災害時に重宝される。" },
  { "term": "網戸", "kana": "amiｄo", "group": "あ", "desc": "虫の侵入を防ぎつつ、室内に自然の風を取り入れるために窓枠に取り付けられる、防虫網を張った戸のこと。" },
  { "term": "アンカーボルト", "kana": "あんかーぼると", "group": "あ", "desc": "木造建築物などで、コンクリートの基礎と建物の土台を強固に固定するために基礎内部に埋め込まれるボルト。" },
  { "term": "暗渠", "kana": "あんきょ", "group": "あ", "desc": "地中に埋設された、または蓋をされた水路のこと。かつての川が暗渠化され、現在は遊歩道になっているケースも多い。" },
  { "term": "RC壁式構造", "kana": "あーるしーかべしきこうぞう", "group": "あ", "desc": "柱や梁を設けず、鉄筋コンクリートの「壁」と「床（スラブ）」で建物を支える構造。室内に柱の出っ張りが出ない。" },
  { "term": "アイランドキッチン", "kana": "あいらんどきっちん", "group": "あ", "desc": "シンクや調理台が壁に接しておらず、室内で島（アイランド）のように独立して配置された開放的な対面式キッチン。" },
  { "term": "アウトレット", "kana": "あうとれっと", "group": "あ", "desc": "電気器具のプラグを差し込むコンセント（差込口）や、LANケーブル、テレビアンテナなどの接続端子の総称。" },
  { "term": "明かり窓", "kana": "あかりまど", "group": "あ", "desc": "採光を主目的として、部屋の天井近くや廊下、階段、ドアの上部などに設けられた開閉できない（または小さな）窓。" },
  { "term": "アコーディオンドア", "kana": "あこーでおんどあ", "group": "あ", "desc": "楽器のアコーディオンのように蛇腹状に伸縮して開閉する間仕切り用の扉。限られたスペースを有効活用できる。" },
  { "term": "上げ下げ窓", "kana": "あげさげまど", "group": "あ", "desc": "2枚の戸を上下にスライドさせて開閉する窓。洋風のデザイン住宅によく使われ、気密性が比較的高い。" },
  { "term": "朝市", "kana": "あさいち", "group": "あ", "desc": "地域の広場や商店街で朝方に開催される市場。周辺住環境の利便性やコミュニティの活発さを測る要素になる。" },
  { "term": "浅型シンク", "kana": "あさがたしんく", "group": "あ", "desc": "キッチンの流し台において、底が浅めに設計されたシンク。シンク下の収納スペースを広く確保できるメリットがある。" },
  { "term": "アスファルト", "kana": "あすふぁると", "group": "あ", "desc": "原油から精製される粘着性の高い炭化水素化合物。砂利などと混ぜて、駐車場の敷地や道路の舗装に広く使われる。" },
  { "term": "アース線", "kana": "あーすせん", "group": "あ", "desc": "洗濯機や電子レンジなどの家電製品から、漏電時の感電を防ぐために電気を地面に逃がすための安全用配線。" },
  { "term": "アセット", "kana": "あせっと", "group": "あ", "desc": "英語で「資産」の意味。不動産投資の文脈では、投資対象となる土地、建物、マンションなどの物件を指す。" },
  { "term": "アセットマネジメント", "kana": "あせっとまねじめんと", "group": "あ", "desc": "投資用不動産の所有者に代わり、物件の資産価値を最大化するための運用計画の策定や管理を行う業務（AM）。" },
  { "term": "頭金なし", "kana": "あたまきんなし", "group": "あ", "desc": "物件価格の全額（場合によっては諸費用も含む）を住宅ローンで賄い、自己資金の持ち出しゼロで購入すること（フルローン）。" },
  { "term": "後施工アンカー", "kana": "あとせこうあんかる", "group": "あ", "desc": "硬化したコンクリートに対して、ドリルで穴をあけて後から取り付けるアンカーボルト。耐震補強工事などで多用される。" },
  { "term": "アトリウム", "kana": "あとりうむ", "group": "あ", "desc": "ガラスなどで覆われた、大規模な吹き抜けがある開放的な屋内大空間。商業ビルや高級マンションのエントランスに見られる。" },
  { "term": "油引き", "kana": "あぶらひき", "group": "あ", "desc": "木製の床（フローリング）や柱などに、保護や艶出しの目的で植物油やワックスを塗布して仕上げるメンテナンス作業。" },
  { "term": "雨仕舞", "kana": "あまじまい", "group": "あ", "desc": "建物内に雨水が侵入しないように、屋根や外壁の接合部などに防水シートやシーリング材を施して雨水を適切に受け流す設計・施工。" },
  { "term": "網入りガラス", "kana": "あみいりがらす", "group": "あ", "desc": "内部に金属製の網（ワイヤー）を封入したガラス. 火災時に割れてもガラス破片が飛び散り難く、防火延焼防止効果がある。" },
  { "term": "荒床", "kana": "あらゆか", "group": "あ", "desc": "畳やフローリングなどの仕上げ材を敷く前に、建物の構造土台の上に直接張られる合板などの下地用床板のこと。" },
  { "term": "アルコーブ", "kana": "あるこーぶ", "group": "あ", "desc": "マンションの共用廊下から、各住戸の玄関扉を少し奥まった位置に配置して作られた凹状のスペース。プライバシーを確保できる。" },
  { "term": "アルミニウムサッシ", "kana": "あるみにうむさっし", "group": "あ", "desc": "アルミ製の窓枠（サッシ）。軽量で耐久性・耐食性に優れ、日本の住宅の窓枠として最も広く普及している。" },
  { "term": "合わせガラス", "kana": "あわせがらす", "group": "あ", "desc": "2枚のガラスの間に強靭な樹脂の中間膜を挟み、圧着したガラス。割れにくく、防犯や防音、UVカット効果が高い。" },
  { "term": "暗騒音", "kana": "あんそうおん", "group": "あ", "desc": "特定の音を発していない状態において、その環境に常に存在する周囲の雑音（遠くの道路の音など）。物件の防音測定の基準となる。" },
  { "term": "アンダーパニング工法", "kana": "あんだーぱにんぐこうほう", "group": "あ", "desc": "地盤沈下などで傾いた建物の基礎の下に、ジャッキや鋼管杭を設置して、建物を水平に修正・補強する高度な工事手法。" },
  { "term": "安定地盤", "kana": "あんていじばん", "group": "あ", "desc": "長期にわたって建物を支えるのに十分な強度（地耐力）を持ち、不同沈下などのリスクが極めて低い良好な地層・地盤。" },
  { "term": "案内看板", "kana": "あんないかんばん", "group": "あ", "desc": "現地見学会やオープンハウスの会場へ誘導するために、道路沿いや物件前に設置される、経路や物件概要を示した看板。" },
  { "term": "按分", "kana": "あんぶん", "group": "あ", "desc": "不動産取引において、土地と建物の総額から、それぞれの価値の比率に応じて価格を割り振ること。消費税の計算等に必須。" },
  { "term": "安全持出", "kana": "あんぜんもちだし", "group": "あ", "desc": "建築足場の手すりや、ベランダの避難ハッチなど、災害や作業時の安全性を確保するために法的に規定された突出寸法や空間。" },
  { "term": "相見積もり", "kana": "あいみつもり", "group": "あ", "desc": "建築工事やリフォーム、管理委託などを依頼する際、複数の業者から同時に見積書を取り寄せて、価格や条件を比較検討すること。" },
  { "term": "合鍵", "kana": "あいかぎ", "group": "あ", "desc": "オリジナルの鍵（親鍵）をもとに複製された予備の鍵。賃貸物件では退去時にすべて（合鍵含む）の返却が義務付けられるのが一般的。" },
  { "term": "空き家バンク", "kana": "あきやばんく", "group": "あ", "desc": "地方自治体などが運営する、地域の空き家情報を提供・仲介するシステム。移住・定住促進や地域活性化を目的としている。" },
  { "term": "空き駐車場", "kana": "あきちゅうしゃじょう", "group": "あ", "desc": "マンション敷地内や月極駐車場において、契約者がおらず現在利用者を募集している区画のこと。" },
  { "term": "アーク溶接", "kana": "あーくようせつ", "group": "あ", "desc": "電気の放電現象（アーク）による熱を利用して、鉄骨などの金属部材を接合する溶接工法。ビル建築などの鉄骨骨組で多用される。" },
  { "term": "揚げ床", "kana": "あげゆか", "group": "あ", "desc": "床下に配線や配管を通すスペースを確保するために、本来の床スラブ（構造体）よりも一段高く組まれた床（OAフロアなど）。" },
  { "term": "網代天井", "kana": "あじろてんじょう", "group": "あ", "desc": "杉や檜、竹などの薄い板を互い違いに編んだ「網代」を張り付けた和室の天井。茶室や高級和風住宅で見られる伝統的な意匠。" },
  { "term": "明日香法", "kana": "あすかほう", "group": "あ", "desc": "明日香村における歴史的風土の保存および生活環境の整備等に関する特別措置法。歴史的景観を守るための建築制限などがある。" },
  { "term": "アスファルトルーフィング", "kana": "あすふぁるとるーふぃんぐ", "group": "あ", "desc": "板紙にアスファルトを浸透・被覆させたシート状の防水材。主に木造住宅の屋根の仕上げ材（瓦やガルバリウム）の下地に敷かれる。" },
  { "term": "足元灯", "kana": "あしもととう", "group": "あ", "desc": "廊下や階段の低い位置に設置される、夜間の歩行安全を確保するための照明。フットライトとも呼ばれ、暗くなると自動点灯するものもある。" },
  { "term": "アースクエイク", "kana": "あーすくえいく", "group": "あ", "desc": "地震のこと。不動産取引においては、建物の構造耐震基準や地震保険の加入検討、ハザードマップの確認の文脈で重要視される。" },
  { "term": "アパートローン", "kana": "あぱーとろーん", "group": "あ", "desc": "金融機関が提供する、賃貸用アパートや一棟マンションなどの投資用・事業用不動産を購入・建築するための融資（ローン）。" },
  { "term": "アフォーダブル住宅", "kana": "あふぉーだぶるじゅうたく", "group": "あ", "desc": "中間層から低所得層向けに、市場価格よりも安価で提供される「購入・維持が可能な価格帯」の良質な住宅のこと。" },
  { "term": "油汚れ防止シート", "kana": "あぶらよごれぼうししーと", "group": "あ", "desc": "キッチンのコンロ周辺の壁面に貼り、調理時の油飛びによる汚れやシミを防ぐためのシート。賃貸の原状回復対策としても使われる。" },
  { "term": "雨水利用システム", "kana": "あまみずりようしすてむ", "group": "あ", "desc": "屋根に降った雨水を集めて貯水タンクに溜め、庭の水やりや災害時の非常用水、トイレの洗浄水として再利用する環境配慮型の設備。" },
  { "term": "網入りガラス（型板）", "kana": "あみいりがらすかたいた", "group": "あ", "desc": "ガラスの表面に凹凸の模様をつけ、内部に金属製のワイヤーを入れたガラス。視線を遮りつつ、防火・延焼防止機能を持たせている。" },
  { "term": "粗利益", "kana": "あらりえき", "group": "あ", "desc": "不動産会社などの営業活動において、売上高（仲介手数料など）から直接の売上原価を差し引いた、大まかな利益（売上総利益）。" },
  { "term": "アルゴンガス入りガラス", "kana": "あるごんがすいりがらす", "group": "あ", "desc": "複層ガラス（ペアガラス）の中空層に、空気よりも熱を伝えにくい「アルゴンガス」を注入した、断熱性能が極めて高いガラス。" },
  { "term": "アルミニウム", "kana": "あるみにうむ", "group": "あ", "desc": "軽量で耐食性が高く、加工しやすい金属。窓のサッシ（枠）やバルコニーの手すり、外壁のサイディング等に広く用いられる。" },
  { "term": "アンカー", "kana": "あんかー", "group": "あ", "desc": "建物の部材を固定するため、コンクリートや地盤などに埋め込むボルトや金具の総称。構造物の転倒や引き抜けを防ぐ役割を持つ。" },
  { "term": "案内図", "kana": "あんないず", "group": "あ", "desc": "不動産のマイソク（販売図面）やパンフレットに掲載される、物件の周辺地図。最寄り駅からのルートや主要施設の位置を示す。" },
  { "term": "暗点", "kana": "あんてん", "group": "あ", "desc": "建築や間取りの設計において、光が届きにくく、常に影になってしまう暗いエリア。間接照明の設置などでカバーする。" },
  { "term": "安全係数", "kana": "あんぜんけいすう", "group": "あ", "desc": "建築構造計算において、材料の破壊強度に対してどれだけの余裕（安全限界）を持たせるかを示す数値。構造の安全性を担保する。" },
  { "term": "RCラーメン構造", "kana": "あーるしーらーめんこうぞう", "group": "あ", "desc": "鉄筋コンクリート造において、柱と梁を強固に一体化（剛接合）して建物を支える構造。壁を減らせるため大空間を作りやすい。" },
  { "term": "アイアンフレーム", "kana": "あいあんふれーむ", "group": "あ", "desc": "鉄製の骨組み。インテリアやリノベーションにおいて、インダストリアル（工業的）なデザインを演出するための棚や建具に好まれる。" },
  { "term": "空き店舗", "kana": "あきてんぽ", "group": "あ", "desc": "商業ビルや商店街において、営業が行われておらず借り手を募集している状態の店舗物件。地域の経済状況を反映する指標。" },
  { "term": "アクセントクロス", "kana": "あくせんとくろす", "group": "あ", "desc": "部屋の壁紙（クロス）の一面だけに、他とは異なる色や柄の壁紙を採用し、空間にアクセントやおしゃれな雰囲気を出す手法。" },
  { "term": "アクリル板", "kana": "あくりるばん", "group": "あ", "desc": "透明度が高く、軽量で耐衝撃性に優れたプラスチック板。建物の室内ドアの明かり窓やパーテーション、看板などに使われる。" },
  { "term": "朝顔", "kana": "あさがお", "group": "あ", "desc": "建築現場の足場に取り付けられる、上部からの資材やゴミの落下を防ぐための斜め上方に突き出た防護棚（落下物防止棚）。" },
  { "term": "足元暖房", "kana": "あしもとだんぼう", "group": "あ", "desc": "キッチンの足元や床面付近に設置される、局所的な暖房設備。床暖房や、システムキッチンの蹴込み部分に組み込まれるヒーターなど。" },
  { "term": "アスファルト乳剤", "kana": "あすふぁるとにゅうざい", "group": "あ", "desc": "アスファルトを水中に微粒子として分散させた液体。道路舗装時の下地との接着剤や、簡易的な防水・防塵材として使用される。" },
  { "term": "アース付コンセント", "kana": "あーすつきこんせんと", "group": "あ", "desc": "感電やノイズを防ぐアース線を接続するための端子がついたコンセント。キッチン、洗面所、トイレなどの水回りに必須。" },
  { "term": "アセット・アロケーション", "kana": "あせっとあろけーしょん", "group": "あ", "desc": "投資において、資金を不動産、株式、債券、現金などの異なる資産（アセット）にどのような割合で配分するかを決める運用戦略。" },
  { "term": "頭金ゼロ", "kana": "あたまきんぜろ", "group": "あ", "desc": "手元の自己資金（現金）を全く使わずに、物件価格の全額を住宅ローン（フルローン）で調達して不動産を購入すること。" },
  { "term": "後付シャッター", "kana": "あとづけしゃったー", "group": "あ", "desc": "新築時に設置していなかった窓に対して、リフォームによって後から取り付ける、防犯や防災（台風対策）のためのシャッター。" },
  { "term": "アパルトマン", "kana": "あぱるとまん", "group": "あ", "desc": "フランス語でアパートや集合住宅を指す言葉。日本の不動産広告では、おしゃれな欧風デザインの賃貸アパートの呼称として使われることがある。" },
  { "term": "雨よけひさし", "kana": "あまよけひさし", "group": "あ", "desc": "窓や玄関扉の上部に取り付けられる、雨水が室内に吹き込んだり、外壁を伝って汚れたりするのを防ぐための小さな張り出し屋根。" },
  { "term": "網入り型板ガラス", "kana": "網入り型板ガラス", "group": "あ", "desc": "表面に不透明な型模様を施し、内部に防火用の金属網を封入したガラス。主に隣地境界線に近い窓の防火対策に用いられる。" },
  { "term": "粗床板", "kana": "あらゆかいた", "group": "あ", "desc": "床の仕上げ材（畳やフローリング）を敷くための、下地として張られる杉や合板などの板材。建築構造の基礎床部分。" },
  { "term": "アルコーブ面積", "kana": "あるこーぶめんせき", "group": "あ", "desc": "マンション戸別玄関前のアルコーブ（凹み空間）の面積。専有面積には含まれないが、専用使用権が認められていることが多い。" },
  { "term": "アンティーク", "kana": "あんてぃーく", "group": "あ", "desc": "製造から100年以上が経過した古風で希少価値のある家具や建具。古民家再生やリノベーションのインテリアスタイルとして人気。" },
  { "term": "暗騒音レベル", "kana": "あんそうおんれべる", "group": "あ", "desc": "特定の音（室内で発生する騒音など）がない状態での、その部屋本来の静かさをデシベル（dB）で表した数値。防音性能測定の基礎。" },
  { "term": "安全ガラス", "kana": "あんぜんがらす", "group": "あ", "desc": "万が一割れても破片が鋭利にならず粉々になる「強化ガラス」や、破片が飛び散らない「合わせガラス」など、安全性の高いガラスの総称。" },
  { "term": "安全通路", "kana": "あんぜんつうろ", "group": "あ", "desc": "建築工事現場内において、作業員が安全に移動できるように障害物を排除し、手すりや照明などを設けて明確に区画された通路。" },
  { "term": "按分比率", "kana": "あんぶんひりつ", "group": "あ", "desc": "土地と建物がセットで販売される不動産において、全体の価格から土地と建物のそれぞれの価値を切り分けるための計算比率。" },
  { "term": "安定液", "kana": "あんていえき", "group": "あ", "desc": "ビルの基礎杭を設置するために深く地面を掘削する際、周囲の地盤が崩壊するのを防ぐために掘削穴に注入する粘性の高い液体。" },
  { "term": "アール", "kana": "あーる", "group": "あ", "desc": "建築やインテリアにおいて、壁の角や天井、下がり壁などを丸みを持たせた曲線（半径：Radius）に仕上げるデザインのこと。" },
  { "term": "空きロット", "kana": "あきろっと", "group": "あ", "desc": "分譲地や産業団地、駐車場などにおいて、まだ区画が埋まっておらず、契約・購入が可能な状態にある空き区画（ロット）。" },
  { "term": "案内用図面", "kana": "あんないようずめん", "group": "あ", "desc": "不動産会社が顧客を物件に案内する際、または店頭に掲示するために、間取り図、家賃、物件詳細、地図などを1枚にまとめた図面。" },
  { "term": "安全パトロール", "kana": "あんぜんまとろーる", "group": "あ", "desc": "建築現場において、労働災害や事故を未然に防ぐため、現場責任者や安全衛生委員が定期的に構内の足場や設備を巡回・点検する活動。" },
  { "term": "アイストップ", "kana": "あいすとっぷ", "group": "あ", "desc": "廊下の突き当たりや庭の正面など、人の視線が自然と集まる場所に配置する、絵画や植栽、オブジェなどの見どころとなる要素。" },
  { "term": "合決（相決）", "kana": "あいけつ", "group": "あ", "desc": "不動産取引や建築契約において、複数の当事者や業者の間で、条件や意思決定を相互に合意・決定すること。" },
  { "term": "空き家対策特措法", "kana": "あきやたいさくとくそほう", "group": "あ", "desc": "放置された空き家による治安・衛生の悪化を防ぐための法律。倒壊の危険がある物件を「特定空家」に指定し、解体や修繕を勧告・命令できる。" },
  { "term": "空き地管理", "kana": "あきちかんり", "group": "あ", "desc": "所有している未利用の土地について、定期的な草刈りやゴミの不法投棄防止フェンスの設置など、近隣トラブルを防ぐために行う維持管理活動。" },
  { "term": "亜鉛メッキ鋼板", "kana": "あえんめっきこうはん", "group": "あ", "desc": "鋼板の表面にサビを防ぐ亜鉛メッキを施した資材。外壁のサイディングや屋根材、ダクトなどの建築建材として広く使用される。" },
  { "term": "上り傾斜", "kana": "あがりけいしゃ", "group": "あ", "desc": "道路や敷地が、ある基準点から前方に向かって高くなっている坂道の状態。排水計画や、車庫入れのしやすさに影響を与える。" },
  { "term": "網代壁", "kana": "あじろかべ", "group": "あ", "desc": "薄く削った木や竹をクロスさせて編んだシートを貼り付けた和室の壁。職人の技術を要する贅沢な仕上げで、風情のある空間を作る。" },
  { "term": "朝霞", "kana": "あさか", "group": "あ", "desc": "早朝に発生する霧（きり）や靄（もや）。川沿いや盆地の物件において、朝の視界や周辺環境の特性を説明する際に使われることがある。" },
  { "term": "アスファルトフェルト", "kana": "あすふぁるとふぇると", "group": "あ", "desc": "有機繊維のフェルトにアスファルトを染み込ませたシート状の防水材。主に木造住宅の外壁（モルタルなど）の下地防水として使われる。" },
  { "term": "足元灯付きコンセント", "kana": "あしもととうつきこんせんと", "group": "あ", "desc": "廊下や寝室の足元に設置される、深夜用の保安灯が一体型になったコンセント。停電時に自動点灯して取り外すと懐中電灯になるタイプもある。" },
  { "term": "アーチ窓", "kana": "あーちまど", "group": "あ", "desc": "上部が半円形（アーチ状）にカーブしたデザイン性の高い窓。南欧風やクラシック調の住宅外観によく取り入れられる。" },
  { "term": "アパート経営", "kana": "あぱーとけいえい", "group": "あ", "desc": "一棟アパートを所有し、各部屋を賃貸に出すことで、毎月の家賃収入（インカムゲイン）を得る不動産投資・事業のこと。" },
  { "term": "アメニティ", "kana": "あめにてぃ", "group": "あ", "desc": "住居や周辺環境における「快適性」「居心地の良さ」のこと。日当たり、通風、公園の近さなど、目に見えない付加価値を指す。" },
  { "term": "油シミ", "kana": "あぶらしみ", "group": "あ", "desc": "キッチンの床や壁、コンクリートの駐車場などに油が染み込んでできた汚れ。退去時の原状回復査定でチェックされる項目のひとつ。" },
  { "term": "雨樋（あまどい）", "kana": "あまどい", "group": "あ", "desc": "屋根に降った雨水を集め、地上や下水溝へスムーズに導くために屋根の軒先や外壁に沿って設置される筒状の排水設備。" },
  { "term": "網入り透明ガラス", "kana": "あみいりとうめいがらす", "group": "あ", "desc": "景色が見える透明なガラスの内部に、火災時の飛散を防ぐ金属製の網を封入したもの。準防火地域などの開口部で使用される。" },
  { "term": "粗利（あらり）", "kana": "あらり", "group": "あ", "desc": "売上高から売上原価を引いた最も基本的な利益（売上総利益）。不動産の売買仲介では、仲介手数料がそのまま粗利に近い扱いになる。" },
  { "term": "アルゴンガス", "kana": "あるごんがす", "group": "あ", "desc": "無色・無臭・無毒の不活性ガス。空気よりも熱伝導率が低いため、高断熱住宅向けのペアガラスの内部に封入される。" },
  { "term": "アルミスリット", "kana": "あるみすりっと", "group": "あ", "desc": "外構（エクステリア）において、目隠しやデザインの目的で立てられるアルミ製の細い柱（格子）。風通しと採光を維持できる。" },
  { "term": "暗室", "kana": "あんしつ", "group": "あ", "desc": "光を完全に遮断した部屋。一般住宅では、間取りの関係上、窓を設置できなかった納戸（サービスルーム）などを指すことがある。" },
  { "term": "アンカープレート", "kana": "あんかーぷれーと", "group": "あ", "desc": "アンカーボルトを構造体に固定する際、荷重を分散させて引き抜けを防ぐためにボルトの根元に取り付ける金属製の板。" },
  { "term": "安全対策", "kana": "あんぜんたいさく", "group": "あ", "desc": "建築現場での転落防止ネットの設置や、入居後の物件における防犯カメラ、段差解消など、事故や犯罪を防ぐためのハード・ソフト両面の取り組み。" },
  { "term": "安全衛生法", "kana": "あんぜんえいせいほう", "group": "あ", "desc": "労働安全衛生法。建築現場での作業員の安全と健康を確保するため、足場の組み方やヘルメットの着用、換気基準などを定めた法律。" },
  { "term": "RC造マンション", "kana": "あーるしーぞうまんしょん", "group": "あ", "desc": "鉄筋コンクリート造で建てられた中高層の集合住宅。木造や軽量鉄骨造に比べて耐震性・耐火性・防音性に非常に優れている。" },
  { "term": "アイ不燃ボード", "kana": "あいふねんぼーど", "group": "あ", "desc": "キッチンのコンロ周りの壁などに使われる、建築基準法で定められた「不燃材料」の認定を受けた内装用壁パネル。" },
  { "term": "空き家所有者", "kana": "あきやしょゆうしゃ", "group": "あ", "desc": "現在使用されていない住宅の登記上の持ち主。相続によって予期せず所有者になり、管理方法に悩むケースが増えている。" },
  { "term": "アクセントウォール", "kana": "あくせんとうぉーる", "group": "あ", "desc": "部屋の壁の一部分だけ、異なる色、レンガ調、木目などのデザインを施し、室内全体のインテリアを引き締める壁のこと。" },
  { "term": "アクリルサンデー", "kana": "あくりるさんでー", "group": "あ", "desc": "プラスチック建材やアクリル板を加工・接着する際によく使われる、DIYや現場で定番の専用接着剤の商品名・通称。" },
  { "term": "朝顔足場", "kana": "あさがおあしば", "group": "あ", "desc": "高層建築の工事で、上部からの資材や工具の落下による通行人への被害を防ぐため、足場の外側に斜め上向きに張り出した防護棚。" },
  { "term": "足元空間", "kana": "あしもとくうかん", "group": "あ", "desc": "システムキッチンの最下部（蹴込み部分）や、カウンターデスクの下など、足を置いたり、ルンバ等の掃除機を収納したりするスペース。" },
  { "term": "アスファルト舗装", "kana": "あすふぁるとほそう", "group": "あ", "desc": "道路や駐車場の床面をアスファルト混合物で平らに固める工法。コンクリート舗装に比べて養生期間が短く、コストが抑えられる。" },
  { "term": "アース端子", "kana": "あーすたんし", "group": "あ", "desc": "コンセントの隅に設けられた、家電製品からのアース線をネジ等で固定するための金属部分。漏電対策として非常に重要。" },
  { "term": "アセットクラス", "kana": "あせっとくらす", "group": "あ", "desc": "投資対象となる資産の種類・分類（不動産、国内株式、外国債券など）。不動産は安定したインカムゲインを生むクラスに属する。" },
  { "term": "頭金割合", "kana": "あたまきんわりあい", "group": "あ", "desc": "物件の購入総額に対して、ローンではなく自己資金（頭金）で支払う金額の比率。この割合が高いほどローンの審査が有利になりやすい。" },
  { "term": "後付面格子", "kana": "あとづけめんごうし", "group": "あ", "desc": "新築時に設置されていなかった洗面所やキッチンの小窓に対して、防犯性を高めるためにリフォームで後から外側に取り付ける金属製の格子。" },

// --- 検索・表示処理ロジック ---
function renderGlossary(data) {
    const container = document.getElementById('glossaryContainer');
    const countContainer = document.getElementById('resultCount');
    container.innerHTML = '';
    
    countContainer.textContent = `該当件数: ${data.length}件`;

    if (data.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:30px; color:#999;">該当する用語が見つかりません。</p>';
        return;
    }

    // 50音グループおよび英数の定義
    const groups = [
        { label: 'あ行', key: 'あ' },
        { label: 'か行', key: 'か' },
        { label: 'さ行', key: 'さ' },
        { label: 'た行', key: 'た' },
        { label: 'な行', key: 'な' },
        { label: 'は行', key: 'は' },
        { label: 'ま行', key: 'ま' },
        { label: 'や行', key: 'や' },
        { label: 'ら行', key: 'ら' },
        { label: 'わ行', key: 'わ' },
        { label: '英数字・他', key: '英数' }
    ];

    groups.forEach(group => {
        const groupItems = data.filter(item => item.group === group.key);
        
        if (groupItems.length > 0) {
            const groupSection = document.createElement('div');
            groupSection.className = 'glossary-group';
            
            let html = `<h2 class="group-title">${group.label}</h2>`;
            groupItems.forEach(item => {
                html += `
                    <div class="term-item">
                        <div class="term-title">${item.term}</div>
                        <div class="term-kana">${item.kana}</div>
                        <div class="term-desc">${item.desc}</div>
                    </div>
                `;
            });
            groupSection.innerHTML = html;
            container.appendChild(groupSection);
        }
    });
}

const searchInput = document.getElementById('searchInput');
const filterButtons = document.getElementById('filterButtons');
let currentFilter = 'all';

function filterData() {
    const searchText = searchInput.value.toLowerCase().trim();
    
    const filtered = glossaryData.filter(item => {
        const matchesFilter = (currentFilter === 'all' || item.group === currentFilter);
        const matchesSearch = !searchText || 
            item.term.toLowerCase().includes(searchText) ||
            item.kana.includes(searchText) ||
            item.desc.toLowerCase().includes(searchText);

        return matchesFilter && matchesSearch;
    });

    renderGlossary(filtered);
}

searchInput.addEventListener('input', filterData);

filterButtons.addEventListener('click', (e) => {
    if (!e.target.classList.contains('filter-btn')) return;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.getAttribute('data-kana');
    filterData();
});

// 初回実行
renderGlossary(glossaryData);
</script>
