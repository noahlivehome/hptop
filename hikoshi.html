<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>引っ越し準備のやることリスト | 完璧な新生活スタートガイド</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 共通設定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Lato', "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", sans-serif;
            background-color: #ffffff;
            color: #332d27;
            line-height: 1.8;
        }

        a {
            color: #c0a47a;
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #a38558;
            text-decoration: underline;
        }

        /* フル幅ヘッダー */
        .hero-section {
            background-color: #ffffff;
            padding: 100px 20px 60px 20px;
            text-align: center;
            border-bottom: 1px solid #eae5df;
        }

        .brand-sub {
            font-family: 'Noto Serif JP', serif;
            font-size: 12pt;
            color: #c0a47a;
            font-weight: 500;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-section h1 {
            font-family: 'Noto Serif JP', serif;
            font-size: 36pt;
            font-weight: 700;
            line-height: 1.4;
            color: #332d27;
            margin-bottom: 20px;
        }

        .header-line {
            width: 60px;
            height: 3px;
            background-color: #bfa37a;
            margin: 0 auto 30px auto;
        }

        .hero-section .lead-text {
            font-size: 14pt;
            color: #8c7e6c;
            max-width: 700px;
            margin: 0 auto;
        }

        /* メインコンテンツ枠 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px 100px 20px;
        }

        /* イントロダクション */
        .intro-block {
            text-align: center;
            margin-bottom: 60px;
        }

        /* タイムライン */
        .timeline-section {
            background: #ffffff;
            border: 1px solid #eae5df;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 80px;
            box-shadow: 0 4px 20px rgba(74, 63, 53, 0.02);
        }

        .timeline-section h3 {
            font-family: 'Noto Serif JP', serif;
            font-size: 15pt;
            margin-bottom: 30px;
            text-align: center;
        }

        .timeline-flow {
            display: flex;
            justify-content: space-between;
            position: relative;
        }

        .timeline-flow::before {
            content: '';
            position: absolute;
            top: 22px;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: #eae5df;
            z-index: 0;
        }

        .timeline-step {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 18%;
        }

        .step-dot {
            width: 44px;
            height: 44px;
            background-color: #ffffff;
            border: 2px solid #c0a47a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            color: #c0a47a;
            font-weight: bold;
            font-size: 10pt;
        }

        .timeline-step:hover .step-dot {
            background-color: #c0a47a;
            color: #ffffff;
        }

        .step-label {
            font-size: 11pt;
            font-weight: 700;
            color: #332d27;
            margin-bottom: 4px;
        }

        .step-text {
            font-size: 9.5pt;
            color: #7a6e61;
        }

        /* 各期間のセクションブロック */
        .period-section {
            margin-bottom: 80px;
            scroll-margin-top: 40px;
        }

        .period-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #c0a47a;
            padding-bottom: 12px;
        }

        .period-badge {
            background-color: #a39585;
            color: #ffffff;
            font-size: 10pt;
            font-weight: 700;
            padding: 4px 16px;
            border-radius: 20px;
            margin-right: 15px;
            letter-spacing: 0.05em;
        }

        .period-header h2 {
            font-family: 'Noto Serif JP', serif;
            font-size: 20pt;
            color: #332d27;
        }

        /* ★追加：見出し下イメージ用のコンテナ */
        .period-banner-image {
            width: 100%;
            margin-bottom: 35px;
            text-align: center;
            overflow: hidden;
            border-radius: 12px;
        }

        .period-banner-image img {
            width: 100%;
            height: auto;
            max-height: 300px; /* 必要に応じて高さを制限 */
            object-fit: cover;
            display: block;
        }

        /* 3列タイルレイアウト */
        .tile-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        /* 縦1列並び用のスタイル */
        .tile-list-vertical {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-bottom: 40px;
        }

        .tile {
            background-color: #faf6f0;
            border-radius: 12px;
            padding: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tile:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(74, 63, 53, 0.06);
        }

        .tile-title-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            border-bottom: 1px solid #e0d8cd;
            padding-bottom: 10px;
        }

        .tile .icon {
            color: #c0a47a;
            font-size: 20pt;
            display: flex;
            align-items: center;
        }

        .tile h3 {
            font-family: 'Noto Serif JP', serif;
            font-size: 14pt;
            font-weight: 700;
            color: #332d27;
            border-bottom: none;
            padding-bottom: 0;
        }

        .tile p {
            font-size: 10.5pt;
            color: #5c5246;
            line-height: 1.6;
        }

        /* 2列レイアウト */
        .two-column {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 40px;
            align-items: center;
            background-color: #ffffff;
            border: 1px solid #eae5df;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(74, 63, 53, 0.02);
        }

        .icon-list {
            list-style: none;
        }

        .icon-list li {
            font-size: 11pt;
            line-height: 1.7;
            color: #5c5246;
            margin-bottom: 24px;
            padding-left: 40px;
            position: relative;
        }

        .icon-list li:last-child {
            margin-bottom: 0;
        }

        .icon-list li i {
            position: absolute;
            left: 0;
            top: 4px;
            color: #c0a47a;
            font-size: 16pt;
        }

            color: #332d27;
            font-size: 12pt;
            display:
